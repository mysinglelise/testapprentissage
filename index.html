<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Univers de connaissance 3D</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#060810;color:#e8e9f0;font-family:system-ui,sans-serif;height:100vh;overflow:hidden;user-select:none;-webkit-user-select:none;}

header{position:fixed;top:0;left:0;right:0;z-index:200;height:48px;background:rgba(6,8,16,0.88);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;padding:0 16px;gap:10px;}
.nav-btn{padding:4px 13px;border-radius:14px;border:none;background:none;color:#6b7089;font-size:12px;cursor:pointer;font-family:system-ui;}
.nav-btn.on{background:rgba(255,255,255,0.08);color:#e8e9f0;}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.search-wrap{position:relative;}
.search-wrap input{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:18px;padding:5px 12px 5px 30px;color:#e8e9f0;font-size:12px;font-family:system-ui;outline:none;width:150px;transition:all .2s;}
.search-wrap input:focus{width:210px;border-color:rgba(255,255,255,0.18);}
.s-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px;color:#6b7089;pointer-events:none;}

#cv-wrap{position:fixed;inset:0;top:48px;}
#cv-wrap canvas{width:100%;height:100%;display:block;}

/* PANNEAU */
#panel{position:fixed;top:48px;right:0;bottom:0;width:320px;background:rgba(7,9,18,0.97);border-left:1px solid rgba(255,255,255,0.08);transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);z-index:150;display:flex;flex-direction:column;}
#panel.open{transform:translateX(0);}
.ph{padding:15px 16px 11px;border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0;}
.ph-close{background:none;border:none;color:#6b7089;cursor:pointer;font-size:17px;float:right;}
.ph-name{font-size:17px;font-weight:600;margin-bottom:2px;}
.ph-sub{font-size:11px;color:#6b7089;}
.pb{flex:1;overflow-y:auto;padding:13px 14px;}
.psec{margin-bottom:18px;}
.slabel{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#6b7089;margin-bottom:8px;}
.cc{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:all .18s;}
.cc:hover{border-color:rgba(255,255,255,0.16);background:rgba(255,255,255,0.07);}
.cc-t{font-size:13px;font-weight:500;margin-bottom:3px;}
.cc-m{font-size:11px;color:#6b7089;display:flex;gap:6px;align-items:center;}
.st{font-size:10px;padding:2px 7px;border-radius:7px;}
.st.en-cours{background:rgba(167,139,250,.18);color:#a78bfa;}
.st.pause{background:rgba(251,146,60,.18);color:#fb923c;}
.st.termine{background:rgba(52,211,153,.18);color:#34d399;}
.ec{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:7px;padding:9px 11px;margin-bottom:5px;}
.ec-t{font-size:12px;line-height:1.5;margin-bottom:4px;}
.ec-m{font-size:10px;color:#6b7089;display:flex;gap:6px;align-items:center;}
.ec-m a{color:#a78bfa;text-decoration:none;}
.ec-m button{background:none;border:none;cursor:pointer;color:#6b7089;font-size:10px;margin-left:auto;font-family:system-ui;}
.add-s{width:100%;padding:7px;background:rgba(255,255,255,0.03);border:1px dashed rgba(255,255,255,0.1);border-radius:6px;color:#6b7089;font-size:11px;cursor:pointer;font-family:system-ui;transition:all .18s;margin-top:3px;}
.add-s:hover{border-color:var(--pc,#a78bfa);color:var(--pc,#a78bfa);}

/* VUE TEXTE */
#view-texte{position:fixed;inset:0;top:48px;overflow-y:auto;padding:24px;display:none;z-index:100;}
.tv-title{font-size:20px;font-weight:600;margin-bottom:20px;color:#e8e9f0;}
.gal-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px;margin-bottom:32px;}
.gal-card{background:#0d0f1e;border:1px solid rgba(255,255,255,0.08);border-radius:13px;padding:18px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.gal-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--gc);}
.gal-card:hover{border-color:rgba(255,255,255,0.16);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4);}
.gal-card-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.gal-card-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.gal-card-name{font-size:15px;font-weight:600;}
.gal-card-counts{font-size:12px;color:#6b7089;margin-bottom:10px;}
.gal-card-planets{display:flex;flex-wrap:wrap;gap:5px;}
.gal-card-planet{font-size:11px;padding:3px 9px;border-radius:12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.07);color:#a0a0b8;}

/* VUE COURS */
#view-cours{position:fixed;inset:0;top:48px;overflow-y:auto;padding:22px;display:none;z-index:150;background:#060810;}
.cback{background:none;border:none;color:#6b7089;cursor:pointer;font-size:12px;margin-bottom:16px;display:flex;align-items:center;gap:4px;font-family:system-ui;}
.cdt{font-size:22px;font-weight:600;margin-bottom:7px;}
.cdm{display:flex;gap:9px;align-items:center;flex-wrap:wrap;font-size:12px;color:#6b7089;margin-bottom:18px;}
.lchip{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:4px 11px;border:1px solid rgba(255,255,255,0.09);border-radius:14px;color:#e8e9f0;text-decoration:none;margin:3px;background:rgba(255,255,255,0.04);}
.lchip:hover{border-color:#a78bfa;color:#a78bfa;}
.si{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:9px;margin-bottom:8px;overflow:hidden;}
.sh{padding:11px 13px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
.sh:hover{background:rgba(255,255,255,0.03);}
.sd{font-size:13px;font-weight:500;}
.sp{font-size:11px;color:#6b7089;margin-top:2px;}
.sb{max-height:0;overflow:hidden;transition:max-height .3s ease;}
.sb.open{max-height:none;}
.sb-in{padding:0 13px 13px;}
.sn{font-size:13px;line-height:1.7;white-space:pre-wrap;margin-bottom:9px;color:#c0c1d0;}

/* VUE LECTURE SEANCE */
#view-sea{position:fixed;inset:0;top:48px;z-index:490;background:#060810;display:none;flex-direction:column;}
#view-sea-header{flex-shrink:0;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,0.07);background:rgba(6,8,16,0.96);display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
#view-sea-meta{flex-shrink:0;padding:8px 18px 10px;border-bottom:1px solid rgba(255,255,255,0.05);background:rgba(6,8,16,0.88);display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
#view-sea-body{flex:1;overflow-y:auto;padding:24px 28px;font-size:14px;line-height:1.85;color:#c8c9d8;}
#view-sea-body a{color:#a78bfa;text-decoration:none;}
.rchips{display:flex;flex-wrap:wrap;gap:5px;}
.rchip{font-size:11px;padding:3px 9px;border:1px solid rgba(255,255,255,0.08);border-radius:13px;color:#e8e9f0;text-decoration:none;}
.rchip:hover{border-color:#a78bfa;}
.export-btn{padding:7px 14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:7px;color:#a78bfa;font-size:12px;cursor:pointer;font-family:system-ui;}

/* LECTURE ECLAT */
#view-ecl{position:fixed;inset:0;z-index:510;background:rgba(0,0,0,.72);display:none;align-items:center;justify-content:center;padding:26px 16px;backdrop-filter:blur(3px);}
#view-ecl .ecl-box{background:#0c0e1d;border:1px solid rgba(255,255,255,0.1);border-radius:15px;padding:22px 22px 18px;width:100%;max-width:480px;box-shadow:0 18px 55px rgba(0,0,0,.6);display:flex;flex-direction:column;gap:14px;}
.ecl-texte{font-size:14px;line-height:1.8;color:#e8e9f0;white-space:pre-wrap;word-break:break-word;}
.ecl-footer{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding-top:10px;border-top:1px solid rgba(255,255,255,.06);}
.ecl-planets{display:flex;flex-wrap:wrap;gap:5px;flex:1;}
.ecl-planet{font-size:11px;padding:3px 9px;border-radius:12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);color:#a0a0b8;}

/* RECHERCHE */
#sr{position:fixed;top:52px;left:50%;transform:translateX(-50%);width:480px;max-width:94vw;background:rgba(7,9,20,0.98);border:1px solid rgba(255,255,255,0.1);border-radius:11px;max-height:58vh;overflow-y:auto;z-index:400;display:none;box-shadow:0 10px 36px rgba(0,0,0,.6);}
.sri{padding:10px 15px;border-bottom:1px solid rgba(255,255,255,0.05);cursor:pointer;transition:background .12s;}
.sri:hover{background:rgba(255,255,255,0.05);}
.sri:last-child{border-bottom:none;}
.srt{font-size:10px;color:#6b7089;margin-bottom:2px;}
.srx{font-size:13px;}
.srg{font-size:11px;color:#6b7089;margin-top:2px;}

/* MODALES */
.overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.72);display:flex;align-items:flex-start;justify-content:center;padding:26px 16px;overflow-y:auto;backdrop-filter:blur(3px);}
.modal{background:#0c0e1d;border:1px solid rgba(255,255,255,0.1);border-radius:15px;padding:20px;width:100%;max-width:460px;margin:auto;box-shadow:0 18px 55px rgba(0,0,0,.6);}
.modal h3{font-size:16px;margin-bottom:15px;}
.fg{margin-bottom:11px;}
label{display:block;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#6b7089;margin-bottom:4px;}
input,textarea,select{width:100%;background:#121423;border:1px solid rgba(255,255,255,0.08);border-radius:7px;padding:8px 11px;color:#e8e9f0;font-size:13px;font-family:system-ui;outline:none;transition:border-color .2s;}
input:focus,textarea:focus,select:focus{border-color:rgba(167,139,250,.5);}
select option{background:#121423;}
textarea{resize:vertical;min-height:78px;line-height:1.6;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:3px;}
.chip{padding:5px 11px;border-radius:14px;border:1px solid rgba(255,255,255,0.08);background:#121423;color:#6b7089;font-size:12px;cursor:pointer;font-family:system-ui;transition:all .14s;}
.chip.on{border-color:var(--cc,#a78bfa);color:var(--cc,#a78bfa);background:color-mix(in srgb,var(--cc,#a78bfa) 12%,transparent);}
.actions{display:flex;gap:6px;margin-top:15px;}
.bok{flex:1;padding:9px 15px;background:linear-gradient(135deg,#a78bfa,#f0abfc);color:white;border:none;border-radius:7px;font-size:13px;cursor:pointer;font-family:system-ui;}
.bcan{padding:9px 13px;background:#121423;color:#6b7089;border:1px solid rgba(255,255,255,0.08);border-radius:7px;font-size:13px;cursor:pointer;font-family:system-ui;}
.bdel{padding:9px 12px;background:rgba(225,29,72,.1);color:#f43f5e;border:1px solid rgba(225,29,72,.2);border-radius:7px;font-size:13px;cursor:pointer;font-family:system-ui;}
.mbb{width:100%;padding:11px 14px;text-align:left;font-size:13px;cursor:pointer;border-radius:7px;border:1px solid rgba(255,255,255,0.08);background:#121423;color:#e8e9f0;margin-bottom:6px;font-family:system-ui;transition:border-color .14s;}
.mbb:hover{border-color:rgba(255,255,255,.2);}
.mbb.p{background:linear-gradient(135deg,#a78bfa,#f0abfc);border:none;color:white;}
.rrow{display:flex;gap:5px;margin-bottom:5px;align-items:center;}
.rrow input{flex:1;}
.brm{background:none;border:none;color:#6b7089;cursor:pointer;font-size:14px;}
.brm:hover{color:#f43f5e;}
.bares{font-size:11px;color:#a78bfa;background:none;border:none;cursor:pointer;font-family:system-ui;padding:2px 0;}
.cpicks{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;max-height:90px;overflow-y:auto;}
.cpick{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .14s;flex-shrink:0;}
.cpick.on{border-color:white;transform:scale(1.15);}

#toast{position:fixed;bottom:74px;right:18px;z-index:900;background:#0c0e1d;border:1px solid rgba(255,255,255,0.1);border-radius:7px;padding:7px 13px;font-size:12px;transform:translateY(8px);opacity:0;transition:all .22s;pointer-events:none;}
#toast.show{transform:translateY(0);opacity:1;}

/* FAB */
#fab{position:fixed;bottom:20px;right:20px;z-index:250;width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#a78bfa,#f0abfc);border:none;cursor:pointer;font-size:21px;color:white;box-shadow:0 4px 14px rgba(167,139,250,.45);display:flex;align-items:center;justify-content:center;transition:transform .2s;}
#fab:hover{transform:scale(1.1);}

/* HINT 3D */
#hint3d{position:fixed;bottom:20px;left:16px;z-index:240;background:rgba(6,8,16,0.85);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:8px 12px;font-size:11px;color:#6b7089;backdrop-filter:blur(8px);pointer-events:none;}

/* SEANCE NOTES */
#ss-notes-editor:empty:before{content:attr(placeholder);color:#4b5263;pointer-events:none;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.09);border-radius:2px;}
.empty{text-align:center;padding:16px 0;color:#6b7089;font-size:12px;}
</style>
</head>
<body>

<header>
  <button class="nav-btn on" id="tab-cv" onclick="showCanvas()">Univers 3D</button>
  <button class="nav-btn" id="tab-tx" onclick="showTexte()">Tout voir</button>
  <div class="hdr-right">
    <div class="search-wrap">
      <span class="s-icon">🔭</span>
      <input type="text" id="srch" placeholder="Telescope..." oninput="doSearch(this.value)" onblur="setTimeout(hideSearch,180)">
    </div>
    <button class="nav-btn" onclick="exportJSON()" title="Exporter tout en JSON">↑ Export</button>
    <label class="nav-btn" style="cursor:pointer;" title="Importer un JSON">↓ Import<input type="file" accept=".json" style="display:none;" onchange="importJSON(this)"></label>
  </div>
</header>

<div id="cv-wrap"></div>
<div id="view-texte"></div>
<div id="view-cours"></div>

<div id="panel">
  <div class="ph">
    <button class="ph-close" onclick="closePanel()">×</button>
    <div class="ph-name" id="ph-name"></div>
    <div class="ph-sub" id="ph-sub"></div>
  </div>
  <div class="pb" id="pb"></div>
</div>

<div id="sr"></div>
<button id="fab" onclick="openAddMenu()">+</button>
<div id="toast"></div>
<div id="hint3d">🖱 Orbite · Scroll zoom · Clic droit drag · Clic = ouvrir</div>

<!-- MODAL MENU -->
<div class="overlay" id="m-menu" style="display:none" onclick="if(event.target===this)hide('m-menu')">
  <div class="modal">
    <h3>Ajouter...</h3>
    <button class="mbb p" onclick="hide('m-menu');openEclat(null)">✦ Eclat — note courte du quotidien</button>
    <button class="mbb" onclick="hide('m-menu');openCours(null,null)">Cours — formation, workshop, masterclass</button>
    <button class="mbb" onclick="hide('m-menu');openGalaxie(null)">+ Nouvelle galaxie</button>
    <button class="mbb" onclick="hide('m-menu');openPlanete(null,null)">+ Nouvelle planète</button>
    <button class="bcan" style="width:100%;margin-top:2px;" onclick="hide('m-menu')">Annuler</button>
  </div>
</div>

<!-- MODAL GALAXIE -->
<div class="overlay" id="m-gal" style="display:none" onclick="if(event.target===this)hide('m-gal')">
  <div class="modal">
    <h3 id="mg-t">Nouvelle galaxie</h3>
    <div class="fg"><label>Nom *</label><input id="mg-nom" type="text" placeholder="Musique, Code, Histoire..."></div>
    <div class="fg"><label>Couleur</label><div class="cpicks" id="mg-cols"></div></div>
    <div class="actions">
      <button class="bok" onclick="saveGalaxie()">Enregistrer</button>
      <button class="bcan" onclick="hide('m-gal')">Annuler</button>
      <button class="bdel" id="mg-del" style="display:none" onclick="delGalaxie()">Supprimer</button>
    </div>
  </div>
</div>

<!-- MODAL PLANETE -->
<div class="overlay" id="m-pla" style="display:none" onclick="if(event.target===this)hide('m-pla')">
  <div class="modal">
    <h3 id="mp-t">Nouvelle planète</h3>
    <div class="fg"><label>Nom *</label><input id="mp-nom" type="text" placeholder="Synthese, Medieval, UI Design..."></div>
    <div class="fg"><label>Galaxies * (une ou plusieurs)</label><div class="chips" id="mp-gals"></div></div>
    <div class="fg"><label>Note globale</label>
      <div id="mp-stars" style="display:flex;gap:6px;font-size:24px;cursor:pointer;margin-top:4px;">
        <span data-v="1" onclick="setPlaNote(1)">☆</span>
        <span data-v="2" onclick="setPlaNote(2)">☆</span>
        <span data-v="3" onclick="setPlaNote(3)">☆</span>
        <span data-v="4" onclick="setPlaNote(4)">☆</span>
        <span data-v="5" onclick="setPlaNote(5)">☆</span>
      </div>
    </div>
    <div class="fg">
      <label>Progression <span id="mp-prog-val" style="color:#a78bfa;font-weight:700;">0%</span></label>
      <input id="mp-prog" type="range" min="0" max="100" value="0" oninput="document.getElementById('mp-prog-val').textContent=this.value+'%'" style="width:100%;accent-color:#a78bfa;margin-top:6px;">
    </div>
    <div class="actions">
      <button class="bok" onclick="savePlanete()">Enregistrer</button>
      <button class="bcan" onclick="hide('m-pla')">Annuler</button>
      <button class="bdel" id="mp-del" style="display:none" onclick="delPlanete()">Supprimer</button>
    </div>
  </div>
</div>

<!-- LECTURE ECLAT -->
<div id="view-ecl" onclick="if(event.target===this)closeEclatRead()">
  <div class="ecl-box">
    <div id="vecl-texte" class="ecl-texte"></div>
    <div class="ecl-footer">
      <div class="ecl-planets" id="vecl-planets"></div>
      <span id="vecl-date" style="font-size:11px;color:#6b7089;"></span>
      <a id="vecl-lien" href="#" target="_blank" style="font-size:11px;color:#a78bfa;display:none;">↗ lien</a>
      <button onclick="editFromEclatRead()" style="background:none;border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:4px 11px;color:#6b7089;font-size:11px;cursor:pointer;font-family:system-ui;">✏ Modifier</button>
      <button onclick="closeEclatRead()" style="background:none;border:none;color:#6b7089;font-size:11px;cursor:pointer;font-family:system-ui;">Fermer</button>
    </div>
  </div>
</div>

<!-- MODAL ECLAT -->
<div class="overlay" id="m-ecl" style="display:none" onclick="if(event.target===this)hide('m-ecl')">
  <div class="modal">
    <h3>Eclat</h3>
    <div class="fg"><label>Texte *</label><textarea id="ee-txt" placeholder="L'info glanee..."></textarea></div>
    <div class="fg"><label>Planètes (une ou plusieurs) *</label><div class="chips" id="ee-chips"></div></div>
    <div class="fg"><label>Lien (optionnel)</label><input id="ee-lien" type="url" placeholder="https://..."></div>
    <div class="fg"><label>Date</label><input id="ee-date" type="date"></div>
    <div class="actions">
      <button class="bok" onclick="saveEclat()">Enregistrer</button>
      <button class="bcan" onclick="hide('m-ecl')">Annuler</button>
      <button class="bdel" id="ee-del" style="display:none" onclick="delEclat()">Supprimer</button>
    </div>
  </div>
</div>

<!-- MODAL COURS -->
<div class="overlay" id="m-crs" style="display:none" onclick="if(event.target===this)hide('m-crs')">
  <div class="modal">
    <h3 id="mc-t">Nouveau cours</h3>
    <div class="fg"><label>Titre *</label><input id="cc-titre" type="text" placeholder="Workshop Arca, Masterclass Mix..."></div>
    <div class="fg"><label>Planètes * (une ou plusieurs)</label><div class="chips" id="cc-chips"></div></div>
    <div class="fg"><label>Statut</label>
      <select id="cc-st">
        <option value="en-cours">En cours</option>
        <option value="pause">En pause</option>
        <option value="termine">Terminé</option>
      </select>
    </div>
    <div class="fg"><label>Description</label><textarea id="cc-desc" style="min-height:54px;"></textarea></div>
    <div class="fg"><label>Liens du cours</label><div id="cc-liens"></div><button class="bares" onclick="addLienRow(null,null)">+ Lien</button></div>
    <div class="actions">
      <button class="bok" onclick="saveCours()">Enregistrer</button>
      <button class="bcan" onclick="hide('m-crs')">Annuler</button>
      <button class="bdel" id="cc-del" style="display:none" onclick="delCours()">Supprimer</button>
    </div>
  </div>
</div>

<!-- VUE LECTURE SEANCE -->
<div id="view-sea">
  <div id="view-sea-header">
    <button class="bcan" onclick="closeSeaRead()" style="padding:6px 13px;border-radius:7px;font-size:12px;">← Retour</button>

<!-- Three.js CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ─── PALETTE ──────────────────────────────────────────────────
var PALETTE=['#a78bfa','#c084fc','#818cf8','#6366f1','#8b5cf6','#d946ef','#f472b6','#fb7185','#e11d48','#f43f5e','#fb923c','#f59e0b','#fbbf24','#facc15','#a3e635','#4ade80','#34d399','#2dd4bf','#22d3ee','#38bdf8','#60a5fa','#3b82f6','#64748b','#94a3b8','#e2e8f0','#fef3c7','#ffe4e6','#f0fdf4'];

// ─── DATA ─────────────────────────────────────────────────────
function load(){
  var def={galaxies:[],planetes:[],eclats:[],cours:[]};
  try{
    var d=JSON.parse(localStorage.getItem('univers2')||'null')||def;
    if(!d.zones) d.zones=[];
    d.planetes.forEach(function(p){if(p.gid&&!p.gids)p.gids=[p.gid];if(!p.gids)p.gids=[];});
    d.cours.forEach(function(c){if(c.pid&&!c.pids)c.pids=[c.pid];if(!c.pids)c.pids=[];});
    return d;
  }catch(e){return def;}
}
function save(d){
  d.planetes.forEach(function(p){if(p.gids&&p.gids.length)p.gid=p.gids[0];});
  localStorage.setItem('univers2',JSON.stringify(d));
}
function initDemo(){
  var d=load();
  if(d.galaxies.length) return;
  d.galaxies=[
    {id:'g1',nom:'Musique',couleur:'#a78bfa',x:-220,y:0,z:-80},
    {id:'g2',nom:'Histoire',couleur:'#f59e0b',x:200,y:0,z:60}
  ];
  d.planetes=[
    {id:'p1',gids:['g1'],gid:'g1',nom:'Synthèse',ax:-100,ay:0,az:-70},
    {id:'p2',gids:['g1'],gid:'g1',nom:'Mixage',ax:95,ay:0,az:-65},
    {id:'p3',gids:['g1'],gid:'g1',nom:'Harmonie',ax:-30,ay:0,az:105},
    {id:'p4',gids:['g2'],gid:'g2',nom:'Médiéval',ax:-95,ay:0,az:-65},
    {id:'p5',gids:['g2'],gid:'g2',nom:'Préhistoire',ax:85,ay:0,az:75}
  ];
  save(d);
}

// ─── ÉTAT ─────────────────────────────────────────────────────
var curPlanet=null, curCoursId=null;
var editEcl=null, editCrs=null, editGal=null, editPla=null, editSeaIdx=null;
var openGals={};
var curView='canvas';

// ─── THREE.JS SCÈNE ───────────────────────────────────────────
var renderer, scene, camera, controls;
var meshMap={}; // id -> {mesh, label, ring, ...}
var raycaster, mouse;
var clickables=[]; // liste de meshes cliquables avec .userData
var isPointerDown=false, pointerMoved=false, pointerDownPos={x:0,y:0};
var isDragging=false;
// Orbit controls maison
var orbit={active:false,btn:0,lastX:0,lastY:0,theta:0.3,phi:1.0,radius:600,target:new THREE.Vector3(0,0,0)};

function hexToThree(hex){return new THREE.Color(hex);}

function initThree(){
  var wrap=document.getElementById('cv-wrap');
  renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(wrap.offsetWidth,wrap.offsetHeight);
  renderer.shadowMap.enabled=false;
  wrap.appendChild(renderer.domElement);

  scene=new THREE.Scene();
  scene.fog=new THREE.FogExp2(0x060810,0.0005);

  var aspect=wrap.offsetWidth/wrap.offsetHeight;
  camera=new THREE.PerspectiveCamera(55,aspect,1,5000);
  updateCameraFromOrbit();

  raycaster=new THREE.Raycaster();
  mouse=new THREE.Vector2();

  // Lumières
  var ambient=new THREE.AmbientLight(0xffffff,0.4);
  scene.add(ambient);
  var pt=new THREE.PointLight(0xffffff,0.6,2000);
  pt.position.set(0,200,0);
  scene.add(pt);

  // Fond étoiles
  addStarfield();

  // Données
  initDemo();
  buildScene();

  // Événements
  renderer.domElement.addEventListener('mousedown',onMD3);
  window.addEventListener('mousemove',onMM3);
  window.addEventListener('mouseup',onMU3);
  renderer.domElement.addEventListener('wheel',onWheel3,{passive:false});
  renderer.domElement.addEventListener('contextmenu',function(e){e.preventDefault();});
  renderer.domElement.addEventListener('touchstart',onTS3,{passive:false});
  renderer.domElement.addEventListener('touchmove',onTM3,{passive:false});
  renderer.domElement.addEventListener('touchend',onTE3,{passive:false});
  window.addEventListener('resize',onResize3);

  animate3();
}

function updateCameraFromOrbit(){
  var r=orbit.radius;
  var phi=Math.max(0.15,Math.min(Math.PI-0.15,orbit.phi));
  camera.position.set(
    orbit.target.x+r*Math.sin(phi)*Math.sin(orbit.theta),
    orbit.target.y+r*Math.cos(phi),
    orbit.target.z+r*Math.sin(phi)*Math.cos(orbit.theta)
  );
  camera.lookAt(orbit.target);
}

function addStarfield(){
  var geo=new THREE.BufferGeometry();
  var count=2000;
  var pos=new Float32Array(count*3);
  for(var i=0;i<count*3;i++) pos[i]=(Math.random()-0.5)*4000;
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  var mat=new THREE.PointsMaterial({color:0xffffff,size:1.2,transparent:true,opacity:0.7,sizeAttenuation:true});
  scene.add(new THREE.Points(geo,mat));
}

function clearScene(){
  // Supprimer les objets précédents (sauf starfield et lumières)
  var toRemove=[];
  scene.children.forEach(function(c){
    if(c.userData&&c.userData.dynamic) toRemove.push(c);
  });
  toRemove.forEach(function(c){scene.remove(c);});
  clickables=[];
  // Supprimer les labels CSS
  document.querySelectorAll('.label3d').forEach(function(l){l.remove();});
  meshMap={};
}

function buildScene(){
  clearScene();
  var d=load();

  // Nébuleuses (zones) → disques lumineux
  (d.zones||[]).forEach(function(z){
    addNebula(z);
  });

  // Galaxies
  d.galaxies.forEach(function(g){
    addGalaxy(g,d);
  });

  // Éclats
  d.eclats.forEach(function(e){
    addEclat(e,d);
  });
}

function addNebula(z){
  var col=hexToThree(z.couleur||'#a78bfa');
  var rx=(z.rx||200)/100, ry=(z.ry||140)/100;
  // Disque aplati semi-transparent
  var geo=new THREE.SphereGeometry(1,32,16);
  var mat=new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.06,side:THREE.DoubleSide,depthWrite:false});
  var mesh=new THREE.Mesh(geo,mat);
  mesh.scale.set(rx,(z.ry||140)/400,ry);
  mesh.position.set((z.x||0)/100,0,(z.y||0)/100);
  mesh.userData={dynamic:true,type:'zone',id:z.id};
  scene.add(mesh);

  // Bord
  var edgeMat=new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.18,wireframe:false,depthWrite:false});
  var ring=new THREE.Mesh(new THREE.TorusGeometry(1,0.015,8,80),edgeMat);
  ring.scale.set(rx*100,ry*100,1);
  ring.rotation.x=Math.PI/2;
  ring.position.copy(mesh.position);
  ring.userData={dynamic:true};
  scene.add(ring);

  // Label
  addLabel(z.nom||'Nébuleuse', mesh.position.clone().add(new THREE.Vector3(0,ry*1.1+0.2,0)), col, 'zone');
}

function makeGlowSprite(color){
  var size=128;
  var canvas=document.createElement('canvas');
  canvas.width=canvas.height=size;
  var ctx2=canvas.getContext('2d');
  var grad=ctx2.createRadialGradient(size/2,size/2,0,size/2,size/2,size/2);
  grad.addColorStop(0,'rgba('+color.r255+','+color.g255+','+color.b255+',0.9)');
  grad.addColorStop(0.3,'rgba('+color.r255+','+color.g255+','+color.b255+',0.4)');
  grad.addColorStop(1,'rgba(0,0,0,0)');
  ctx2.fillStyle=grad;
  ctx2.fillRect(0,0,size,size);
  return new THREE.CanvasTexture(canvas);
}

function colorTo255(c){
  return {r255:Math.round(c.r*255),g255:Math.round(c.g*255),b255:Math.round(c.b*255)};
}

function addGalaxy(g,d){
  var col=hexToThree(g.couleur||'#a78bfa');
  var c255=colorTo255(col);
  var gx=(g.x||0)/100, gz=(g.z||g.y||0)/100;
  var isOpen=!!openGals[g.id];

  // Sphère principale de la galaxie
  var radius=isOpen?2.8:2.2;
  var geo=new THREE.SphereGeometry(radius,32,32);
  var mat=new THREE.MeshPhongMaterial({color:col,emissive:col,emissiveIntensity:0.6,transparent:true,opacity:0.95});
  var mesh=new THREE.Mesh(geo,mat);
  mesh.position.set(gx,0,gz);
  mesh.userData={dynamic:true,type:'g',id:g.id,data:g};
  scene.add(mesh);
  clickables.push(mesh);

  // Halo glow sprite
  var glowTex=makeGlowSprite(c255);
  var glowMat=new THREE.SpriteMaterial({map:glowTex,transparent:true,opacity:isOpen?0.8:0.5,depthWrite:false,blending:THREE.AdditiveBlending});
  var glow=new THREE.Sprite(glowMat);
  glow.position.copy(mesh.position);
  glow.scale.set(isOpen?28:18,isOpen?28:18,1);
  glow.userData={dynamic:true};
  scene.add(glow);

  // Anneaux de galaxie (spirale)
  if(isOpen){
    for(var ri=0;ri<3;ri++){
      var ringGeo=new THREE.TorusGeometry(radius*1.8+ri*1.5,0.05,4,60);
      var ringMat=new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.15-ri*0.04,depthWrite:false});
      var ring=new THREE.Mesh(ringGeo,ringMat);
      ring.rotation.x=Math.PI/2*(0.2+ri*0.15);
      ring.rotation.y=ri*0.5;
      ring.position.copy(mesh.position);
      ring.userData={dynamic:true};
      scene.add(ring);
    }
  }

  // Label
  addLabel(g.nom, mesh.position.clone().add(new THREE.Vector3(0,radius+0.8,0)), col, 'galaxy');
  meshMap[g.id]={mesh:mesh,glow:glow};

  // Planètes si ouverte
  if(isOpen){
    var pls=d.planetes.filter(function(p){return (p.gids||[p.gid]).indexOf(g.id)>=0;});
    pls.forEach(function(p){addPlanete(p,g,d);});
  }
}

function addPlanete(p,callerG,d){
  var gids=p.gids||[p.gid];
  var parentGs=gids.map(function(gid){return d.galaxies.find(function(x){return x.id===gid;});}).filter(Boolean);
  if(!parentGs.length) return;
  var mainG=parentGs.find(function(g){return openGals[g.id];})||parentGs[0];
  var col=hexToThree(mainG.couleur||'#a78bfa');
  var c255=colorTo255(col);

  // Centroïde des galaxies parentes
  var cx=parentGs.reduce(function(s,g){return s+(g.x||0);},0)/parentGs.length;
  var cz=parentGs.reduce(function(s,g){return s+(g.z||g.y||0);},0)/parentGs.length;
  var px=(cx+(p.ax||0))/100;
  var pz=(cz+(p.az||p.ay||0))/100;

  // Taille en fonction du contenu
  var nc=d.cours.filter(function(c){return (c.pids||(c.pid?[c.pid]:[])).indexOf(p.id)>=0;}).length;
  var ne=d.eclats.filter(function(e){return (e.pids||[]).indexOf(p.id)>=0;}).length;
  var pr=0.8+Math.min((nc+ne)*0.15,1.0);

  var geo=new THREE.SphereGeometry(pr,24,24);
  var mat=new THREE.MeshPhongMaterial({color:col,emissive:col,emissiveIntensity:0.35,transparent:true,opacity:0.92});
  var mesh=new THREE.Mesh(geo,mat);
  mesh.position.set(px,0,pz);
  mesh.userData={dynamic:true,type:'p',id:p.id,data:p,gdata:mainG};
  scene.add(mesh);
  clickables.push(mesh);

  // Glow planète
  var glowTex=makeGlowSprite(c255);
  var glowMat=new THREE.SpriteMaterial({map:glowTex,transparent:true,opacity:0.4,depthWrite:false,blending:THREE.AdditiveBlending});
  var glow=new THREE.Sprite(glowMat);
  glow.position.copy(mesh.position);
  glow.scale.set(pr*6,pr*6,1);
  glow.userData={dynamic:true};
  scene.add(glow);

  // Anneau si multi-galaxies ou sélectionné
  if(parentGs.length>1||(curPlanet&&curPlanet.id===p.id)){
    var ringGeo=new THREE.TorusGeometry(pr*1.5,0.07,6,40);
    var ringMat=new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.5,depthWrite:false});
    var ring=new THREE.Mesh(ringGeo,ringMat);
    ring.rotation.x=Math.PI/2;
    ring.position.copy(mesh.position);
    ring.userData={dynamic:true};
    scene.add(ring);
  }

  // Lignes vers galaxies parentes
  parentGs.forEach(function(g){
    if(!openGals[g.id]) return;
    var gx2=(g.x||0)/100, gz2=(g.z||g.y||0)/100;
    var lineMat=new THREE.LineBasicMaterial({color:hexToThree(g.couleur||'#a78bfa'),transparent:true,opacity:0.12,depthWrite:false});
    var lineGeo=new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(gx2,0,gz2),
      new THREE.Vector3(px,0,pz)
    ]);
    var line=new THREE.Line(lineGeo,lineMat);
    line.userData={dynamic:true};
    scene.add(line);
  });

  // Progression ring
  if(p.prog&&p.prog>0){
    var pct=p.prog/100;
    var arcGeo=new THREE.TorusGeometry(pr*1.9,0.05,4,Math.max(4,Math.round(pct*40)),pct*Math.PI*2);
    var arcMat=new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.7});
    var arc=new THREE.Mesh(arcGeo,arcMat);
    arc.rotation.x=Math.PI/2;
    arc.position.copy(mesh.position);
    arc.userData={dynamic:true};
    scene.add(arc);
  }

  // Label
  addLabel(p.nom, mesh.position.clone().add(new THREE.Vector3(0,pr+0.4,0)), col, 'planet');
  meshMap[p.id]={mesh:mesh,glow:glow};
}

function addEclat(e,d){
  if(!(e.pids&&e.pids.length)) return;
  var anyVisible=false;
  var positions=[];
  e.pids.forEach(function(pid){
    var p=d.planetes.find(function(x){return x.id===pid;});
    if(!p) return;
    var gids=p.gids||[p.gid];
    var parentGs=gids.map(function(gid){return d.galaxies.find(function(x){return x.id===gid;});}).filter(Boolean);
    var openParentGs=parentGs.filter(function(g){return openGals[g.id];});
    if(openParentGs.length>0) anyVisible=true;
    var mainG=openParentGs[0]||parentGs[0];
    var cx=parentGs.reduce(function(s,g){return s+(g.x||0);},0)/parentGs.length;
    var cz=parentGs.reduce(function(s,g){return s+(g.z||g.y||0);},0)/parentGs.length;
    positions.push({wx:(cx+(p.ax||0))/100,wz:(cz+(p.az||p.ay||0))/100,col:mainG?mainG.couleur:'#fbbf24'});
  });
  if(!anyVisible) return;

  var avgX=positions.reduce(function(s,p){return s+p.wx;},0)/positions.length;
  var avgZ=positions.reduce(function(s,p){return s+p.wz;},0)/positions.length;

  var geo=new THREE.SphereGeometry(0.3,12,12);
  var mat=new THREE.MeshBasicMaterial({color:0xfffcc8,transparent:true,opacity:0.85});
  var mesh=new THREE.Mesh(geo,mat);
  mesh.position.set(avgX,0.3,avgZ);
  mesh.userData={dynamic:true,type:'e',id:e.id,data:e};
  scene.add(mesh);
  clickables.push(mesh);

  // Glow éclat
  var canvas=document.createElement('canvas');
  canvas.width=canvas.height=64;
  var ctx2=canvas.getContext('2d');
  var grad=ctx2.createRadialGradient(32,32,0,32,32,32);
  grad.addColorStop(0,'rgba(255,252,180,0.95)');
  grad.addColorStop(1,'rgba(0,0,0,0)');
  ctx2.fillStyle=grad;ctx2.fillRect(0,0,64,64);
  var spriteMat=new THREE.SpriteMaterial({map:new THREE.CanvasTexture(canvas),transparent:true,opacity:0.7,blending:THREE.AdditiveBlending,depthWrite:false});
  var sprite=new THREE.Sprite(spriteMat);
  sprite.position.copy(mesh.position);
  sprite.scale.set(3,3,1);
  sprite.userData={dynamic:true};
  scene.add(sprite);
  mesh.userData={dynamic:true,type:'e',id:e.id,data:e};
}

// Labels CSS 3D
function addLabel(text,pos3d,col,type){
  var div=document.createElement('div');
  div.className='label3d';
  div.textContent=text;
  var sz=type==='galaxy'?13:type==='planet'?11:10;
  var fw=type==='galaxy'?700:600;
  div.style.cssText='position:fixed;pointer-events:none;color:'+col.getStyle()+';font-size:'+sz+'px;font-weight:'+fw+';font-family:system-ui;white-space:nowrap;text-shadow:0 1px 4px rgba(0,0,0,0.9);z-index:10;opacity:0.9;letter-spacing:0.02em;transform:translateX(-50%);';
  document.body.appendChild(div);
  // stocker la position 3D
  div._pos3d=pos3d;
  div._type=type;
}

function updateLabels(){
  var labels=document.querySelectorAll('.label3d');
  var wrap=document.getElementById('cv-wrap');
  if(!wrap) return;
  var rect=wrap.getBoundingClientRect();
  labels.forEach(function(lbl){
    if(!lbl._pos3d) return;
    var v=lbl._pos3d.clone().project(camera);
    var x=(v.x*0.5+0.5)*(rect.width)+rect.left;
    var y=(-v.y*0.5+0.5)*(rect.height)+rect.top;
    // Masquer si derrière la caméra
    if(v.z>1){lbl.style.display='none';return;}
    lbl.style.display='';
    lbl.style.left=x+'px';
    lbl.style.top=y+'px';
  });
}

// ─── ANIMATION ────────────────────────────────────────────────
var clock3=new THREE.Clock();
function animate3(){
  requestAnimationFrame(animate3);
  var t=clock3.getElapsedTime();
  // Rotation douce des meshes de galaxie
  scene.children.forEach(function(c){
    if(c.userData&&c.userData.type==='g'&&c.isMesh){
      c.rotation.y=t*0.15;
    }
  });
  // Pulsation des éclats
  scene.children.forEach(function(c){
    if(c.userData&&c.userData.type==='e'&&c.isMesh){
      var scale=0.9+0.2*Math.sin(t*2+c.position.x);
      c.scale.setScalar(scale);
    }
  });
  renderer.render(scene,camera);
  updateLabels();
}

// ─── INTERACTIONS ─────────────────────────────────────────────
function onMD3(e){
  isPointerDown=true;pointerMoved=false;
  pointerDownPos={x:e.clientX,y:e.clientY};
  orbit.active=true;orbit.btn=e.button;
  orbit.lastX=e.clientX;orbit.lastY=e.clientY;
}
function onMM3(e){
  if(!isPointerDown) return;
  var dx=e.clientX-pointerDownPos.x, dy=e.clientY-pointerDownPos.y;
  if(Math.abs(dx)+Math.abs(dy)>4) pointerMoved=true;
  if(!orbit.active) return;
  var ddx=e.clientX-orbit.lastX, ddy=e.clientY-orbit.lastY;
  orbit.lastX=e.clientX;orbit.lastY=e.clientY;
  if(orbit.btn===0){
    // Orbite
    orbit.theta-=ddx*0.007;
    orbit.phi-=ddy*0.007;
    orbit.phi=Math.max(0.15,Math.min(Math.PI-0.15,orbit.phi));
  } else if(orbit.btn===2){
    // Pan
    var right=new THREE.Vector3();
    var up=new THREE.Vector3();
    camera.getWorldDirection(new THREE.Vector3());
    right.crossVectors(camera.getWorldDirection(new THREE.Vector3()),camera.up).normalize();
    up.copy(camera.up).normalize();
    var panSpeed=orbit.radius*0.001;
    orbit.target.addScaledVector(right,-ddx*panSpeed);
    orbit.target.addScaledVector(up,ddy*panSpeed);
  }
  updateCameraFromOrbit();
}
function onMU3(e){
  orbit.active=false;
  if(isPointerDown&&!pointerMoved){
    doClick3(e.clientX,e.clientY);
  }
  isPointerDown=false;
}
function onWheel3(e){
  e.preventDefault();
  orbit.radius=Math.max(80,Math.min(2000,orbit.radius*(e.deltaY>0?1.1:0.9)));
  updateCameraFromOrbit();
}
function onResize3(){
  var wrap=document.getElementById('cv-wrap');
  if(!wrap) return;
  renderer.setSize(wrap.offsetWidth,wrap.offsetHeight);
  camera.aspect=wrap.offsetWidth/wrap.offsetHeight;
  camera.updateProjectionMatrix();
}

// Touch
var touch1={}, touch2={}, pinchDist0=0, orbitPhi0=0, orbitTheta0=0, orbitR0=0;
function onTS3(e){
  e.preventDefault();
  if(e.touches.length===1){
    var t=e.touches[0];
    isPointerDown=true;pointerMoved=false;
    pointerDownPos={x:t.clientX,y:t.clientY};
    orbit.active=true;orbit.btn=0;
    orbit.lastX=t.clientX;orbit.lastY=t.clientY;
  } else if(e.touches.length===2){
    orbit.active=false;isPointerDown=false;
    var t0=e.touches[0],t1=e.touches[1];
    pinchDist0=Math.hypot(t0.clientX-t1.clientX,t0.clientY-t1.clientY);
    orbitR0=orbit.radius;
  }
}
function onTM3(e){
  e.preventDefault();
  if(e.touches.length===1){
    var t=e.touches[0];
    var dx=t.clientX-pointerDownPos.x, dy=t.clientY-pointerDownPos.y;
    if(Math.abs(dx)+Math.abs(dy)>6) pointerMoved=true;
    var ddx=t.clientX-orbit.lastX, ddy=t.clientY-orbit.lastY;
    orbit.lastX=t.clientX;orbit.lastY=t.clientY;
    orbit.theta-=ddx*0.009;
    orbit.phi-=ddy*0.009;
    orbit.phi=Math.max(0.15,Math.min(Math.PI-0.15,orbit.phi));
    updateCameraFromOrbit();
  } else if(e.touches.length===2){
    var t0=e.touches[0],t1=e.touches[1];
    var dist=Math.hypot(t0.clientX-t1.clientX,t0.clientY-t1.clientY);
    orbit.radius=Math.max(80,Math.min(2000,orbitR0*(pinchDist0/dist)));
    updateCameraFromOrbit();
  }
}
function onTE3(e){
  e.preventDefault();
  if(!pointerMoved&&isPointerDown&&e.changedTouches.length){
    var t=e.changedTouches[0];
    doClick3(t.clientX,t.clientY);
  }
  isPointerDown=false;orbit.active=false;
}

function doClick3(cx,cy){
  var wrap=document.getElementById('cv-wrap');
  var rect=wrap.getBoundingClientRect();
  mouse.x=((cx-rect.left)/rect.width)*2-1;
  mouse.y=-((cy-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(mouse,camera);
  var hits=raycaster.intersectObjects(clickables);
  if(!hits.length){closePanel();return;}
  var obj=hits[0].object;
  var ud=obj.userData;
  if(ud.type==='g'){
    openGals[ud.id]=!openGals[ud.id];
    // Focus caméra sur galaxie
    var gx=(ud.data.x||0)/100, gz=(ud.data.z||ud.data.y||0)/100;
    orbit.target.set(gx,0,gz);
    orbit.radius=Math.max(150,orbit.radius*0.8);
    updateCameraFromOrbit();
    buildScene();
  } else if(ud.type==='p'){
    openPanel(ud.data,ud.gdata);
  } else if(ud.type==='e'){
    openEclatRead(ud.id);
  }
}

// Focus une galaxie depuis la vue texte
function focusGalaxy3d(gid){

  openGals[gid]=true;
  var gx=(g.x||0)/100, gz=(g.z||g.y||0)/100;
  orbit.target.set(gx,0,gz);
  orbit.radius=200;
  orbit.phi=1.1;
  updateCameraFromOrbit();
  buildScene();
}

function stripHtml(s){return (s||'').replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim();}
function doSearch(q){
  var box=document.getElementById('sr');
  if(!q.trim()){box.style.display='none';return;}
  q=q.toLowerCase();
  var d=load();var res=[];
  d.galaxies.forEach(function(g){
    if((g.nom||'').toLowerCase().indexOf(q)<0) return;
    res.push({type:'galaxie',id:g.id,txt:g.nom,tags:'',col:g.couleur});
  });
  d.planetes.forEach(function(p){
    if((p.nom||'').toLowerCase().indexOf(q)<0) return;
    var gnames=((p.gids||[p.gid]).map(function(gid){var g=d.galaxies.find(function(x){return x.id===gid;});return g?g.nom:'';})).filter(Boolean).join(', ');
    res.push({type:'planete',id:p.id,txt:p.nom,tags:gnames,col:d.galaxies.find(function(x){return x.id===(p.gids?p.gids[0]:p.gid);})?.couleur||'#a78bfa'});
  });
  d.cours.forEach(function(c){
    if((c.titre||'').toLowerCase().indexOf(q)<0) return;
    res.push({type:'cours',id:c.id,txt:c.titre,tags:'',col:'#a78bfa'});
  });
  d.eclats.forEach(function(e){
    if(!(e.texte||'').toLowerCase().includes(q)) return;
    res.push({type:'eclat',id:e.id,txt:(e.texte||'').slice(0,80),tags:'',col:'#fbbf24'});
  });
  if(!res.length){box.innerHTML='<div class="sri"><div class="srx" style="color:#6b7089;">Aucun résultat</div></div>';box.style.display='block';return;}
  box.innerHTML=res.slice(0,12).map(function(r){
    return '<div class="sri" onclick="searchClick(\''+r.type+'\',\''+r.id+'\')">'+
      '<div class="srt">'+r.type+'</div>'+
      '<div class="srx" style="color:'+r.col+';">'+esc(r.txt)+'</div>'+
      (r.tags?'<div class="srg">'+esc(r.tags)+'</div>':'')+
      '</div>';
  }).join('');
  box.style.display='block';
}
function hideSearch(){document.getElementById('sr').style.display='none';}
function searchClick(type,id){
  hideSearch();
  document.getElementById('srch').value='';
  if(type==='galaxie'){focusGalaxy3d(id);}
  else if(type==='planete'){
    var d=load();var p=d.planetes.find(function(x){return x.id===id;});
    if(p){var gids=p.gids||[p.gid];gids.forEach(function(gid){openGals[gid]=true;});showCanvas();buildScene();setTimeout(function(){openPanel(p,null);},100);}
  } else if(type==='cours'){openCoursDetail(id);}
  else if(type==='eclat'){openEclatRead(id);}
}

function exportJSON(){
  var d=load();
  var blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='univers3d.json';a.click();
  toast('Export téléchargé ✓');
}
function importJSON(input){
  var file=input.files[0];if(!file) return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var d=JSON.parse(ev.target.result);
      if(!d.galaxies) throw new Error();
      save(d);openGals={};curPlanet=null;buildScene();

function today(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fmtDate(s){try{return new Date(s+'T00:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'});}catch(e){return s||'';}}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function stLabel(s){return s==='pause'?'En pause':s==='termine'?'Terminé':'En cours';}

  window._plaNoteVal=val;

  spans.forEach(function(s){
    var v=parseInt(s.getAttribute('data-v'));
    s.textContent=v<=val?'★':'☆';
    s.style.color=v<=val?'#fbbf24':'#4b5563';
  });

function applyFormat(type,color){
  var editor=document.getElementById('ss-notes-editor');
  editor.focus();
  var sel=window.getSelection();
  if(!sel||sel.rangeCount===0||sel.isCollapsed) return;
  if(type==='clear'){document.execCommand('removeFormat',false,null);return;}
  if(type==='u'){document.execCommand('underline',false,null);return;}
  if(type==='mark'){document.execCommand('hiliteColor',false,'#eab308');document.execCommand('foreColor',false,'#000000');}
}

    return '<h2>'+(s.titre||fmtDate(s.date))+'</h2>'+(s.notes?'<div class="notes">'+s.notes+'</div>':'');
  }).join('');
  var html='<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><title>'+esc(cours.titre||'cours')+'</title>'+exportStyle()+'</head><body>'+
    '<button class="print-btn" onclick="window.print()">🖨 Imprimer</button>'+
    '<h1>'+esc(cours.titre||'Sans titre')+'</h1>'+
    '<div class="meta">'+(cours.statut?stLabel(cours.statut):'')+'</div>'+
    seancesHtml+'</body></html>';
  _downloadHtml(html,(cours.titre||'cours').replace(/[^a-z0-9]/gi,'_'));
  toast('Export téléchargé ✓');
}
function exportSeance(coursId,seanceId){
  var d=load();var cours=d.cours.find(function(x){return x.id===coursId;});if(!cours) return;
  var s=(cours.seances||[]).find(function(x){return x.id===seanceId;});if(!s) return;
  var titre=(s.titre||'Séance')+(s.date?' — '+fmtDate(s.date):'');
  var html='<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><title>'+esc(titre)+'</title>'+exportStyle()+'</head><body>'+
    '<button class="print-btn" onclick="window.print()">🖨 Imprimer</button>'+
    '<h1>'+esc(titre)+'</h1><div class="meta">'+esc(cours.titre||'')+'</div>'+
    (s.notes?'<div class="notes" style="margin-top:18px;">'+s.notes+'</div>':'')+
    '</body></html>';
  _downloadHtml(html,(cours.titre||'cours').replace(/[^a-z0-9]/gi,'_')+'_'+(s.titre||'').replace(/[^a-z0-9]/gi,'_'));
  toast('Séance exportée ✓');
}
