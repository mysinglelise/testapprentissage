<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Univers de connaissance</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#060810;color:#e8e9f0;font-family:system-ui,sans-serif;height:100vh;overflow:hidden;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;}

header{position:fixed;top:0;left:0;right:0;z-index:200;height:48px;background:rgba(6,8,16,0.88);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;padding:0 16px;gap:10px;}
.nav-btn{padding:4px 13px;border-radius:14px;border:none;background:none;color:#6b7089;font-size:12px;cursor:pointer;font-family:system-ui;}
.nav-btn.on{background:rgba(255,255,255,0.08);color:#e8e9f0;}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.search-wrap{position:relative;}
.search-wrap input{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:18px;padding:5px 12px 5px 30px;color:#e8e9f0;font-size:12px;font-family:system-ui;outline:none;width:150px;transition:all .2s;}
.search-wrap input:focus{width:210px;border-color:rgba(255,255,255,0.18);}
.s-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px;color:#6b7089;pointer-events:none;}
a.retour{font-size:11px;color:#6b7089;text-decoration:none;border:1px solid rgba(255,255,255,0.07);padding:4px 9px;border-radius:6px;}

#cv-wrap{position:fixed;inset:0;top:48px;}
#cv{width:100%;height:100%;display:block;touch-action:none;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;}

/* PANNEAU */
#panel{position:fixed;top:48px;right:0;bottom:0;width:320px;background:rgba(7,9,18,0.97);border-left:1px solid rgba(255,255,255,0.08);transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);z-index:150;display:flex;flex-direction:column;}
#panel.open{transform:translateX(0);}
.ph{padding:15px 16px 11px;border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0;}
.ph-close{background:none;border:none;color:#6b7089;cursor:pointer;font-size:17px;float:right;}
.ph-name{font-size:17px;font-weight:600;margin-bottom:2px;}
.ph-sub{font-size:11px;color:#6b7089;}
.pb{flex:1;overflow-y:auto;padding:13px 14px;}
.psec{margin-bottom:18px;}
.slabel{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#6b7089;margin-bottom:8px;}

.cc{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:all .18s;}
.cc:hover{border-color:rgba(255,255,255,0.16);background:rgba(255,255,255,0.07);}
.cc-t{font-size:13px;font-weight:500;margin-bottom:3px;}
.cc-m{font-size:11px;color:#6b7089;display:flex;gap:6px;align-items:center;}
.st{font-size:10px;padding:2px 7px;border-radius:7px;}
.st.en-cours{background:rgba(167,139,250,.18);color:#a78bfa;}
.st.pause{background:rgba(251,146,60,.18);color:#fb923c;}
.st.termine{background:rgba(52,211,153,.18);color:#34d399;}

.ec{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:7px;padding:9px 11px;margin-bottom:5px;}
.ec-t{font-size:12px;line-height:1.5;margin-bottom:4px;}
.ec-m{font-size:10px;color:#6b7089;display:flex;gap:6px;align-items:center;}
.ec-m a{color:#a78bfa;text-decoration:none;}
.ec-m button{background:none;border:none;cursor:pointer;color:#6b7089;font-size:10px;margin-left:auto;font-family:system-ui;}

.add-s{width:100%;padding:7px;background:rgba(255,255,255,0.03);border:1px dashed rgba(255,255,255,0.1);border-radius:6px;color:#6b7089;font-size:11px;cursor:pointer;font-family:system-ui;transition:all .18s;margin-top:3px;}
.add-s:hover{border-color:var(--pc,#a78bfa);color:var(--pc,#a78bfa);}

/* VUE TEXTE */
#view-texte{position:fixed;inset:0;top:48px;overflow-y:auto;padding:24px;display:none;z-index:100;}
.tv-title{font-size:20px;font-weight:600;margin-bottom:20px;color:#e8e9f0;}
.gal-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px;margin-bottom:32px;}
.gal-card{background:#0d0f1e;border:1px solid rgba(255,255,255,0.08);border-radius:13px;padding:18px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.gal-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--gc);}
.gal-card:hover{border-color:rgba(255,255,255,0.16);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4);}
.gal-card-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.gal-card-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.gal-card-name{font-size:15px;font-weight:600;}
.gal-card-counts{font-size:12px;color:#6b7089;margin-bottom:10px;}
.gal-card-planets{display:flex;flex-wrap:wrap;gap:5px;}
.gal-card-planet{font-size:11px;padding:3px 9px;border-radius:12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.07);color:#a0a0b8;}

/* VUE COURS */
#view-cours{position:fixed;inset:0;top:48px;overflow-y:auto;padding:22px;display:none;z-index:150;background:#060810;}
.cback{background:none;border:none;color:#6b7089;cursor:pointer;font-size:12px;margin-bottom:16px;display:flex;align-items:center;gap:4px;font-family:system-ui;}
.cdt{font-size:22px;font-weight:600;margin-bottom:7px;}
.cdm{display:flex;gap:9px;align-items:center;flex-wrap:wrap;font-size:12px;color:#6b7089;margin-bottom:18px;}
.lchip{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:4px 11px;border:1px solid rgba(255,255,255,0.09);border-radius:14px;color:#e8e9f0;text-decoration:none;margin:3px;background:rgba(255,255,255,0.04);}
.lchip:hover{border-color:#a78bfa;color:#a78bfa;}
.si{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:9px;margin-bottom:8px;overflow:hidden;}
.sh{padding:11px 13px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
.sh:hover{background:rgba(255,255,255,0.03);}
.sd{font-size:13px;font-weight:500;}
.sp{font-size:11px;color:#6b7089;margin-top:2px;}
.sb{max-height:0;overflow:hidden;transition:max-height .3s ease;}
.sb.open{max-height:none;}
.sb-in{padding:0 13px 13px;}
.sn{font-size:13px;line-height:1.7;white-space:pre-wrap;margin-bottom:9px;color:#c0c1d0;}
/* VUE LECTURE SEANCE */
#view-sea{position:fixed;inset:0;top:48px;z-index:490;background:#060810;display:none;flex-direction:column;}
#view-sea-header{flex-shrink:0;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,0.07);background:rgba(6,8,16,0.96);display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
#view-sea-meta{flex-shrink:0;padding:8px 18px 10px;border-bottom:1px solid rgba(255,255,255,0.05);background:rgba(6,8,16,0.88);display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
#view-sea-body{flex:1;overflow-y:auto;padding:24px 28px;font-size:14px;line-height:1.85;color:#c8c9d8;}
#view-sea-body a{color:#a78bfa;text-decoration:none;}
#view-sea-body a:hover{text-decoration:underline;}
.rchips{display:flex;flex-wrap:wrap;gap:5px;}
.rchip{font-size:11px;padding:3px 9px;border:1px solid rgba(255,255,255,0.08);border-radius:13px;color:#e8e9f0;text-decoration:none;}
.rchip:hover{border-color:#a78bfa;}
.export-btn{padding:7px 14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:7px;color:#a78bfa;font-size:12px;cursor:pointer;font-family:system-ui;}

/* SEANCE PLEIN ECRAN */
#ss-notes-editor:empty:before{content:attr(placeholder);color:#4b5263;pointer-events:none;}
#ss-notes-editor:focus{background:transparent;}

/* LECTURE ECLAT */
#view-ecl{position:fixed;inset:0;z-index:510;background:rgba(0,0,0,.72);display:none;align-items:center;justify-content:center;padding:26px 16px;backdrop-filter:blur(3px);}
#view-ecl .ecl-box{background:#0c0e1d;border:1px solid rgba(255,255,255,0.1);border-radius:15px;padding:22px 22px 18px;width:100%;max-width:480px;box-shadow:0 18px 55px rgba(0,0,0,.6);display:flex;flex-direction:column;gap:14px;}
.ecl-texte{font-size:14px;line-height:1.8;color:#e8e9f0;white-space:pre-wrap;word-break:break-word;}
.ecl-footer{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding-top:10px;border-top:1px solid rgba(255,255,255,.06);}
.ecl-planets{display:flex;flex-wrap:wrap;gap:5px;flex:1;}
.ecl-planet{font-size:11px;padding:3px 9px;border-radius:12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);color:#a0a0b8;}

/* RECHERCHE */
#sr{position:fixed;top:52px;left:50%;transform:translateX(-50%);width:480px;max-width:94vw;background:rgba(7,9,20,0.98);border:1px solid rgba(255,255,255,0.1);border-radius:11px;max-height:58vh;overflow-y:auto;z-index:400;display:none;box-shadow:0 10px 36px rgba(0,0,0,.6);}
.sri{padding:10px 15px;border-bottom:1px solid rgba(255,255,255,0.05);cursor:pointer;transition:background .12s;}
.sri:hover{background:rgba(255,255,255,0.05);}
.sri:last-child{border-bottom:none;}
.srt{font-size:10px;color:#6b7089;margin-bottom:2px;}
.srx{font-size:13px;}
.srg{font-size:11px;color:#6b7089;margin-top:2px;}

/* FAB */
#fab{position:fixed;bottom:20px;right:20px;z-index:250;width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#a78bfa,#f0abfc);border:none;cursor:pointer;font-size:21px;color:white;box-shadow:0 4px 14px rgba(167,139,250,.45);display:flex;align-items:center;justify-content:center;transition:transform .2s;}
#fab:hover{transform:scale(1.1);}

/* MINIMAP */
#minimap{position:fixed;bottom:20px;left:16px;z-index:240;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(6,8,16,0.85);backdrop-filter:blur(8px);cursor:pointer;box-shadow:0 4px 18px rgba(0,0,0,.5);opacity:0.85;transition:opacity .2s;}
#minimap:hover{opacity:1;}
#minimap.hidden{display:none;}

/* MODALES */
.overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.72);display:flex;align-items:flex-start;justify-content:center;padding:26px 16px;overflow-y:auto;backdrop-filter:blur(3px);}
.modal{background:#0c0e1d;border:1px solid rgba(255,255,255,0.1);border-radius:15px;padding:20px;width:100%;max-width:460px;margin:auto;box-shadow:0 18px 55px rgba(0,0,0,.6);}
.modal h3{font-size:16px;margin-bottom:15px;}
.fg{margin-bottom:11px;}
label{display:block;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#6b7089;margin-bottom:4px;}
input,textarea,select{width:100%;background:#121423;border:1px solid rgba(255,255,255,0.08);border-radius:7px;padding:8px 11px;color:#e8e9f0;font-size:13px;font-family:system-ui;outline:none;transition:border-color .2s;}
input:focus,textarea:focus,select:focus{border-color:rgba(167,139,250,.5);}
select option{background:#121423;}
textarea{resize:vertical;min-height:78px;line-height:1.6;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:3px;}
.chip{padding:5px 11px;border-radius:14px;border:1px solid rgba(255,255,255,0.08);background:#121423;color:#6b7089;font-size:12px;cursor:pointer;font-family:system-ui;transition:all .14s;}
.chip.on{border-color:var(--cc,#a78bfa);color:var(--cc,#a78bfa);background:color-mix(in srgb,var(--cc,#a78bfa) 12%,transparent);}
.actions{display:flex;gap:6px;margin-top:15px;}
.bok{flex:1;padding:9px 15px;background:linear-gradient(135deg,#a78bfa,#f0abfc);color:white;border:none;border-radius:7px;font-size:13px;cursor:pointer;font-family:system-ui;}
.bcan{padding:9px 13px;background:#121423;color:#6b7089;border:1px solid rgba(255,255,255,0.08);border-radius:7px;font-size:13px;cursor:pointer;font-family:system-ui;}
.bdel{padding:9px 12px;background:rgba(225,29,72,.1);color:#f43f5e;border:1px solid rgba(225,29,72,.2);border-radius:7px;font-size:13px;cursor:pointer;font-family:system-ui;}
.mbb{width:100%;padding:11px 14px;text-align:left;font-size:13px;cursor:pointer;border-radius:7px;border:1px solid rgba(255,255,255,0.08);background:#121423;color:#e8e9f0;margin-bottom:6px;font-family:system-ui;transition:border-color .14s;}
.mbb:hover{border-color:rgba(255,255,255,.2);}
.mbb.p{background:linear-gradient(135deg,#a78bfa,#f0abfc);border:none;color:white;}
.rrow{display:flex;gap:5px;margin-bottom:5px;align-items:center;}
.rrow input{flex:1;}
.brm{background:none;border:none;color:#6b7089;cursor:pointer;font-size:14px;}
.brm:hover{color:#f43f5e;}
.bares{font-size:11px;color:#a78bfa;background:none;border:none;cursor:pointer;font-family:system-ui;padding:2px 0;}
.cpicks{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;max-height:90px;overflow-y:auto;}
.cpick{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .14s;flex-shrink:0;}
.cpick.on{border-color:white;transform:scale(1.15);}

#toast{position:fixed;bottom:74px;right:18px;z-index:900;background:#0c0e1d;border:1px solid rgba(255,255,255,0.1);border-radius:7px;padding:7px 13px;font-size:12px;transform:translateY(8px);opacity:0;transition:all .22s;pointer-events:none;}
#toast.show{transform:translateY(0);opacity:1;}
#tip{position:fixed;z-index:300;background:rgba(12,14,29,.96);border:1px solid rgba(255,255,255,0.09);border-radius:7px;padding:7px 11px;font-size:12px;pointer-events:none;opacity:0;line-height:1.5;max-width:155px;}
.empty{text-align:center;padding:16px 0;color:#6b7089;font-size:12px;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.09);border-radius:2px;}
</style>
</head>
<body>

<header>
  <button class="nav-btn on" id="tab-cv" onclick="showCanvas()">Univers</button>
  <button class="nav-btn" id="tab-tx" onclick="showTexte()">Tout voir</button>
  <div class="hdr-right">
    <div class="search-wrap">
      <span class="s-icon">&#128301;</span>
      <input type="text" id="srch" placeholder="Telescope..." oninput="doSearch(this.value)" onblur="setTimeout(hideSearch,180)">
    </div>
    <button class="nav-btn" onclick="exportJSON()" title="Exporter tout en JSON">&#8593; Export</button>
    <label class="nav-btn" style="cursor:pointer;" title="Importer un JSON">&#8595; Import<input type="file" accept=".json" style="display:none;" onchange="importJSON(this)"></label>
  </div>
</header>

<div id="cv-wrap" style="-webkit-touch-callout:none;user-select:none;-webkit-user-select:none;"><canvas id="cv" style="-webkit-touch-callout:none;user-select:none;-webkit-user-select:none;"></canvas></div>
<canvas id="minimap"></canvas>
<div id="view-texte"></div>
<div id="view-cours"></div>

<div id="panel">
  <div class="ph">
    <button class="ph-close" onclick="closePanel()">&#215;</button>
    <div class="ph-name" id="ph-name"></div>
    <div class="ph-sub" id="ph-sub"></div>
  </div>
  <div class="pb" id="pb"></div>
</div>

<div id="sr"></div>
<button id="fab" onclick="openAddMenu()">+</button>
<div id="toast"></div>
<div id="tip"></div>

<!-- MODAL MENU -->
<div class="overlay" id="m-menu" style="display:none" onclick="if(event.target===this)hide('m-menu')">
  <div class="modal">
    <h3>Ajouter...</h3>
    <button class="mbb p" onclick="hide('m-menu');openEclat(null)">* Eclat &mdash; note courte du quotidien</button>
    <button class="mbb" onclick="hide('m-menu');openCours(null,null)">Cours &mdash; formation, workshop, masterclass</button>
    <button class="mbb" onclick="hide('m-menu');openGalaxie(null)">+ Nouvelle galaxie</button>
    <button class="mbb" onclick="hide('m-menu');openPlanete(null,null)">+ Nouvelle planete</button>
    <button class="mbb" onclick="hide('m-menu');openZone(null)">🌌 Nouvelle nébuleuse</button>
    <button class="bcan" style="width:100%;margin-top:2px;" onclick="hide('m-menu')">Annuler</button>
  </div>
</div>

<!-- MODAL ZONE -->
<div class="overlay" id="m-zone" style="display:none" onclick="if(event.target===this)hide('m-zone')">
  <div class="modal">
    <h3 id="mz-t">Nouvelle nébuleuse</h3>
    <div class="fg"><label>Nom <span style="color:#6b7089;font-weight:400;">(optionnel)</span></label><input id="mz-nom" type="text" placeholder="Projet Alpha, Vie pro, Créatif..."></div>
    <div class="fg"><label>Couleur</label><div class="cpicks" id="mz-cols"></div></div>
    <div class="fg">
      <label>Largeur <span id="mz-rx-val" style="color:#a78bfa;font-weight:700;">200</span></label>
      <input id="mz-rx" type="range" min="80" max="800" value="200" oninput="document.getElementById('mz-rx-val').textContent=this.value" style="width:100%;accent-color:#a78bfa;margin-top:6px;">
    </div>
    <div class="fg">
      <label>Hauteur <span id="mz-ry-val" style="color:#a78bfa;font-weight:700;">140</span></label>
      <input id="mz-ry" type="range" min="60" max="600" value="140" oninput="document.getElementById('mz-ry-val').textContent=this.value" style="width:100%;accent-color:#a78bfa;margin-top:6px;">
    </div>
    <div class="actions">
      <button class="bok" onclick="saveZone()">Enregistrer</button>
      <button class="bcan" onclick="hide('m-zone')">Annuler</button>
      <button class="bdel" id="mz-del" style="display:none" onclick="delZone()">Supprimer</button>
    </div>
  </div>
</div>

<!-- MODAL GALAXIE -->
<div class="overlay" id="m-gal" style="display:none" onclick="if(event.target===this)hide('m-gal')">
  <div class="modal">
    <h3 id="mg-t">Nouvelle galaxie</h3>
    <div class="fg"><label>Nom *</label><input id="mg-nom" type="text" placeholder="Musique, Code, Histoire..."></div>
    <div class="fg"><label>Couleur</label><div class="cpicks" id="mg-cols"></div></div>
    <div class="actions">
      <button class="bok" onclick="saveGalaxie()">Enregistrer</button>
      <button class="bcan" onclick="hide('m-gal')">Annuler</button>
      <button class="bdel" id="mg-del" style="display:none" onclick="delGalaxie()">Supprimer</button>
    </div>
  </div>
</div>

<!-- MODAL PLANETE -->
<div class="overlay" id="m-pla" style="display:none" onclick="if(event.target===this)hide('m-pla')">
  <div class="modal">
    <h3 id="mp-t">Nouvelle planete</h3>
    <div class="fg"><label>Nom *</label><input id="mp-nom" type="text" placeholder="Synthese, Medieval, UI Design..."></div>
    <div class="fg"><label>Galaxies * (une ou plusieurs)</label><div class="chips" id="mp-gals"></div></div>
    <div class="fg"><label>Note globale</label>
      <div id="mp-stars" style="display:flex;gap:6px;font-size:24px;cursor:pointer;margin-top:4px;">
        <span data-v="1" onclick="setPlaNote(1)">☆</span>
        <span data-v="2" onclick="setPlaNote(2)">☆</span>
        <span data-v="3" onclick="setPlaNote(3)">☆</span>
        <span data-v="4" onclick="setPlaNote(4)">☆</span>
        <span data-v="5" onclick="setPlaNote(5)">☆</span>
      </div>
    </div>
    <div class="fg">
      <label>Progression <span id="mp-prog-val" style="color:#a78bfa;font-weight:700;">0%</span></label>
      <input id="mp-prog" type="range" min="0" max="100" value="0" oninput="document.getElementById('mp-prog-val').textContent=this.value+'%'" style="width:100%;accent-color:#a78bfa;margin-top:6px;">
    </div>
    <div class="actions">
      <button class="bok" onclick="savePlanete()">Enregistrer</button>
      <button class="bcan" onclick="hide('m-pla')">Annuler</button>
      <button class="bdel" id="mp-del" style="display:none" onclick="delPlanete()">Supprimer</button>
    </div>
  </div>
</div>

<!-- LECTURE ECLAT -->
<div id="view-ecl" onclick="if(event.target===this)closeEclatRead()">
  <div class="ecl-box">
    <div id="vecl-texte" class="ecl-texte"></div>
    <div class="ecl-footer">
      <div class="ecl-planets" id="vecl-planets"></div>
      <span id="vecl-date" style="font-size:11px;color:#6b7089;"></span>
      <a id="vecl-lien" href="#" target="_blank" style="font-size:11px;color:#a78bfa;display:none;">↗ lien</a>

<script>
var PALETTE=['#a78bfa','#c084fc','#818cf8','#6366f1','#8b5cf6','#d946ef','#f472b6','#fb7185','#e11d48','#f43f5e','#fb923c','#f59e0b','#fbbf24','#facc15','#a3e635','#4ade80','#34d399','#2dd4bf','#22d3ee','#38bdf8','#60a5fa','#3b82f6','#64748b','#94a3b8','#e2e8f0','#fef3c7','#ffe4e6','#f0fdf4'];

function load(){
  var def={galaxies:[],planetes:[],eclats:[],cours:[],zones:[]};
  try{
    var d=JSON.parse(localStorage.getItem('univers2')||'null')||def;
    if(!d.zones) d.zones=[];
    // Migration : gid -> gids
    d.planetes.forEach(function(p){
      if(p.gid&&!p.gids) p.gids=[p.gid];
      if(!p.gids) p.gids=[];
    });
    // Migration : pid -> pids pour les cours
    d.cours.forEach(function(c){
      if(c.pid&&!c.pids) c.pids=[c.pid];
      if(!c.pids) c.pids=[];
    });
    return d;
  }catch(e){return def;}
}
function save(d){
  // Garder gid = première galaxie pour compatibilité cours/exports
  d.planetes.forEach(function(p){
    if(p.gids&&p.gids.length) p.gid=p.gids[0];
  });
  localStorage.setItem('univers2',JSON.stringify(d));
  try{window.parent.postMessage({type:'univers2-updated'},'*');}catch(e){}
}

function initDemo(){
  var d=load();
  if(d.galaxies.length) return;
  d.galaxies=[
    {id:'g1',nom:'Musique',couleur:'#a78bfa',x:-220,y:-80},
    {id:'g2',nom:'Histoire',couleur:'#f59e0b',x:200,y:60}
  ];
  d.planetes=[
    {id:'p1',gid:'g1',nom:'Synthese',ax:-100,ay:-70},
    {id:'p2',gid:'g1',nom:'Mixage',ax:95,ay:-65},
    {id:'p3',gid:'g1',nom:'Harmonie',ax:-30,ay:105},
    {id:'p4',gid:'g2',nom:'Medieval',ax:-95,ay:-65},
    {id:'p5',gid:'g2',nom:'Prehistoire',ax:85,ay:75}
  ];
  save(d);
}

// ─── ETAT ───────────────────────────────────────────────────
var cam={x:0,y:0,scale:1};
var drag={on:false,sx:0,sy:0,cx:0,cy:0,moved:false};
var pinch={on:false,d0:0,s0:1};
var hovGal=null,hovPla=null,hovZone=null;
var openGals={};
var curPlanet=null,curCoursId=null;
var editEcl=null,editCrs=null,editGal=null,editPla=null,editSeaIdx=null;
var newGalPos=null; // position monde pour nouvelle galaxie via clic droit
var newPlaPos=null; // position monde pour nouvelle planète via clic droit
var curView='canvas';
var objs=[];

// ─── CANVAS ──────────────────────────────────────────────────
var cv,ctx,W,H;

function initCanvas(){
  cv=document.getElementById('cv');
  resize();
  window.addEventListener('resize',resize);
  // Bloquer tous les comportements natifs du browser sur le canvas
  cv.addEventListener('contextmenu',function(e){e.preventDefault();});
  document.addEventListener('contextmenu',function(e){if(e.target===cv)e.preventDefault();});
  cv.addEventListener('selectstart',function(e){e.preventDefault();});
  cv.addEventListener('mousedown',onMD);
  window.addEventListener('mousemove',onMM);
  window.addEventListener('mouseup',onMU);
  cv.addEventListener('wheel',onWH,{passive:false});
  cv.addEventListener('touchstart',onTS,{passive:false});
  cv.addEventListener('touchmove',onTM,{passive:false});
  cv.addEventListener('touchend',onTE,{passive:false});
  cv.addEventListener('touchcancel',function(e){e.preventDefault();},{passive:false});
  cv.addEventListener('touchforcechange',function(e){e.preventDefault();},{passive:false});
  // Bloquer la sélection et callout sur tout le document
  document.addEventListener('touchstart',function(e){if(e.target===cv)e.preventDefault();},{passive:false});
  // Menu contextuel desktop (clic droit)
  cv.addEventListener('contextmenu',function(e){
    e.preventDefault();e.stopPropagation();
    var rect=cv.getBoundingClientRect();
    var mx=e.clientX-rect.left, my=e.clientY-rect.top;
    var o=hitObj(mx,my);
    if(!o) showCtxMenu(e.clientX,e.clientY,sw(mx),sh(my));
  });
  cv.addEventListener('dblclick',function(e){
    var rect=cv.getBoundingClientRect();
    var mx=e.clientX-rect.left, my=e.clientY-rect.top;
    var o=hitObj(mx,my);
    if(!o){
      var z=hitZone(mx,my);
      if(z) showZonePanel(z); // double-clic = panneau résumé
    }
  });
  initDemo();
  initStars();
  draw();
  startStarAnim();

  // Minimap — clic/tap pour téléporter
  var mc=document.getElementById('minimap');
  mc.addEventListener('click',function(e){
    if(!mc._mm) return;
    var rect=mc.getBoundingClientRect();
    var mx2=(e.clientX-rect.left);
    var my2=(e.clientY-rect.top);
    // Convertir coords minimap → coords monde
    var worldX=(mx2-mc._mm.offX)/mc._mm.sc;
    var worldY=(my2-mc._mm.offY)/mc._mm.sc;
    // Centrer la caméra sur ce point
    cam.x=-(worldX*cam.scale);
    cam.y=-(worldY*cam.scale);
    draw();
  });
  mc.addEventListener('touchend',function(e){
    e.preventDefault();e.stopPropagation();
    if(!mc._mm||!e.changedTouches.length) return;
    var t=e.changedTouches[0];
    var rect=mc.getBoundingClientRect();
    var mx2=t.clientX-rect.left;
    var my2=t.clientY-rect.top;
    var worldX=(mx2-mc._mm.offX)/mc._mm.sc;
    var worldY=(my2-mc._mm.offY)/mc._mm.sc;
    cam.x=-(worldX*cam.scale);
    cam.y=-(worldY*cam.scale);
    draw();
  },{passive:false});
}

function resize(){
  var wr=document.getElementById('cv-wrap');
  W=wr.offsetWidth;H=wr.offsetHeight;
  cv.width=W;cv.height=H;draw();
}

// monde->ecran
function wx(x){return x*cam.scale+W/2+cam.x;}
function wy(y){return y*cam.scale+H/2+cam.y;}
// ecran->monde
function sw(x){return (x-W/2-cam.x)/cam.scale;}
function sh(y){return (y-H/2-cam.y)/cam.scale;}

function draw(){
  if(!cv)return;
  ctx=cv.getContext('2d');
  ctx.clearRect(0,0,W,H);
  drawBg();
  var d=load();
  objs=[];
  d.zones.forEach(function(z){drawZone(z);});
  d.galaxies.forEach(function(g){drawGalaxy(g,d);});
  d.eclats.forEach(function(e){drawEclat(e,d);});
  drawMinimap(d);
}

// ─── MINIMAP ─────────────────────────────────────────────────
var MM_W=148,MM_H=100; // taille du canvas minimap
function drawMinimap(d){
  var mc=document.getElementById('minimap');
  if(!mc) return;
  if(!d.galaxies.length){mc.classList.add('hidden');return;}
  mc.classList.remove('hidden');
  mc.width=MM_W;mc.height=MM_H;

  var mx2=mc.getContext('2d');
  mx2.clearRect(0,0,MM_W,MM_H);

  // Trouver les bornes du monde (galaxies + nébuleuses)
  var pts=d.galaxies.map(function(g){return {x:g.x,y:g.y};});
  d.zones.forEach(function(z){
    pts.push({x:z.x-(z.rx||200),y:z.y-(z.ry||140)});
    pts.push({x:z.x+(z.rx||200),y:z.y+(z.ry||140)});
  });
  var pad=80;
  var minX=Math.min.apply(null,pts.map(function(p){return p.x;}))-pad;
  var maxX=Math.max.apply(null,pts.map(function(p){return p.x;}))+pad;
  var minY=Math.min.apply(null,pts.map(function(p){return p.y;}))-pad;
  var maxY=Math.max.apply(null,pts.map(function(p){return p.y;}))+pad;
  var worldW=maxX-minX||1, worldH=maxY-minY||1;

  // Facteur d'échelle pour faire tenir le monde dans la minimap
  var scX=MM_W/worldW, scY=MM_H/worldH;
  var sc=Math.min(scX,scY)*0.9;
  var offX=(MM_W-worldW*sc)/2-minX*sc;
  var offY=(MM_H-worldH*sc)/2-minY*sc;

  function mwx(x){return x*sc+offX;}
  function mwy(y){return y*sc+offY;}

  // Nébuleuses
  d.zones.forEach(function(z){
    mx2.save();
    mx2.beginPath();
    mx2.ellipse(mwx(z.x),mwy(z.y),(z.rx||200)*sc,(z.ry||140)*sc,0,0,Math.PI*2);
    mx2.fillStyle=(z.couleur||'#a78bfa')+'22';
    mx2.fill();
    mx2.strokeStyle=(z.couleur||'#a78bfa')+'55';
    mx2.lineWidth=0.8;
    mx2.stroke();
    mx2.restore();
  });

  // Galaxies — point coloré
  d.galaxies.forEach(function(g){
    var gx=mwx(g.x),gy=mwy(g.y);
    // Halo
    var halo=mx2.createRadialGradient(gx,gy,0,gx,gy,7);
    halo.addColorStop(0,g.couleur+'55');halo.addColorStop(1,'transparent');
    mx2.beginPath();mx2.arc(gx,gy,7,0,Math.PI*2);
    mx2.fillStyle=halo;mx2.fill();
    // Point
    mx2.beginPath();mx2.arc(gx,gy,3,0,Math.PI*2);
    mx2.fillStyle=g.couleur;mx2.fill();
  });

  // Rectangle viewport
  // coin haut-gauche du viewport en coords monde
  var vx0=sw(0), vy0=sh(0);
  var vx1=sw(W), vy1=sh(H);
  var rx=mwx(vx0), ry=mwy(vy0);
  var rw=(vx1-vx0)*sc, rh=(vy1-vy0)*sc;
  mx2.strokeStyle='rgba(255,255,255,0.35)';
  mx2.lineWidth=1.2;
  mx2.strokeRect(rx,ry,rw,rh);
  mx2.fillStyle='rgba(255,255,255,0.04)';
  mx2.fillRect(rx,ry,rw,rh);

  // Stocker les paramètres pour le tap
  mc._mm={sc:sc,offX:offX,offY:offY,minX:minX,minY:minY};
}

// ─── ETOILES SCINTILLANTES ───────────────────────────────────
var _stars=[];
var _starsW=0,_starsH=0;
var _starRaf=null;
function initStars(){
  _starsW=W;_starsH=H;
  _stars=[];
  var seed=54321;
  for(var i=0;i<220;i++){
    seed=(seed*1664525+1013904223)&0xffffffff;
    var sx=((Math.abs(seed)%10000)/10000)*W;
    seed=(seed*1664525+1013904223)&0xffffffff;
    var sy=((Math.abs(seed)%10000)/10000)*H;
    seed=(seed*1664525+1013904223)&0xffffffff;
    var baseAlpha=0.25+((Math.abs(seed)%35)/100);
    seed=(seed*1664525+1013904223)&0xffffffff;
    var sr=0.4+((Math.abs(seed)%12)/10);
    seed=(seed*1664525+1013904223)&0xffffffff;
    var speed=0.0008+((Math.abs(seed)%12)/10000); // cycle ~6-12s
    seed=(seed*1664525+1013904223)&0xffffffff;
    var phase=((Math.abs(seed)%10000)/10000)*Math.PI*2;
    seed=(seed*1664525+1013904223)&0xffffffff;
    var amp=0.20+((Math.abs(seed)%30)/100); // 0.20..0.50
    _stars.push({x:sx,y:sy,base:baseAlpha,r:sr,speed:speed,phase:phase,amp:amp});
  }
}
function startStarAnim(){
  if(_starRaf) return;
  var lastT=0;
  function tick(t){
    // Ne redessiner les étoiles que si canvas visible
    var wrap=document.getElementById('cv-wrap');
    if(!wrap||wrap.style.display==='none'){_starRaf=requestAnimationFrame(tick);return;}
    var dt=t-lastT;
    // Limiter à ~30fps pour les étoiles (légèreté)
    if(dt>33){
      lastT=t;
      draw(); // redessine tout (les étoiles calculent leur alpha dans drawBg)
    }
    _starRaf=requestAnimationFrame(tick);
  }
  _starRaf=requestAnimationFrame(tick);
}

function drawBg(){
  var now=performance.now();
  // fond degrade subtil
  var bg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H));
  bg.addColorStop(0,'#0a0c1a');bg.addColorStop(1,'#060810');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  // Réinitialiser si taille écran changée
  if(_stars.length===0||_starsW!==W||_starsH!==H) initStars();
  // Étoiles scintillantes
  for(var i=0;i<_stars.length;i++){
    var s=_stars[i];
    var alpha=s.base+Math.sin(now*s.speed+s.phase)*s.amp;
    if(alpha<0.01) alpha=0.01;
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,'+alpha.toFixed(3)+')';
    ctx.fill();
  }
}

function drawZone(z){
  var sx=wx(z.x),sy=wy(z.y);
  var rx=(z.rx||200)*cam.scale, ry=(z.ry||140)*cam.scale;
  var col=z.couleur||'#a78bfa';
  var isHov=hovZone&&hovZone.id===z.id;

  ctx.save();

  var isSafari=/^((?!chrome|android).)*safari/i.test(navigator.userAgent);
  var canBlur=!isSafari;
  var blurR=Math.max(rx,ry)*0.38;

  if(canBlur){
    // Blur natif — fondu parfait (Chrome, Firefox)
    ctx.filter='blur('+blurR+'px)';
    var grad=ctx.createRadialGradient(sx,sy,0,sx,sy,Math.max(rx,ry)*0.72);
    grad.addColorStop(0,   col+(isHov?'55':'3a'));
    grad.addColorStop(0.55,col+(isHov?'33':'22'));
    grad.addColorStop(1,   col+'00');
    ctx.beginPath();
    ctx.ellipse(sx,sy,rx*0.85,ry*0.85,0,0,Math.PI*2);
    ctx.fillStyle=grad;
    ctx.fill();
    ctx.filter='none';
  } else {
    // Fallback Safari : gradient multi-stops très progressif
    var grad2=ctx.createRadialGradient(sx,sy,0,sx,sy,Math.max(rx,ry));
    grad2.addColorStop(0,   col+(isHov?'44':'2e'));
    grad2.addColorStop(0.35,col+(isHov?'38':'28'));
    grad2.addColorStop(0.6, col+(isHov?'22':'18'));
    grad2.addColorStop(0.8, col+(isHov?'12':'0a'));
    grad2.addColorStop(1,   col+'00');
    ctx.beginPath();
    ctx.ellipse(sx,sy,rx,ry,0,0,Math.PI*2);
    ctx.fillStyle=grad2;
    ctx.fill();
  }

  // Bord pointillé
  ctx.beginPath();
  ctx.ellipse(sx,sy,rx,ry,0,0,Math.PI*2);
  ctx.strokeStyle=col+(isHov?'38':'1e');
  ctx.lineWidth=(isHov?1.6:1.0)*cam.scale;
  ctx.setLineDash([5*cam.scale,9*cam.scale]);
  ctx.stroke();
  ctx.setLineDash([]);

  // Nom
  if(z.nom){
    ctx.font='700 '+(13*Math.max(.55,cam.scale))+'px system-ui';
    ctx.fillStyle=col+(isHov?'bb':'77');
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(z.nom.toUpperCase(),sx,sy-ry*0.68);
  }

  ctx.restore();
  // Les nébuleuses ne sont pas dans objs — détectées via hitZone séparément
}

function hitZone(ex,ey){
  var d=load();
  for(var i=(d.zones||[]).length-1;i>=0;i--){
    var z=d.zones[i];
    var sx=wx(z.x),sy=wy(z.y);
    var rx=(z.rx||200)*cam.scale,ry=(z.ry||140)*cam.scale;
    var dx=(ex-sx)/rx,dy=(ey-sy)/ry;
    if(dx*dx+dy*dy<=1) return z;
  }
  return null;
}

function drawGalaxy(g,d){
  var sx=wx(g.x),sy=wy(g.y);
  var br=26*cam.scale;
  var isOpen=!!openGals[g.id];
  var isHov=hovGal&&hovGal.id===g.id;

  // Halo nebuleux
  var hr=isOpen?br*6:br*3.8;
  var halo=ctx.createRadialGradient(sx,sy,0,sx,sy,hr);
  halo.addColorStop(0,g.couleur+'28');
  halo.addColorStop(0.45,g.couleur+'0d');
  halo.addColorStop(1,'transparent');
  ctx.beginPath();ctx.arc(sx,sy,hr,0,Math.PI*2);
  ctx.fillStyle=halo;ctx.fill();

  // Etoile centrale
  var r=isHov?br*1.1:br;
  var grad=ctx.createRadialGradient(sx-r*.3,sy-r*.4,0,sx,sy,r);
  grad.addColorStop(0,lighten(g.couleur,.45));grad.addColorStop(1,g.couleur);
  ctx.beginPath();ctx.arc(sx,sy,r,0,Math.PI*2);
  ctx.fillStyle=grad;ctx.fill();

  if(isHov||isOpen){
    ctx.beginPath();ctx.arc(sx,sy,r*1.45,0,Math.PI*2);
    ctx.strokeStyle=g.couleur+'3a';ctx.lineWidth=1.5*cam.scale;ctx.stroke();
  }

  // Nom
  ctx.save();
  ctx.font='600 '+(12*Math.max(.6,cam.scale))+'px system-ui';
  ctx.fillStyle=isOpen||isHov?g.couleur:'rgba(255,255,255,.7)';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText(g.nom,sx,sy+r+5*cam.scale);
  ctx.restore();

  objs.push({type:'g',id:g.id,x:sx,y:sy,r:r,data:g});

  if(isOpen){
    var pls=d.planetes.filter(function(p){return (p.gids||[p.gid]).indexOf(g.id)>=0;});
    pls.forEach(function(p){drawPlanete(p,g,d);});
  }
}

function drawPlanete(p,callerG,d){
  // Toutes les galaxies parentes de cette planète
  var gids=p.gids||[p.gid];
  var parentGs=gids.map(function(gid){return d.galaxies.find(function(x){return x.id===gid;});}).filter(Boolean);
  if(!parentGs.length) return;

  // Position = centroïde des galaxies parentes
  var cx2=parentGs.reduce(function(s,g){return s+g.x;},0)/parentGs.length;
  var cy2=parentGs.reduce(function(s,g){return s+g.y;},0)/parentGs.length;
  var ax=cx2+p.ax, ay=cy2+p.ay;
  var sx=wx(ax),sy=wy(ay);

  var nc=d.cours.filter(function(c){return (c.pids||(c.pid?[c.pid]:[])).indexOf(p.id)>=0;}).length;
  var ne=d.eclats.filter(function(e){return (e.pids||[]).indexOf(p.id)>=0;}).length;
  var pr=(13+Math.min((nc+ne)*2,18))*cam.scale;
  var isHov=hovPla&&hovPla.id===p.id;
  var isSel=curPlanet&&curPlanet.id===p.id;

  // Lignes vers chaque galaxie parente (seulement si ouverte)
  parentGs.forEach(function(g){
    if(!openGals[g.id]) return;
    var gsx=wx(g.x),gsy=wy(g.y);
    ctx.beginPath();ctx.moveTo(gsx,gsy);ctx.lineTo(sx,sy);
    ctx.strokeStyle=g.couleur+'1e';ctx.lineWidth=1*cam.scale;ctx.stroke();
  });

  // Halo planete (couleur de la première galaxie parente ouverte)
  var mainG=parentGs.find(function(g){return openGals[g.id];})||parentGs[0];
  var ph=ctx.createRadialGradient(sx,sy,0,sx,sy,pr*2.4);
  ph.addColorStop(0,mainG.couleur+'18');ph.addColorStop(1,'transparent');
  ctx.beginPath();ctx.arc(sx,sy,pr*2.4,0,Math.PI*2);ctx.fillStyle=ph;ctx.fill();

  // Corps
  var r2=isHov||isSel?pr*1.1:pr;
  var pg=ctx.createRadialGradient(sx-r2*.3,sy-r2*.35,0,sx,sy,r2);
  pg.addColorStop(0,lighten(mainG.couleur,.28));pg.addColorStop(1,mainG.couleur+'bb');
  ctx.beginPath();ctx.arc(sx,sy,r2,0,Math.PI*2);ctx.fillStyle=pg;ctx.fill();

  // Anneaux multi-galaxies si plusieurs parents
  if(parentGs.length>1){
    var segAngle=Math.PI*2/parentGs.length;
    parentGs.forEach(function(g,i){
      ctx.beginPath();
      ctx.arc(sx,sy,r2*1.38,i*segAngle,(i+1)*segAngle);
      ctx.strokeStyle=g.couleur+'99';ctx.lineWidth=2*cam.scale;ctx.stroke();
    });
  } else if(isHov||isSel){
    ctx.beginPath();ctx.arc(sx,sy,r2*1.38,0,Math.PI*2);
    ctx.strokeStyle=mainG.couleur+'50';ctx.lineWidth=1.2*cam.scale;ctx.stroke();
  }

  var fs=10*Math.max(.6,cam.scale);
  ctx.save();
  ctx.font=fs+'px system-ui';
  ctx.fillStyle=isHov||isSel?'rgba(255,255,255,.95)':'rgba(255,255,255,.6)';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText(p.nom,sx,sy+r2+4*cam.scale);
  if(nc+ne>0){
    ctx.font=(fs*.85)+'px system-ui';ctx.fillStyle='rgba(255,255,255,.3)';
    ctx.fillText(nc+' cours / '+ne+' eclats',sx,sy+r2+4*cam.scale+fs+3);
  }
  ctx.restore();

  objs.push({type:'p',id:p.id,x:sx,y:sy,r:r2,gid:mainG.id,data:p,gdata:mainG});
}

function drawEclat(e,d){
  if(!(e.pids&&e.pids.length)) return;
  // Collecter TOUTES les planètes avec leur position, visibles ou non
  var allPositions=[];
  var anyVisible=false;
  e.pids.forEach(function(pid){
    var p=d.planetes.find(function(x){return x.id===pid;});
    if(!p) return;
    var gids=p.gids||[p.gid];
    var parentGs=gids.map(function(gid){return d.galaxies.find(function(x){return x.id===gid;});}).filter(Boolean);
    if(!parentGs.length) return;
    var openParentGs=parentGs.filter(function(g){return openGals[g.id];});
    var isVisible=openParentGs.length>0;
    if(isVisible) anyVisible=true;
    var cx2=parentGs.reduce(function(s,g){return s+g.x;},0)/parentGs.length;
    var cy2=parentGs.reduce(function(s,g){return s+g.y;},0)/parentGs.length;
    var mainG=openParentGs[0]||parentGs[0];
    allPositions.push({wx:cx2+p.ax,wy:cy2+p.ay,col:mainG.couleur,visible:isVisible});
  });
  // L'éclat n'apparaît que si au moins une planète liée est visible
  if(!anyVisible) return;
  var positions=allPositions;

  var cx2=positions.reduce(function(s,p){return s+p.wx;},0)/positions.length;
  var cy2=positions.reduce(function(s,p){return s+p.wy;},0)/positions.length;
  var sx=wx(cx2),sy=wy(cy2);
  var er=5*cam.scale;

  positions.forEach(function(pos){
    ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(wx(pos.wx),wy(pos.wy));
    ctx.strokeStyle=pos.col+'2a';ctx.lineWidth=.7*cam.scale;ctx.stroke();
  });

  ctx.beginPath();ctx.arc(sx,sy,er,0,Math.PI*2);
  ctx.fillStyle='rgba(255,252,200,.6)';ctx.fill();
  ctx.beginPath();ctx.arc(sx,sy,er*2,0,Math.PI*2);
  ctx.fillStyle='rgba(255,250,180,.08)';ctx.fill();

  objs.push({type:'e',id:e.id,x:sx,y:sy,r:er*2.5,data:e});
}

function hideCtxMenu(){var m=document.getElementById('ctx-menu');if(m)m.remove();}

function hitObj(ex,ey){
  for(var i=objs.length-1;i>=0;i--){
    var o=objs[i];var dx=o.x-ex,dy=o.y-ey;
    if(Math.sqrt(dx*dx+dy*dy)<=o.r*1.2) return o;
  }
  return null;
}

var dragZone=null,dragZoneOx=0,dragZoneOy=0,dragZoneGals=[];
var dragGal=null,dragGalOx=0,dragGalOy=0;
var dragPla=null,dragPlaOax=0,dragPlaOay=0;
var dragZonePending=null,dragZoneTimer=null;

function getGalsInZone(z,galaxies){
  return galaxies.filter(function(g){
    var dx=(g.x-z.x)/(z.rx||200),dy=(g.y-z.y)/(z.ry||140);
    return dx*dx+dy*dy<=1;
  });
}

function onMD(e){
  drag.on=true;drag.sx=e.clientX;drag.sy=e.clientY-48;drag.cx=cam.x;drag.cy=cam.y;drag.moved=false;
  dragZone=null;dragGal=null;dragPla=null;dragZonePending=null;dragZoneGals=[];
  clearTimeout(dragZoneTimer);
  var rect=cv.getBoundingClientRect();
  var mx=e.clientX-rect.left,my=e.clientY-rect.top;
  var o=hitObj(mx,my);
  if(o&&o.type==='g'){
    dragGal=o.data;dragGalOx=o.data.x;dragGalOy=o.data.y;
  } else if(o&&o.type==='p'){
    dragPla=o.data;dragPlaOax=o.data.ax;dragPlaOay=o.data.ay;
  } else if(!o){
    var z=hitZone(mx,my);
    if(z){
      dragZonePending=z;
      dragZoneTimer=setTimeout(function(){
        if(dragZonePending&&!drag.moved){
          dragZone=dragZonePending;
          dragZoneOx=dragZonePending.x;dragZoneOy=dragZonePending.y;
          // Capturer les galaxies contenues et leurs offsets
          var d=load();
          dragZoneGals=getGalsInZone(dragZonePending,d.galaxies).map(function(g){
            return {id:g.id,ox:g.x,oy:g.y};
          });
          cv.style.cursor='default';
        }
        dragZonePending=null;
      },300);
    }
  }
}

function onMM(e){
  if(drag.on){
    var dx=e.clientX-drag.sx,dy=(e.clientY-48)-drag.sy;
    if(Math.abs(dx)+Math.abs(dy)>3){
      drag.moved=true;
      // Si on bouge avant que le timer zone ne se déclenche, annuler
      if(dragZonePending){clearTimeout(dragZoneTimer);dragZonePending=null;}
    }
    if(dragGal){
      cv.style.cursor='default';
      var newGx=dragGalOx+dx/cam.scale;
      var newGy=dragGalOy+dy/cam.scale;
      var dd=load();
      var gg=dd.galaxies.find(function(x){return x.id===dragGal.id;});
      if(gg){gg.x=newGx;gg.y=newGy;localStorage.setItem('univers2',JSON.stringify(dd));}
      draw();return;
    }
    if(dragPla){
      cv.style.cursor='default';
      var dd=load();
      var pp=dd.planetes.find(function(x){return x.id===dragPla.id;});
      if(pp){pp.ax=dragPlaOax+dx/cam.scale;pp.ay=dragPlaOay+dy/cam.scale;localStorage.setItem('univers2',JSON.stringify(dd));}
      draw();return;
    }
    if(dragZone){
      var newX=dragZoneOx+dx/cam.scale;
      var newY=dragZoneOy+dy/cam.scale;
      var dd=load();
      var zz=dd.zones.find(function(x){return x.id===dragZone.id;});
      if(zz){
        zz.x=newX;zz.y=newY;
        // Déplacer aussi les galaxies contenues
        dragZoneGals.forEach(function(dg){
          var gg=dd.galaxies.find(function(x){return x.id===dg.id;});
          if(gg){gg.x=dg.ox+(newX-dragZoneOx);gg.y=dg.oy+(newY-dragZoneOy);}
        });
        localStorage.setItem('univers2',JSON.stringify(dd));
      }
      draw();return;
    }
    cam.x=drag.cx+dx;cam.y=drag.cy+dy;draw();return;
  }
  if(curView!=='canvas') return;
  var rect=cv.getBoundingClientRect();
  var mx=e.clientX-rect.left,my=e.clientY-rect.top;
  var o=hitObj(mx,my);
  var ph=hovGal,pp=hovPla,pz=hovZone;
  hovGal=(o&&o.type==='g')?o.data:null;
  hovPla=(o&&o.type==='p')?o.data:null;
  hovZone=(!o)?hitZone(mx,my):null;
  if(hovGal!==ph||hovPla!==pp||hovZone!==pz) draw();
  var tip=document.getElementById('tip');
  if(o){
    cv.style.cursor='default';
    if(o.type==='g'){
      var np=load().planetes.filter(function(p){return p.gid===o.id;}).length;
      tip.innerHTML='<strong>'+esc(o.data.nom)+'</strong><br><span style="color:#6b7089;font-size:11px;">'+np+' planete'+(np!==1?'s':'')+'</span>';
    } else if(o.type==='p'){
      var d2=load();
      var nc=d2.cours.filter(function(c){return (c.pids||(c.pid?[c.pid]:[])).indexOf(o.id)>=0;}).length;
      var ne=d2.eclats.filter(function(e2){return (e2.pids||[]).indexOf(o.id)>=0;}).length;
      tip.innerHTML='<strong>'+esc(o.data.nom)+'</strong><br><span style="color:#6b7089;font-size:11px;">'+nc+' cours &middot; '+ne+' eclats</span>';
    } else {
      tip.innerHTML='<span style="font-size:11px;">'+esc((o.data.texte||'').slice(0,60))+'</span>';
    }
    tip.style.left=(e.clientX+13)+'px';tip.style.top=(e.clientY-8)+'px';tip.style.opacity='1';
  } else if(hovZone){
    tip.style.opacity='0';tip.innerHTML='';
  } else {cv.style.cursor='default';tip.style.opacity='0';tip.innerHTML='';}
}

function onMU(e){
  clearTimeout(dragZoneTimer);dragZonePending=null;
  if(!drag.on) return;drag.on=false;
  if(drag.moved){
    dragZone=null;dragGal=null;dragPla=null;
    draw();return;
  }
  dragZone=null;dragGal=null;dragPla=null;
  var rect=cv.getBoundingClientRect();
  click(e.clientX-rect.left,e.clientY-rect.top);
}

function click(mx,my){
  var o=hitObj(mx,my);
  if(!o){
    // Clic dans le vide ou dans une nébuleuse : ferme juste le panneau ouvert
    closePanel();return;
  }
  if(o.type==='g'){
    openGals[o.id]=!openGals[o.id];
    if(!openGals[o.id]&&curPlanet){
      var d=load();
      var p=d.planetes.find(function(x){return x.id===curPlanet.id;});
      var gids=p?(p.gids||[p.gid]):[];
      var anyOpen=gids.some(function(gid){return openGals[gid];});
      if(!anyOpen) closePanel();
    }
    draw();
  } else if(o.type==='p'){
    openPanel(o.data,o.gdata);
  } else if(o.type==='e'){
    openEclatRead(o.id);
  }
}

function zoomAt(mx,my,factor){
  var wx0=sw(mx),wy0=sh(my);
  cam.scale=Math.max(.18,Math.min(3.5,cam.scale*factor));
  cam.x=mx-wx0*cam.scale-W/2;
  cam.y=my-wy0*cam.scale-H/2;
  draw();
}

function onWH(e){
  e.preventDefault();
  var rect=cv.getBoundingClientRect();
  zoomAt(e.clientX-rect.left,e.clientY-rect.top,e.deltaY>0?.88:1.14);
}

function pdist(t){var dx=t[0].clientX-t[1].clientX,dy=t[0].clientY-t[1].clientY;return Math.sqrt(dx*dx+dy*dy);}

var longPressTimer=null;
var longPressPos=null;

function onTS(e){
  e.preventDefault(); // bloque menu natif, sélection, zoom browser
  if(e.touches.length===2){pinch.on=true;pinch.d0=pdist(e.touches);pinch.s0=cam.scale;return;}
  var t=e.touches[0];
  drag.on=true;drag.moved=false;drag.sx=t.clientX;drag.sy=t.clientY-48;drag.cx=cam.x;drag.cy=cam.y;
  dragZone=null;dragGal=null;dragPla=null;dragZonePending=null;clearTimeout(dragZoneTimer);
  var rect=cv.getBoundingClientRect();
  var mx=t.clientX-rect.left, my=t.clientY-rect.top;
  var o=hitObj(mx,my);
  if(o&&o.type==='g'){
    dragGal=o.data;dragGalOx=o.data.x;dragGalOy=o.data.y;
  } else if(o&&o.type==='p'){
    dragPla=o.data;dragPlaOax=o.data.ax;dragPlaOay=o.data.ay;
  }
  // Long press → menu contextuel (fonctionne aussi dans une nébuleuse)
  longPressPos={cx:t.clientX,cy:t.clientY,wx:sw(mx),wy:sh(my)};
  longPressTimer=setTimeout(function(){
    if(!drag.moved){
      var o2=hitObj(mx,my);
      if(!o2) showCtxMenu(longPressPos.cx,longPressPos.cy,longPressPos.wx,longPressPos.wy);
    }
  },520);
  if(!o){
    var z=hitZone(mx,my);
    if(z){
      dragZonePending=z;
      dragZoneTimer=setTimeout(function(){
        if(dragZonePending&&!drag.moved){
          dragZone=dragZonePending;dragZoneOx=dragZonePending.x;dragZoneOy=dragZonePending.y;
          var d=load();
          dragZoneGals=getGalsInZone(dragZonePending,d.galaxies).map(function(g){
            return {id:g.id,ox:g.x,oy:g.y};
          });
        }
        dragZonePending=null;
      },650);
    }
  }
}

function onTM(e){
  if(pinch.on&&e.touches.length===2){
    e.preventDefault();
    var nd=pdist(e.touches);
    var mc={x:(e.touches[0].clientX+e.touches[1].clientX)/2,y:(e.touches[0].clientY+e.touches[1].clientY)/2};
    var rect=cv.getBoundingClientRect();
    zoomAt(mc.x-rect.left,mc.y-rect.top,nd/pinch.d0*pinch.s0/cam.scale);
    pinch.d0=nd;return;
  }
  if(!drag.on||e.touches.length!==1) return;
  var t=e.touches[0];
  var dx=t.clientX-drag.sx,dy=(t.clientY-48)-drag.sy;
  if(Math.abs(dx)+Math.abs(dy)>3){
    drag.moved=true;
    clearTimeout(longPressTimer);
    if(dragZonePending){clearTimeout(dragZoneTimer);dragZonePending=null;}
  }
  if(dragGal){
    var newGx=dragGalOx+dx/cam.scale;
    var newGy=dragGalOy+dy/cam.scale;
    var dd=load();var gg=dd.galaxies.find(function(x){return x.id===dragGal.id;});
    if(gg){gg.x=newGx;gg.y=newGy;localStorage.setItem('univers2',JSON.stringify(dd));}
    draw();return;
  }
  if(dragPla){
    var dd=load();
    var pp=dd.planetes.find(function(x){return x.id===dragPla.id;});
    if(pp){pp.ax=dragPlaOax+dx/cam.scale;pp.ay=dragPlaOay+dy/cam.scale;localStorage.setItem('univers2',JSON.stringify(dd));}
    draw();return;
  }
  if(dragZone){
    var newX=dragZoneOx+dx/cam.scale;
    var newY=dragZoneOy+dy/cam.scale;
    var dd2=load();var zz=dd2.zones.find(function(x){return x.id===dragZone.id;});
    if(zz){
      zz.x=newX;zz.y=newY;
      dragZoneGals.forEach(function(dg){
        var gg=dd2.galaxies.find(function(x){return x.id===dg.id;});
        if(gg){gg.x=dg.ox+(newX-dragZoneOx);gg.y=dg.oy+(newY-dragZoneOy);}
      });
      localStorage.setItem('univers2',JSON.stringify(dd2));
    }
    draw();return;
  }
  cam.x=drag.cx+dx;cam.y=drag.cy+dy;draw();
}

function onTE(e){
  clearTimeout(longPressTimer);clearTimeout(dragZoneTimer);dragZonePending=null;
  if(pinch.on){pinch.on=false;return;}
  if(!drag.on) return;drag.on=false;
  if(drag.moved){dragZone=null;dragGal=null;dragPla=null;draw();return;}
  dragZone=null;dragGal=null;dragPla=null;
  var t=e.changedTouches[0];
  var rect=cv.getBoundingClientRect();
  click(t.clientX-rect.left,t.clientY-rect.top);
}

// ─── PANNEAU ─────────────────────────────────────────────────
function openPanel(planet,gdata){
  curPlanet=planet;
  var d=load();
  var gids=planet.gids||[planet.gid];
  var parentGs=gids.map(function(gid){return d.galaxies.find(function(x){return x.id===gid;});}).filter(Boolean);
  var mainG=gdata||(parentGs[0]);
  document.getElementById('ph-name').textContent=planet.nom;
  document.getElementById('ph-name').style.color=mainG?mainG.couleur:'#a78bfa';
  // Sous-titre : toutes les galaxies parentes
  var subTxt=parentGs.length>1
    ? parentGs.map(function(g){return g.nom;}).join(' · ')

function showZonePanel(z){

// ─── RECHERCHE ───────────────────────────────────────────────
function stripHtml(s){return (s||'').replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim();}
function doSearch(q){
  var box=document.getElementById('sr');
  if(!q.trim()){box.style.display='none';return;}
  q=q.toLowerCase();
  var d=load();var res=[];
  // Galaxies
  d.galaxies.forEach(function(g){
    if((g.nom||'').toLowerCase().indexOf(q)<0) return;
    res.push({type:'galaxie',id:g.id,txt:g.nom,tags:'',col:g.couleur});
  });
  // Planètes
  d.planetes.forEach(function(p){
    if((p.nom||'').toLowerCase().indexOf(q)<0) return;
    var gids=p.gids||[p.gid];
    var gnames=gids.map(function(gid){var g=d.galaxies.find(function(x){return x.id===gid;});return g?g.nom:'';}).filter(Boolean).join(', ');
    res.push({type:'planete',id:p.id,txt:p.nom,tags:gnames});
  });
  // Éclats (texte)
  d.eclats.forEach(function(e){
    if((e.texte||'').toLowerCase().indexOf(q)<0) return;
    var tags=(e.pids||[]).map(function(pid){var p=d.planetes.find(function(x){return x.id===pid;});return p?p.nom:'';}).filter(Boolean).join(', ');
    res.push({type:'eclat',id:e.id,txt:e.texte,tags:tags});
  });
  // Cours (titre + description)
  d.cours.forEach(function(c){
    if((c.titre||'').toLowerCase().indexOf(q)<0&&(c.description||'').toLowerCase().indexOf(q)<0) return;
    var cPids=c.pids||(c.pid?[c.pid]:[]);
    var cPs=cPids.map(function(pid){return d.planetes.find(function(x){return x.id===pid;});}).filter(Boolean);
    var cTag=cPs.map(function(pp){var pg=d.galaxies.find(function(x){return x.id===(pp.gids?pp.gids[0]:pp.gid);});return (pg?pg.nom+' › ':'')+pp.nom;}).join(' · ');
    res.push({type:'cours',id:c.id,txt:c.titre,tags:cTag});
  });
  // Séances (titre + notes HTML strippées)
  d.cours.forEach(function(c){
    (c.seances||[]).forEach(function(s,i){
      var notesText=stripHtml(s.notes||'');
      var inTitle=(s.titre||'').toLowerCase().indexOf(q)>=0;
      var inNotes=notesText.toLowerCase().indexOf(q)>=0;
      if(!inTitle&&!inNotes) return;
      // Extrait contextuel autour du mot trouvé
      var excerpt='';
      if(inNotes){
        var idx=notesText.toLowerCase().indexOf(q);
        var start=Math.max(0,idx-35);
        var end=Math.min(notesText.length,idx+q.length+55);
        excerpt=(start>0?'…':'')+notesText.slice(start,end)+(end<notesText.length?'…':'');
      }
      res.push({type:'seance',cid:c.id,sid:i,txt:(s.titre||fmtDate(s.date)||'Séance'),sub:excerpt,tags:c.titre});
    });
  });
  if(!res.length){box.innerHTML='<div class="sri"><div class="srx" style="color:#6b7089;">Aucun résultat</div></div>';box.style.display='block';return;}
  var h='';
  res.slice(0,12).forEach(function(r){
    var icon=r.type==='galaxie'?'✨':r.type==='planete'?'🪐':r.type==='eclat'?'*':r.type==='cours'?'📚':'📝';
    var label=r.type==='galaxie'?'Galaxie':r.type==='planete'?'Planète':r.type==='eclat'?'Éclat':r.type==='cours'?'Cours':'Séance';
    var act=r.type==='cours'?"openCoursDetail('"+r.id+"')"
      :r.type==='seance'?"openCoursDetail('"+r.cid+"')"
      :r.type==='eclat'?"openEclatRead('"+r.id+"')"
      :r.type==='planete'?"focusPlanet('"+r.id+"')"
      :"focusGalaxyCanvas('"+r.id+"')";
    h+='<div class="sri" onclick="'+act+';hideSearch();">'+
      '<div class="srt">'+icon+' '+label+'</div>'+
      '<div class="srx">'+esc((r.txt||'').slice(0,80))+'</div>'+
      (r.sub?'<div class="srg" style="font-style:italic;">'+esc(r.sub)+'</div>':'')+ 
      (r.tags?'<div class="srg">'+esc(r.tags)+'</div>':'')+
      '</div>';
  });
  box.innerHTML=h;box.style.display='block';
}
function hideSearch(){document.getElementById('sr').style.display='none';}

function focusGalaxyCanvas(gid){
  var d=load();var g=d.galaxies.find(function(x){return x.id===gid;});
  if(!g) return;
  showCanvas();
  openGals[gid]=true;
  // Centrer la caméra sur la galaxie
  cam.x=-(g.x*cam.scale);cam.y=-(g.y*cam.scale);
  draw();
}
function focusPlanet(pid){
  var d=load();var p=d.planetes.find(function(x){return x.id===pid;});
  if(!p) return;
  showCanvas();
  var gids=p.gids||[p.gid];
  gids.forEach(function(gid){openGals[gid]=true;});
  var parentGs=gids.map(function(gid){return d.galaxies.find(function(x){return x.id===gid;});}).filter(Boolean);
  var cx2=parentGs.reduce(function(s,g){return s+g.x;},0)/(parentGs.length||1);
  var cy2=parentGs.reduce(function(s,g){return s+g.y;},0)/(parentGs.length||1);
  cam.x=-((cx2+p.ax)*cam.scale);cam.y=-((cy2+p.ay)*cam.scale);
  draw();
  setTimeout(function(){openPanel(p,parentGs[0]);},80);
}

function exportJSON(){
  var d=load();
  var json=JSON.stringify(d,null,2);
  var blob=new Blob([json],{type:'application/json;charset=utf-8'});
  var a=document.createElement('a');
  var date=new Date().toISOString().slice(0,10);
  a.href=URL.createObjectURL(blob);
  a.download='univers-'+date+'.json';
  a.click();
  toast('Univers exporté ✓');
}
function importJSON(input){
  var file=input.files[0];if(!file) return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var d=JSON.parse(ev.target.result);
      // Validation minimale
      if(!d.galaxies||!d.planetes||!d.eclats||!d.cours) throw new Error('Format invalide');
      if(!d.zones) d.zones=[];
      if(!confirm('Importer cet univers ? Ton univers actuel sera remplacé.')) return;
      save(d);
      openGals={};curPlanet=null;
      draw();if(curView==='texte')renderTexte();
      toast('Univers importé ✓');
    }catch(err){
      toast('Erreur : fichier invalide');
    }
    input.value='';
  };
  reader.readAsText(file);
}

var selCol=PALETTE[0];
function openGalaxie(editId,pos){

function pickCol(el,c){selCol=c;document.querySelectorAll('#mg-cols .cpick').forEach(function(e){e.classList.remove('on');});el.classList.add('on');}
function saveGalaxie(){
  var nom=document.getElementById('mg-nom').value.trim();
  if(!nom){toast('Nom obligatoire');return;}
  var d=load();
  if(editGal){var g=d.galaxies.find(function(x){return x.id===editGal;});if(g){g.nom=nom;g.couleur=selCol;}}
  else{
    var px=newGalPos?newGalPos.x:(Math.cos(Math.random()*Math.PI*2)*(250+Math.random()*200));
    var py=newGalPos?newGalPos.y:(Math.sin(Math.random()*Math.PI*2)*(250+Math.random()*200));
    d.galaxies.push({id:'g'+Date.now(),nom:nom,couleur:selCol,x:px,y:py});
    newGalPos=null;
  }
  save(d);hide('m-gal');toast('Galaxie enregistree');draw();if(curView==='texte')renderTexte();
}
function delGalaxie(){
  if(!editGal) return;
  var d=load();var g=d.galaxies.find(function(x){return x.id===editGal;});
  if(!g||!confirm('Supprimer "'+g.nom+'" et ses planetes exclusives ?')) return;
  // Planètes qui n'appartiennent QU'à cette galaxie → supprimer
  var exclusivePids=d.planetes.filter(function(p){
    var gs=p.gids||[p.gid];return gs.length===1&&gs[0]===editGal;
  }).map(function(p){return p.id;});
  // Planètes multi-galaxies → retirer juste cette galaxie
  d.planetes.forEach(function(p){
    p.gids=(p.gids||[p.gid]).filter(function(gid){return gid!==editGal;});
    if(p.gids.length) p.gid=p.gids[0];
  });
  d.planetes=d.planetes.filter(function(p){return p.gids.length>0;});
  d.cours.forEach(function(c){
    c.pids=(c.pids||(c.pid?[c.pid]:[])).filter(function(pid){return exclusivePids.indexOf(pid)<0;});
    if(c.pids.length) c.pid=c.pids[0];
  });
  d.cours=d.cours.filter(function(c){return (c.pids||(c.pid?[c.pid]:[])).length>0;});
  d.eclats.forEach(function(e){e.pids=(e.pids||[]).filter(function(pid){return exclusivePids.indexOf(pid)<0;});});
  d.galaxies=d.galaxies.filter(function(x){return x.id!==editGal;});
  delete openGals[editGal];
  save(d);hide('m-gal');toast('Galaxie supprimee');closePanel();draw();if(curView==='texte')renderTexte();
}

  });

  document.getElementById('mp-prog-val').textContent=prog+'%';

function savePlanete(){
  var nom=document.getElementById('mp-nom').value.trim();
  var gids=[];
  document.querySelectorAll('#mp-gals .chip.on').forEach(function(b){gids.push(b.dataset.gid);});
  if(!nom){toast('Nom obligatoire');return;}
  if(!gids.length){toast('Choisis au moins une galaxie');return;}
  var d=load();
  if(editPla){
    var p=d.planetes.find(function(x){return x.id===editPla;});
    if(p){p.nom=nom;p.gids=gids;p.gid=gids[0];p.note=window._plaNoteVal||0;p.prog=parseInt(document.getElementById('mp-prog').value)||0;}
  } else {
    var ax,ay;
    if(newPlaPos){
      // Calculer offset par rapport au centroïde des galaxies parentes
      var parentGs=gids.map(function(gid){return d.galaxies.find(function(x){return x.id===gid;});}).filter(Boolean);
      var cx2=parentGs.reduce(function(s,g){return s+g.x;},0)/parentGs.length;
      var cy2=parentGs.reduce(function(s,g){return s+g.y;},0)/parentGs.length;
      ax=newPlaPos.x-cx2; ay=newPlaPos.y-cy2;
      newPlaPos=null;
    } else {
      var a=Math.random()*Math.PI*2,r2=75+Math.random()*55;
      ax=Math.cos(a)*r2; ay=Math.sin(a)*r2;
    }
    d.planetes.push({id:'p'+Date.now(),gids:gids,gid:gids[0],nom:nom,ax:ax,ay:ay,note:window._plaNoteVal||0,prog:parseInt(document.getElementById('mp-prog').value)||0});
    gids.forEach(function(gid){openGals[gid]=true;});
  }
  save(d);hide('m-pla');toast('Planete enregistree');draw();if(curView==='texte')renderTexte();
}
function delPlanete(){
  if(!editPla) return;
  var d=load();var p=d.planetes.find(function(x){return x.id===editPla;});
  if(!p||!confirm('Supprimer "'+p.nom+'" ?')) return;
  d.cours.forEach(function(c){
    c.pids=(c.pids||(c.pid?[c.pid]:[])).filter(function(pid){return pid!==editPla;});
    if(c.pids.length) c.pid=c.pids[0]; // keep pid in sync
  });
  d.cours=d.cours.filter(function(c){return (c.pids||(c.pid?[c.pid]:[])).length>0;});
  d.eclats.forEach(function(e){e.pids=(e.pids||[]).filter(function(pid){return pid!==editPla;});});
  d.planetes=d.planetes.filter(function(x){return x.id!==editPla;});
  save(d);hide('m-pla');toast('Planete supprimee');closePanel();draw();if(curView==='texte')renderTexte();
}

    var gp=d.planetes.filter(function(p){return p.gid===g.id;});
    if(!gp.length) return;
    h+='<span style="font-size:10px;color:'+g.couleur+';width:100%;display:block;margin:5px 0 3px;">'+esc(g.nom)+'</span>';
    gp.forEach(function(p){h+='<button class="chip'+(selPids.indexOf(p.id)>=0?' on':'')+'" style="--cc:'+g.couleur+';" onclick="this.classList.toggle(\'on\')">'+esc(p.nom)+'</button>';});
  });
  document.getElementById('ee-chips').innerHTML=h;
  show('m-ecl');setTimeout(function(){document.getElementById('ee-txt').focus();},80);
}
function getSelPids(){
  var pids=[];
  document.querySelectorAll('#ee-chips .chip.on').forEach(function(b){
    var nom=b.textContent.trim();
    var p=load().planetes.find(function(x){return x.nom===nom;});
    if(p) pids.push(p.id);
  });
  return pids;
}
function saveEclat(){
  var txt=document.getElementById('ee-txt').value.trim();
  var pids=getSelPids();
  if(!txt){toast('Texte obligatoire');return;}
  if(!pids.length){toast('Choisis au moins une planete');return;}
  var d=load();
  if(editEcl){var e=d.eclats.find(function(x){return x.id===editEcl;});if(e){e.texte=txt;e.pids=pids;e.lien=document.getElementById('ee-lien').value.trim();e.date=document.getElementById('ee-date').value;}}
  else d.eclats.push({id:'e'+Date.now(),texte:txt,pids:pids,lien:document.getElementById('ee-lien').value.trim(),date:document.getElementById('ee-date').value||today()});
  save(d);hide('m-ecl');toast('Eclat enregistre');
  if(curPlanet) openPanel(curPlanet); else draw();
  if(curView==='texte') renderTexte();
}
function delEclat(){
  if(!editEcl||!confirm('Supprimer cet eclat ?')) return;
  var d=load();d.eclats=d.eclats.filter(function(x){return x.id!==editEcl;});
  save(d);hide('m-ecl');toast('Eclat supprime');
  if(curPlanet) openPanel(curPlanet); else draw();
}

// Cours
function openCours(editId,defPid){
  editCrs=editId||null;
  var d=load();var c=editId?d.cours.find(function(x){return x.id===editId;}):null;
  document.getElementById('mc-t').textContent=c?'Modifier le cours':'Nouveau cours';
  document.getElementById('cc-titre').value=c?c.titre:'';
  document.getElementById('cc-st').value=c?(c.statut||'en-cours'):'en-cours';
  document.getElementById('cc-desc').value=c?(c.description||''):'';
  document.getElementById('cc-del').style.display=c?'':'none';
  var selPids=c?(c.pids||(c.pid?[c.pid]:[])):(defPid?[defPid]:(curPlanet?[curPlanet.id]:[]));
  var h='';
  d.galaxies.forEach(function(g){
    var gp=d.planetes.filter(function(p){return (p.gids||[p.gid]).indexOf(g.id)>=0;});
    if(!gp.length) return;
    h+='<span style="font-size:10px;color:'+g.couleur+';width:100%;display:block;margin:5px 0 3px;">'+esc(g.nom)+'</span>';
    gp.forEach(function(p){h+='<button class="chip'+(selPids.indexOf(p.id)>=0?' on':'')+'" style="--cc:'+g.couleur+';" onclick="this.classList.toggle(\'on\')">'+esc(p.nom)+'</button>';});
  });
  document.getElementById('cc-chips').innerHTML=h;
  document.getElementById('cc-liens').innerHTML='';
  (c?c.liens||[]:[]).forEach(function(l){addLienRow(l.url,l.label);});
  show('m-crs');setTimeout(function(){document.getElementById('cc-titre').focus();},80);
}
function addLienRow(url,label){
  var div=document.createElement('div');div.className='rrow';
  div.innerHTML='<input type="url" class="lurl" placeholder="https://..." value="'+(url||'')+'"><input type="text" class="llbl" placeholder="Nom" style="max-width:125px;" value="'+(label||'')+'"><button class="brm" onclick="this.parentNode.remove()">x</button>';
  document.getElementById('cc-liens').appendChild(div);
}
function saveCours(){
  var titre=document.getElementById('cc-titre').value.trim();
  var pids=[];
  document.querySelectorAll('#cc-chips .chip.on').forEach(function(b){
    var nom=b.textContent.trim();
    var p=load().planetes.find(function(x){return x.nom===nom;});
    if(p) pids.push(p.id);
  });
  if(!titre){toast('Titre obligatoire');return;}
  if(!pids.length){toast('Choisis au moins une planete');return;}
  var pid=pids[0]; // compatibilité rétro
  var liens=[];
  document.querySelectorAll('.lurl').forEach(function(el){var u=el.value.trim(),l=el.nextElementSibling.value.trim();if(u)liens.push({url:u,label:l});});
  var d=load();
  if(editCrs){var c=d.cours.find(function(x){return x.id===editCrs;});if(c){c.titre=titre;c.pids=pids;c.pid=pid;c.statut=document.getElementById('cc-st').value;c.description=document.getElementById('cc-desc').value.trim();c.liens=liens;}}
  else{var nid='c'+Date.now();d.cours.push({id:nid,titre:titre,pids:pids,pid:pid,statut:document.getElementById('cc-st').value,description:document.getElementById('cc-desc').value.trim(),liens:liens,seances:[]});}
  save(d);hide('m-crs');toast('Cours enregistre');
  if(curPlanet&&pids.indexOf(curPlanet.id)>=0) openPanel(curPlanet); else draw();
  if(curView==='texte') renderTexte();
}
function delCours(){
  if(!editCrs) return;
  var d=load();var c=d.cours.find(function(x){return x.id===editCrs;});
  if(!c||!confirm('Supprimer "'+c.titre+'" ?')) return;
  d.cours=d.cours.filter(function(x){return x.id!==editCrs;});
  save(d);hide('m-crs');toast('Cours supprime');
  if(curView==='cours') backFromCours();
  else if(curPlanet) openPanel(curPlanet);
  else draw();
}

// Seance — lecture
var _seaReadCid=null, _seaReadSid=null;
function openSeaRead(cid, sid){
  _seaReadCid=cid; _seaReadSid=sid;
  var d=load();
  var cours=d.cours.find(function(x){return x.id===cid;});
  if(!cours) return;
  var s=(cours.seances||[]).find(function(x){return x.id===sid;});
  if(!s) return;

  // Titre
  var titre=(s.titre||'Séance')+(s.date?' — '+fmtDate(s.date):'');
  document.getElementById('vsh-titre').textContent=titre;

  // Bouton export
  document.getElementById('vsh-export').onclick=function(){exportSeance(cid,sid);};

  // Meta : cours + planètes + statut
  var coursePids=cours.pids||(cours.pid?[cours.pid]:[]);
  var parentPs=coursePids.map(function(pid){return d.planetes.find(function(x){return x.id===pid;});}).filter(Boolean);
  var metaHtml='<span style="font-size:12px;color:#e8e9f0;font-weight:500;">'+esc(cours.titre||'')+'</span>';
  if(parentPs.length){
    metaHtml+=' <span style="color:#6b7089;font-size:12px;">·</span> ';
    metaHtml+=parentPs.map(function(pp){
      var pg=d.galaxies.find(function(x){return x.id===(pp.gids?pp.gids[0]:pp.gid);});
      return '<span style="color:'+(pg?pg.couleur:'#a78bfa')+';font-size:12px;">'+(pg?esc(pg.nom)+' › ':'')+esc(pp.nom)+'</span>';
    }).join('<span style="color:#6b7089;font-size:12px;"> · </span>');
  }
  if(s.date) metaHtml+='<span style="color:#6b7089;font-size:12px;margin-left:6px;">'+fmtDate(s.date)+'</span>';
  document.getElementById('view-sea-meta').innerHTML=metaHtml;

  // Ressources
  if(s.ressources&&s.ressources.length){
    var resH='<span style="font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#6b7089;margin-right:8px;">Ressources</span>';
    resH+=s.ressources.map(function(r){return '<a href="'+r.url+'" target="_blank" class="rchip">'+esc(r.label||r.url.slice(0,30))+'</a>';}).join(' ');
    document.getElementById('view-sea-meta').innerHTML+=resH;
  }

  // Corps notes
  document.getElementById('view-sea-body').innerHTML=s.notes||'<span style="color:#4b5263;font-style:italic;">Aucune note pour cette séance.</span>';

  // Afficher
  document.getElementById('view-sea').style.display='flex';
  document.getElementById('view-sea').scrollTop=0;
}
function closeSeaRead(){
  document.getElementById('view-sea').style.display='none';
}
function editFromRead(){
  var d=load();
  var cours=d.cours.find(function(x){return x.id===_seaReadCid;});
  if(!cours) return;
  var idx=(cours.seances||[]).findIndex(function(x){return x.id===_seaReadSid;});
  closeSeaRead();
  openSeance(_seaReadCid, idx>=0?idx:null);
}

// Seance — édition
function openSeance(cid,idx){
  curCoursId=cid;editSeaIdx=(idx!==null&&idx!==undefined)?idx:null;
  var d=load();var cours=d.cours.find(function(x){return x.id===cid;});
  var s=(editSeaIdx!==null&&cours)?cours.seances[editSeaIdx]:null;
  document.getElementById('ms-t').textContent=s?'Modifier la seance':'Nouvelle seance';
  document.getElementById('ss-date').value=s?(s.date||today()):today();
  document.getElementById('ss-titre').value=s?(s.titre||''):'';
  // notes chargées dans l'éditeur ci-dessous
  document.getElementById('ss-del').style.display=s?'':'none';
  document.getElementById('ss-res').innerHTML='';
  (s?s.ressources||[]:[]).forEach(function(r){addResRow(r.url,r.label);});
  document.getElementById('ss-notes-editor').innerHTML=s?(s.notes||''):'';
  document.getElementById('m-sea').style.display='flex';setTimeout(function(){document.getElementById('ss-notes-editor').focus();},80);
}
function addResRow(url,label){
  var div=document.createElement('div');div.className='rrow';
  div.style.cssText='display:flex;gap:5px;align-items:center;';
  div.innerHTML='<input type="url" class="rurl" placeholder="https://..." value="'+(url||'')+'" style="width:180px;flex:none;"><input type="text" class="rlbl" placeholder="Nom" style="width:110px;flex:none;" value="'+(label||'')+'"><button class="brm" onclick="this.parentNode.remove()">✕</button>';
  document.getElementById('ss-res').appendChild(div);
}
function saveSeance(){
  var date=document.getElementById('ss-date').value;
  if(!date){toast('Date obligatoire');return;}
  var res=[];
  document.querySelectorAll('.rurl').forEach(function(el){var u=el.value.trim(),l=el.nextElementSibling.value.trim();if(u)res.push({url:u,label:l});});
  var d=load();var cours=d.cours.find(function(x){return x.id===curCoursId;});
  if(!cours) return;if(!cours.seances)cours.seances=[];
  var s={id:'s'+Date.now(),date:date,titre:document.getElementById('ss-titre').value.trim(),notes:document.getElementById('ss-notes-editor').innerHTML.trim(),ressources:res};
  if(editSeaIdx!==null){s.id=cours.seances[editSeaIdx].id;cours.seances[editSeaIdx]=s;}
  else cours.seances.push(s);
  save(d);hide('m-sea');toast('Seance enregistree');openCoursDetail(curCoursId);
}
function delSeance(){
  if(editSeaIdx===null) return;
  var d=load();var cours=d.cours.find(function(x){return x.id===curCoursId;});
  if(!cours||!confirm('Supprimer cette seance ?')) return;
  cours.seances.splice(editSeaIdx,1);
  save(d);hide('m-sea');toast('Seance supprimee');openCoursDetail(curCoursId);
}

// ─── UTILS ───────────────────────────────────────────────────
function lighten(hex,a){try{var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);r=Math.min(255,Math.round(r+(255-r)*a));g=Math.min(255,Math.round(g+(255-g)*a));b=Math.min(255,Math.round(b+(255-b)*a));return '#'+r.toString(16).padStart(2,'0')+g.toString(16).padStart(2,'0')+b.toString(16).padStart(2,'0');}catch(e){return hex;}}
function today(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fmtDate(s){try{return new Date(s+'T00:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'});}catch(e){return s||'';}}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function stLabel(s){return s==='pause'?'En pause':s==='termine'?'Termine':'En cours';}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2200);}

window.addEventListener('load',function(){
  document.getElementById('ee-date').value=today();
  document.getElementById('ss-date').value=today();
  initCanvas();
  window.addEventListener('message',function(e){
    if(e.data&&e.data.type==='reload-univers'){draw();if(curView==='texte')renderTexte();}
  });
});

// ── Notation planète ──────────────────────────────────────────────────────
window._plaNoteVal = 0;
function setPlaNote(val, silent) {
  window._plaNoteVal = val;
  var spans = document.querySelectorAll('#mp-stars span');
  spans.forEach(function(s) {
    var v = parseInt(s.getAttribute('data-v'));
    s.textContent = v <= val ? '★' : '☆';
    s.style.color = v <= val ? '#fbbf24' : '#4b5563';
  });
}

// ── Formatage notes séance ────────────────────────────────────────────────
function applyFormat(type, color) {
  var editor = document.getElementById('ss-notes-editor');
  editor.focus();
  var sel = window.getSelection();
  if (!sel || sel.rangeCount === 0 || sel.isCollapsed) return;
  if (type === 'clear') {
    document.execCommand('removeFormat', false, null);
    return;
  }
  if (type === 'u') {
    document.execCommand('underline', false, null);
    return;
  }
  if (type === 'mark') {
    var colors = { yellow: '#eab308' };
    var bg = colors[color] || '#eab308';
    document.execCommand('hiliteColor', false, bg);
    document.execCommand('foreColor', false, '#000000');
  }
}
