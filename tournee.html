            var files = Array.from(input.files); if(!files.length) return;
            var uid = window._currentUser && window._currentUser.uid;
            if (!uid) { alert('Tu dois être connectée.'); return; }

            files.forEach(function(file) {
                var recuId = 'r_' + Date.now() + '_' + Math.random().toString(36).slice(2);
                var isImage = file.type.startsWith('image/');
                var meta = { id: recuId, nom: file.name, type: file.type, _uploading: true };
                _currentRecus.push(meta);
                renderRecusList();

                var reader = new FileReader();
                reader.onload = function(e) {
                    var base64Data = e.target.result;

                    function doUpload(dataToSave) {
                        meta.data = dataToSave;
                        var fb = window._fb;
                        // Sauvegarder le type final (toujours image/jpeg apres compression)
                        var finalType = isImage ? 'image/jpeg' : file.type;
                        fb.setDoc(recuDocRef(uid, recuId), { data: dataToSave, nom: file.name, type: finalType })
                            .then(function() {
                                meta._uploading = false;
                                meta.type = finalType;
                                renderRecusList();
                            })
                            .catch(function(err) {
                                meta._uploading = false;
                                meta._error = true;
                                alert('Erreur upload : ' + err.message);
                                renderRecusList();
                            });
                    }

                    if (isImage) {
                        _compressImage(base64Data, file.type, doUpload);
                    } else {
                        doUpload(base64Data);
                    }
                };
                reader.readAsDataURL(file);
            });
            input.value='';
        }

        function _loadJsPDF(cb) {
            if (window.jspdf) { cb(window.jspdf.jsPDF); return; }
            var s = document.createElement('script');
            s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
            s.onload = function() { cb(window.jspdf.jsPDF); };
            s.onerror = function() { alert('Impossible de charger jsPDF. Verifie ta connexion.'); };

        function partagerFraisPDF() {
            // Recuperer les donnees de la note en cours d affichage
            var fraisId = window._currentFraisId;
            if (!fraisId) { alert('Note introuvable'); return; }
            var f = loadFrais().find(function(x){ return x.id === fraisId; });
            if (!f) { alert('Note introuvable'); return; }

            var btn = event && event.target;
            if (btn) { btn.textContent = '⏳ Génération PDF...'; btn.disabled = true; }

            function resetBtn() {
                if (btn) { btn.textContent = '📤 Envoyer / Enregistrer'; btn.disabled = false; }
            }

            // Charger les images depuis Firestore
            var recusMeta = f.recus || [];
            var uid = window._currentUser && window._currentUser.uid;
            var fb = window._fb;

            function genPDF(recusAvecData) {
                _loadJsPDF(function(jsPDF) {
                    var doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
                    var W = 210, H = 297, M = 12; // A4 en mm, marge 12mm
                    var emp = getAllEmployeurs().find(function(e){ return e.id === f.employeurId; }) || getGommetteEmployeur();
                    var profile = loadFraisProfile();
                    function n(v){ return parseFloat(v||0)||0; }

                    // ── PAGE 1 : tableau des frais ──────────────────────────
                    var y = M;

                    // Header
                    doc.setFillColor(5, 150, 105);
                    doc.rect(M, y, W - M*2, 14, 'F');
                    doc.setTextColor(255,255,255);
                    doc.setFontSize(13); doc.setFont('helvetica','bold');
                    doc.text('NOTE DE FRAIS', M+4, y+6);
                    doc.setFontSize(9); doc.setFont('helvetica','normal');
                    doc.text((f.spectacle||'') + (f.lieu ? ' — ' + f.lieu : ''), M+4, y+11);
                    // Logo employeur (si image valide)
                    try {
                        if (emp.logo && emp.logo.startsWith('data:image')) {
                            doc.addImage(emp.logo, 'JPEG', W-M-28, y+1, 26, 12, '', 'FAST');
                        }
                    } catch(e) {}
                    y += 18;

                    // Infos generales
                    doc.setTextColor(80,80,80); doc.setFontSize(8); doc.setFont('helvetica','normal');
                    doc.text('Nom / Prenom', M, y); doc.text('Date', M+52, y); doc.text('Vehicule', M+90, y);
                    y += 4;
                    doc.setTextColor(20,20,20); doc.setFontSize(9); doc.setFont('helvetica','bold');
                    doc.text((f.nom||'') + ' ' + (f.prenom||''), M, y);
                    doc.text(f.dateRep||'—', M+52, y);
                    doc.text((f.immat||'—') + (f.puissance ? ' ' + f.puissance + ' CV' : ''), M+90, y);
                    y += 8;

                    // Fonction tableau
                    function drawTable(headers, rows, colWidths, fillHeader) {
                        var tableW = colWidths.reduce(function(a,b){return a+b;},0);
                        var rowH = 6;
                        // Header
                        doc.setFillColor(fillHeader[0],fillHeader[1],fillHeader[2]);
                        doc.rect(M, y, tableW, rowH+1, 'F');
                        doc.setTextColor(255,255,255); doc.setFontSize(8); doc.setFont('helvetica','bold');
                        var x = M;
                        headers.forEach(function(h,i){ doc.text(h, x+1.5, y+4.5); x += colWidths[i]; });
                        y += rowH+1;
                        // Rows
                        doc.setFont('helvetica','normal'); doc.setTextColor(30,30,30);
                        rows.forEach(function(row, ri) {
                            if (y > H - 20) { doc.addPage(); y = M; }
                            doc.setFillColor(ri%2===0?245:255, ri%2===0?250:255, ri%2===0?247:255);
                            doc.rect(M, y, tableW, rowH, 'F');
                            doc.setDrawColor(200,200,200);
                            doc.rect(M, y, tableW, rowH);
                            x = M;
                            row.forEach(function(cell,i){
                                doc.text(String(cell||''), x+1.5, y+4, {maxWidth: colWidths[i]-3});
                                x += colWidths[i];
                            });
                            y += rowH;
                        });
                        y += 3;
                    }

                    // Km
                    var kmRows = (f.km||[]).filter(function(r){return r.trajet||r.km;});
                    if (kmRows.length) {
                        doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(5,150,105);
                        doc.text('Indemnites km (0,30 EUR/km)', M, y); y += 4;
                        var kmData = kmRows.map(function(r){
                            return [r.trajet||'', r.date||'', r.km||'0', (n(r.km)*0.30).toFixed(2)+' EUR'];
                        });
                        // Total km
                        var totKm = kmRows.reduce(function(s,r){return s+n(r.km)*0.30;},0);
                        kmData.push(['SOUS-TOTAL', '', '', totKm.toFixed(2)+' EUR']);
                        drawTable(['Trajet','Date','Km','Montant'], kmData, [72,30,18,26],[5,150,105]);
                    }

                    // Frais divers
                    var cats = [
                        {label:'Essence',     rows:f.essence,     code:'606110'},
                        {label:'Peages',      rows:f.peages,      code:'625620'},
                        {label:'Fournitures', rows:f.fournitures, code:'605100'},
                        {label:'Repas',       rows:f.repas,       code:'625640'},
                        {label:'Autres',      rows:f.autres,      code:'—'},
                    ];
                    var grandTotal = kmRows.reduce(function(s,r){return s+n(r.km)*0.30;},0);
                    cats.forEach(function(cat){
                        var rows = (cat.rows||[]).filter(function(r){return r.fourn||r.ttc;});
                        if (!rows.length) return;
                        if (y > H - 30) { doc.addPage(); y = M; }
                        doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(5,150,105);
                        doc.text(cat.label + ' — ' + cat.code, M, y); y += 4;
                        var sTTC = rows.reduce(function(s,r){return s+n(r.ttc);},0);
                        grandTotal += sTTC;
                        var data = rows.map(function(r){
                            return [r.fourn||'', r.date||'', n(r.ht).toFixed(2), n(r.tva).toFixed(2), n(r.ttc).toFixed(2)];
                        });
                        data.push(['SOUS-TOTAL','','','',sTTC.toFixed(2)+' EUR']);
                        drawTable(['Fournisseur','Date','HT','TVA','TTC EUR'], data, [58,28,18,18,24],[5,150,105]);
                    });

                    // Total general
                    if (y > H - 20) { doc.addPage(); y = M; }
                    doc.setFillColor(6,95,70);
                    doc.rect(M, y, W-M*2, 10, 'F');
                    doc.setTextColor(255,255,255); doc.setFontSize(12); doc.setFont('helvetica','bold');
                    doc.text('TOTAL GENERAL : ' + grandTotal.toFixed(2) + ' EUR', M+4, y+7);
                    y += 16;

                    // Signature
                    if (y > H - 30) { doc.addPage(); y = M; }
                    doc.setTextColor(60,60,60); doc.setFontSize(9); doc.setFont('helvetica','normal');
                    doc.text('Fait a ' + (f.signatureVille||'_______') + ', le ' + (f.signatureDate||'_______'), M, y);
                    y += 8;
                    doc.text('Signature :', M, y); y += 2;
                    try {
                        if (profile.signature && profile.signature.startsWith('data:image')) {
                            doc.addImage(profile.signature, 'PNG', M, y, 40, 18, '', 'FAST');
                            y += 22;
                        } else {
                            doc.line(M, y+15, M+50, y+15);
                            y += 20;
                        }
                    } catch(e) { doc.line(M, y+15, M+50, y+15); y += 20; }
                    doc.setFontSize(7); doc.setTextColor(150,150,150);
                    doc.text('MERCI DE JOINDRE TOUS LES JUSTIFICATIFS', W/2, y, {align:'center'});

                    // ── PAGES SUIVANTES : une image/pdf par page ─────────────
                    // Convertit chaque recu en image canvas, puis l'ajoute au PDF
                    function addRecuToDoc(doc, r, i, W, H, cb) {
                        if (!r.data) { cb(); return; }
                        var titre = 'Justificatif ' + (i+1) + ' : ' + (r.nom||'');

                        function addPageWithImage(dataUrl, imgType) {
                            doc.addPage();
                            doc.setFillColor(5,150,105);
                            doc.rect(0, 0, W, 14, 'F');
                            doc.setTextColor(255,255,255); doc.setFontSize(10); doc.setFont('helvetica','bold');
                            doc.text(titre, 8, 9);
                            try {
                                var imgEl = new Image();
                                imgEl.onload = function() {
                                    var iw = imgEl.naturalWidth || 800;
                                    var ih = imgEl.naturalHeight || 1000;
                                    var maxW = W - 16, maxH = H - 22;
                                    var scale = Math.min(maxW/iw, maxH/ih);
                                    var dw = iw*scale, dh = ih*scale;
                                    var dx = (W-dw)/2;
                                    try { doc.addImage(dataUrl, imgType, dx, 16, dw, dh, '', 'FAST'); } catch(e2){}
                                    cb();
                                };
                                imgEl.onerror = function(){ cb(); };
                                imgEl.src = dataUrl;
                            } catch(e){ cb(); }
                        }

                        if (r.type && r.type.includes('pdf')) {
                            // Convertir PDF en image via PDF.js
                            _loadPdfJs(function() {
                                var base64 = r.data.split(',')[1];
                                if (!base64) { cb(); return; }
                                var binary = atob(base64);
                                var bytes = new Uint8Array(binary.length);
                                for (var k=0; k<binary.length; k++) bytes[k] = binary.charCodeAt(k);
                                window.pdfjsLib.getDocument({ data: bytes }).promise.then(function(pdf) {
                                    // Convertir chaque page du PDF en image
                                    var totalPages = pdf.numPages;
                                    var pagesDone = 0;
                                    for (var p = 1; p <= totalPages; p++) {
                                        (function(pageNum) {
                                            pdf.getPage(pageNum).then(function(page) {
                                                var scale = 2;
                                                var viewport = page.getViewport({ scale: scale });
                                                var canvas = document.createElement('canvas');
                                                canvas.width = viewport.width;
                                                canvas.height = viewport.height;
                                                var ctx = canvas.getContext('2d');
                                                page.render({ canvasContext: ctx, viewport: viewport }).promise.then(function() {
                                                    var dataUrl = canvas.toDataURL('image/jpeg', 0.85);
                                                    doc.addPage();
                                                    doc.setFillColor(5,150,105);
                                                    doc.rect(0, 0, W, 14, 'F');
                                                    doc.setTextColor(255,255,255); doc.setFontSize(10); doc.setFont('helvetica','bold');
                                                    doc.text(titre + (totalPages>1 ? ' (p.'+pageNum+')' : ''), 8, 9);
                                                    var iw = canvas.width, ih = canvas.height;
                                                    var maxW = W-16, maxH = H-22;
                                                    var scale2 = Math.min(maxW/iw, maxH/ih);
                                                    var dw = iw*scale2, dh = ih*scale2;
                                                    try { doc.addImage(dataUrl, 'JPEG', (W-dw)/2, 16, dw, dh, '', 'FAST'); } catch(e2){}
                                                    pagesDone++;
                                                    if (pagesDone === totalPages) cb();
                                                }).catch(function(){ pagesDone++; if(pagesDone===totalPages) cb(); });
                                            }).catch(function(){ pagesDone++; if(pagesDone===totalPages) cb(); });
                                        })(p);
                                    }
                                }).catch(function(){ cb(); });
                            });
                        } else {
                            // Image directe
                            var imgType = (r.type && r.type.includes('png')) ? 'PNG' : 'JPEG';
                            addPageWithImage(r.data, imgType);
                        }
                    }

                    // Ajouter les reçus en séquence (important : async, donc on chain les callbacks)
                    var recusValides = recusAvecData.filter(function(r){ return !!r.data; });
                    var titre = (f.spectacle || f.projet || 'note-de-frais').replace(/[^a-zA-Z0-9_-]/g,'_');

                    function addNextRecu(idx) {
                        if (idx >= recusValides.length) {
                            // Tous les recus ajoutes — generer et partager
                            var pdfBlob = doc.output('blob');
                            var pdfFile = new File([pdfBlob], titre + '.pdf', { type: 'application/pdf' });
                            resetBtn();
                            if (navigator.share && navigator.canShare && navigator.canShare({ files: [pdfFile] })) {
                                navigator.share({ title: 'Note de frais', files: [pdfFile] })
                                    .catch(function(e){ if (e.name !== 'AbortError') _fallbackDownloadPDF(pdfBlob, titre); });
                            } else {
                                _fallbackDownloadPDF(pdfBlob, titre);
                            }
                            return;
                        }
                        addRecuToDoc(doc, recusValides[idx], idx, W, H, function() {
                            addNextRecu(idx + 1);
                        });
                    }
                    addNextRecu(0);
                });
            }

            // Charger les images depuis Firestore si necessaire
            if (!recusMeta.length) { genPDF([]); return; }
            if (!uid || !fb) { genPDF(recusMeta); return; }
            var toLoad = recusMeta.filter(function(r){ return r.id && !r.data; });
            if (!toLoad.length) { genPDF(recusMeta); return; }

            var recusAvecData = recusMeta.map(function(r){ return Object.assign({},r); });
            var pending = toLoad.length;
            toLoad.forEach(function(r) {
                var target = recusAvecData.find(function(x){ return x.id === r.id; });
                fb.getDoc(recuDocRef(uid, r.id)).then(function(snap) {
                    if (snap.exists() && target) target.data = snap.data().data;
                    pending--;
                    if (pending === 0) genPDF(recusAvecData);
                }).catch(function() {
                    pending--;
                    if (pending === 0) genPDF(recusAvecData);
                });
            });
        }

        function _fallbackDownloadPDF(blob, titre) {
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = (titre||'note-de-frais') + '.pdf';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(function() { URL.revokeObjectURL(url); }, 3000);
        }

                        b += '<div style="font-size:11px;">Fait à <b>'+(f.signatureVille||'_____________')+'</b>, le <b>'+(f.signatureDate||'_____________')+'</b></div>';

                        b += '</div>';
                        b += '<div style="font-size:9px;color:#94a3b8;margin-top:8px;text-align:center;">MERCI DE JOINDRE TOUS LES JUSTIFICATIFS</div>';
                        // Reçus
                        if (recusList && recusList.length) {
                            b += '<div style="margin-top:24px;"><div style="font-size:13px;font-weight:700;color:#059669;margin-bottom:12px;border-bottom:2px solid #059669;padding-bottom:6px;">📎 Justificatifs ('+recusList.length+')</div>';
                            recusList.forEach(function(r, i) {
                                b += '<div style="margin-bottom:16px;">';
                                b += '<div style="font-size:10px;color:#6b7280;margin-bottom:4px;">Justificatif '+(i+1)+' : '+(r.nom||'')+'</div>';
                                // data-recu-idx permet l'injection directe après chargement Firestore
                                b += '<div data-recu-idx="'+i+'">';
                                if (r.data) {
                                    if (r.type && r.type.includes('pdf'))
                                        b += '<iframe src="'+r.data+'" style="width:100%;height:600px;border:1px solid #e5e7eb;border-radius:6px;"></iframe>';

                                        b += '<img src="'+r.data+'" style="max-width:100%;border-radius:6px;border:1px solid #e5e7eb;">';
                                } else {
                                    b += '<div style="padding:14px;background:#f0fdf4;border-radius:6px;font-size:11px;color:#059669;">⏳ Chargement...</div>';
                                }
                                b += '</div></div>';
                            });

                        contentEl.innerHTML = '<div style="font-family:Arial,sans-serif;font-size:12px;color:#111;background:white;padding:16px;border-radius:8px;">'
                            + '<style>table{width:100%;border-collapse:collapse;margin-bottom:10px;}td,th{border:1px solid #ccc;padding:4px 6px;font-size:11px;}</style>'
                            + b + '</div>';
                    } catch(err) {
                        contentEl.innerHTML = '<div style="padding:20px;color:#dc2626;">Erreur génération : '+err.message+'</div>';
                    }
                }

                // Charger les reçus depuis Firestore si nécessaire
                var recusMeta = f.recus || [];

                // Ancien format : data déjà dans les métadonnées → afficher direct
                if (!recusMeta.length || recusMeta.every(function(r){ return !!r.data; })) {
                    _buildAndShow(recusMeta);
                    return;
                }

                // Nouveau format : afficher d'abord la structure, puis injecter les images
                _buildAndShow(recusMeta.map(function(r){ return {id:r.id, nom:r.nom, type:r.type}; }));

                var uid = window._currentUser && window._currentUser.uid;
                var fb = window._fb;
                if (!uid || !fb) return;

                recusMeta.forEach(function(r, i) {
                    if (!r.id) {
                        // Pas d'id = ancien format sans Firestore, rien a charger
                        var el = contentEl.querySelector('[data-recu-idx="' + i + '"]');
                        if (el) el.innerHTML = '<div style="padding:14px;background:#fef9c3;border-radius:6px;font-size:11px;color:#92400e;">Justificatif non disponible (ancien format)</div>';
                        return;
                    }

                    (function(idx, recuId, recuType) {
                        fb.getDoc(recuDocRef(uid, recuId))
                            .then(function(snap) {
                                var el = contentEl.querySelector('[data-recu-idx="' + idx + '"]');
                                if (!el) return;
                                if (!snap.exists()) {
                                    el.innerHTML = '<div style="padding:14px;background:#fef9c3;border-radius:6px;font-size:11px;color:#92400e;">Image introuvable dans Firestore (id: ' + recuId + ')</div>';
                                    return;
                                }
                                var data = snap.data().data;
                                if (!data) {
                                    el.innerHTML = '<div style="padding:14px;background:#fef9c3;border-radius:6px;font-size:11px;color:#92400e;">Image vide dans Firestore</div>';
                                    return;
                                }
                                if (recuType && recuType.includes('pdf')) {
                                    el.innerHTML = '<iframe src="' + data + '" style="width:100%;height:600px;border:1px solid #e5e7eb;border-radius:6px;"></iframe>';
                                } else {
                                    el.innerHTML = '<img src="' + data + '" style="max-width:100%;border-radius:6px;border:1px solid #e5e7eb;">';
                                }
                            })
                            .catch(function(e) {
                                var el = contentEl.querySelector('[data-recu-idx="' + idx + '"]');
                                if (el) el.innerHTML = '<div style="padding:14px;background:#fee2e2;border-radius:6px;font-size:11px;color:#991b1b;">Erreur chargement: ' + e.message + '</div>';
                            });
                    })(i, r.id, r.type);
                });
            } catch(err) {
                alert('Erreur PDF : ' + err.message);
            }
        }


        // ── BILLETS & FDR ─────────────────────────────────────────
        // Chaque billet = un document Firestore séparé dans users/{uid}/billets/{id}
        // Firestore local = liste des métadonnées. Base64 stocké dans chaque sous-doc.

        function billetColRef(uid) {
            var fb = window._fb;
            return fb.collection(fb.db, 'users', uid, 'billets');
        }
        function billetDocRef(uid, billetId) {
            var fb = window._fb;
            return fb.doc(fb.db, 'users', uid, 'billets', String(billetId));
        }

        function loadBillets() {
            try { return JSON.parse(localStorage.getItem('tourneeBillets') || '[]'); } catch(e) { return []; }
        }
        function saveBilletsLocal(data) {
            var meta = data.map(function(b) {
                return { id: b.id, nom: b.nom, type: b.type, date: b.date };
            });
            localStorage.setItem.call(localStorage, 'tourneeBillets', JSON.stringify(meta));
        }

        function addBilletFiles(input) {
            var files = Array.from(input.files);
            if (!files.length) return;
            var uid = window._currentUser && window._currentUser.uid;
            if (!uid) { alert('Tu dois être connectée pour uploader des fichiers.'); return; }

            // Indicateur de chargement
            var listEl = document.getElementById('billets-list');
            if (listEl) {
                var ind = document.createElement('div');
                ind.id = 'billet-upload-indicator';
                ind.style.cssText = 'background:#eff6ff;border:1px solid #93c5fd;border-radius:10px;padding:12px;margin-bottom:8px;text-align:center;color:#1d4ed8;font-size:13px;font-weight:600;';
                ind.textContent = '⏳ Upload en cours...';
                listEl.insertBefore(ind, listEl.firstChild);
            }

            var billets = loadBillets();
            var remaining = files.length;

            files.forEach(function(file) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    var base64Data = e.target.result;
                    var billetId = 'b_' + Date.now() + '_' + Math.random().toString(36).slice(2);
                    var meta = { id: billetId, nom: file.name.replace(/\.[^.]+$/, ''), type: file.type, date: new Date().toISOString().slice(0,10) };
                    // Sauvegarder dans Firestore (sous-collection, 1 doc par billet)
                    var fb = window._fb;
                    fb.setDoc(billetDocRef(uid, billetId), { data: base64Data, nom: meta.nom, type: meta.type, date: meta.date })
                        .then(function() {
                            billets.push(meta);
                            saveBilletsLocal(billets);
                            remaining--;
                            if (remaining === 0) {
                                var ind2 = document.getElementById('billet-upload-indicator');
                                if (ind2) ind2.remove();
                                renderBillets();
                            }
                        })
                        .catch(function(err) {
                            remaining--;
                            console.error('Erreur sauvegarde billet:', err);
                            alert('Erreur lors de la sauvegarde : ' + err.message);
                            if (remaining === 0) {
                                var ind2 = document.getElementById('billet-upload-indicator');
                                if (ind2) ind2.remove();
                                renderBillets();
                            }
                        });
                };
                reader.readAsDataURL(file);
            });
            input.value = '';
        }

        function deleteBillet(id) {
            if (!confirm('Supprimer ce document ?')) return;
            var uid = window._currentUser && window._currentUser.uid;
            if (uid) {
                var fb = window._fb;
                fb.deleteDoc(billetDocRef(uid, id)).catch(function(e) { console.error('Delete billet error:', e); });
            }
            saveBilletsLocal(loadBillets().filter(function(b) { return String(b.id) !== String(id); }));
            renderBillets();
        }

        // ── PDF.js viewer (fonctionne sur Safari, Chrome, Firefox, iOS) ──────
        var _pdfDoc = null;
        var _pdfPage = 1;
        var _pdfTotal = 1;

        function billetPrevPage() {
            if (_pdfPage <= 1) return;
            _pdfPage--;
            _renderPdfPage(_pdfPage);
        }
        function billetNextPage() {
            if (_pdfPage >= _pdfTotal) return;
            _pdfPage++;
            _renderPdfPage(_pdfPage);
        }

        function _renderPdfPage(num) {
            var content = document.getElementById('billet-viewer-content');
            var info = document.getElementById('billet-page-info');
            if (!_pdfDoc || !content) return;
            if (info) info.textContent = num + ' / ' + _pdfTotal;
            _pdfDoc.getPage(num).then(function(page) {
                var vw = Math.min(window.innerWidth - 24, 800);
                var viewport = page.getViewport({ scale: 1 });
                var scale = vw / viewport.width;
                var scaled = page.getViewport({ scale: scale });

                var canvas = document.createElement('canvas');
                canvas.width = scaled.width;
                canvas.height = scaled.height;
                canvas.style.cssText = 'width:100%;max-width:800px;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,0.5);display:block;';

                content.innerHTML = '';
                content.appendChild(canvas);

                var ctx = canvas.getContext('2d');
                page.render({ canvasContext: ctx, viewport: scaled });
                // Scroll haut à chaque changement de page
                content.scrollTop = 0;
            });
        }

        function _loadPdfJs(callback) {
            if (window.pdfjsLib) { callback(); return; }
            var script = document.createElement('script');
            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
            script.onload = function() {
                window.pdfjsLib.GlobalWorkerOptions.workerSrc =
                    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                callback();
            };
            document.head.appendChild(script);
        }

        function openBillet(id) {
            var uid = window._currentUser && window._currentUser.uid;
            if (!uid) return;
            var fb = window._fb;
            var btn = event && event.target;
            if (btn) { btn.textContent = '⏳'; btn.disabled = true; }

            var billets = loadBillets();
            var meta = billets.find(function(x) { return String(x.id) === String(id); });

            fb.getDoc(billetDocRef(uid, id))
                .then(function(snap) {
                    if (btn) { btn.textContent = 'Ouvrir'; btn.disabled = false; }
                    if (!snap.exists()) { alert('Fichier introuvable.'); return; }
                    var b = snap.data();

                    var viewer = document.getElementById('billet-viewer');
                    var content = document.getElementById('billet-viewer-content');
                    var nomEl = document.getElementById('billet-viewer-nom');
                    var nav = document.getElementById('billet-viewer-nav');

                    if (nomEl) nomEl.textContent = (meta && meta.nom) || 'Document';
                    viewer.style.display = 'flex';
                    document.body.style.overflow = 'hidden';

                    if (b.type !== 'application/pdf') {
                        // Image : affichage optimisé pour QR codes et billets
                        if (nav) nav.style.display = 'none';
                        content.style.background = 'white';
                        content.style.padding = '0';
                        content.innerHTML =
                            '<div style="width:100%;min-height:100%;background:white;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:0;">' +
                            '<img src="' + b.data + '" style="width:100%;max-width:100%;height:auto;display:block;image-rendering:auto;" ' +
                            'onload="this.parentElement.style.background=\'white\';">' +
                            '<div style="margin-top:12px;padding:10px 16px;background:#f0f9ff;border-radius:10px;font-size:12px;color:#0369a1;text-align:center;width:90%;max-width:400px;margin-bottom:16px;">' +
                            '📱 Augmente la luminosité de ton écran pour une meilleure lecture en borne' +
                            '</div></div>';
                        // Forcer fond blanc sur le viewer aussi
                        viewer.style.background = 'white';
                        return;
                    }
                    // Remise à zéro du style avant PDF
                    content.style.background = '';
                    content.style.padding = '';
                    viewer.style.background = '#1a1a2e';

                    // PDF : rendu via PDF.js (marche sur tous les navigateurs dont Safari iOS)
                    content.innerHTML = '<div style="color:#94a3b8;padding:40px;text-align:center;">⏳ Chargement du PDF...</div>';
                    if (nav) nav.style.display = 'none';

                    _loadPdfJs(function() {
                        // Convertir data URL en ArrayBuffer
                        var base64 = b.data.split(',')[1];
                        var binary = atob(base64);
                        var bytes = new Uint8Array(binary.length);
                        for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);

                        window.pdfjsLib.getDocument({ data: bytes }).promise.then(function(pdf) {
                            _pdfDoc = pdf;
                            _pdfPage = 1;
                            _pdfTotal = pdf.numPages;
                            if (nav) nav.style.display = _pdfTotal > 1 ? 'flex' : 'none';
                            _renderPdfPage(1);
                        }).catch(function(err) {
                            content.innerHTML = '<div style="color:#f87171;padding:30px;text-align:center;">Erreur PDF : ' + err.message + '</div>';
                        });
                    });
                })
                .catch(function(err) {
                    if (btn) { btn.textContent = 'Ouvrir'; btn.disabled = false; }
                    alert('Erreur : ' + err.message);
                });
        }

        function closeBilletViewer() {
            var viewer = document.getElementById('billet-viewer');
            var content = document.getElementById('billet-viewer-content');
            var nav = document.getElementById('billet-viewer-nav');
            if (viewer) { viewer.style.display = 'none'; viewer.style.background = '#1a1a2e'; }
            if (content) { content.innerHTML = ''; content.style.background = ''; content.style.padding = ''; }
            if (nav) nav.style.display = 'none';
            _pdfDoc = null; _pdfPage = 1; _pdfTotal = 1;
            document.body.style.overflow = '';
        }

        function renameBillet(id) {
            var billets = loadBillets();
            var b = billets.find(function(x) { return String(x.id) === String(id); });
            if (!b) return;
            var newName = prompt('Renommer :', b.nom);
            if (!newName || !newName.trim()) return;
            b.nom = newName.trim();
            // Mettre à jour aussi dans Firestore
            var uid = window._currentUser && window._currentUser.uid;
            if (uid) {
                var fb = window._fb;
                fb.setDoc(billetDocRef(uid, id), { nom: b.nom }, { merge: true });
            }
            saveBilletsLocal(billets);
            renderBillets();
        }

        // Charger les métadonnées depuis Firestore au démarrage
        window._loadBilletsFromFirestore = function(uid) {
            var fb = window._fb;
            fb.getDoc(fb.doc(fb.db, 'users', uid)).then(function() {
                // Lister tous les billets de la sous-collection
                // On utilise onSnapshot pour rester à jour en temps réel
                var colRef = billetColRef(uid);
                fb.onSnapshot(colRef, function(querySnap) {
                    var metas = [];
                    querySnap.forEach(function(docSnap) {
                        var d = docSnap.data();
                        metas.push({ id: docSnap.id, nom: d.nom || docSnap.id, type: d.type || '', date: d.date || '' });
                    });
                    // Trier par date décroissante
                    metas.sort(function(a, b) { return b.date.localeCompare(a.date); });
                    saveBilletsLocal(metas);
                    // Rafraîchir l'affichage si le panneau est ouvert
                    var pane = document.getElementById('t-pane-billets');
                    if (pane && pane.style.display !== 'none') renderBillets();
                });
            }).catch(function(e) { console.error('loadBillets error:', e); });
        };

        function renderBillets() {
            var el = document.getElementById('billets-list');
            if (!el) return;
            var billets = loadBillets();
            if (!billets.length) {
                el.innerHTML = '<div style="text-align:center;padding:40px 20px;color:#94a3b8;">' +
                    '<div style="font-size:40px;margin-bottom:10px;">🚆</div>' +
                    '<div style="font-size:14px;">Aucun document pour l\'instant</div>' +
                    '<div style="font-size:12px;margin-top:6px;">Ajoute tes billets de train et feuilles de route<br>en cliquant sur "+ Ajouter PDF" ci-dessus</div>' +

                var icon = isFDR ? '📋' : isBillet ? '🚆' : isPDF ? '📄' : '🖼️';
                var color = isFDR ? '#7c3aed' : isBillet ? '#0369a1' : '#059669';
                var bg = isFDR ? '#f5f3ff' : isBillet ? '#f0f9ff' : '#f0fdf4';
                var border = isFDR ? '#ddd6fe' : isBillet ? '#bae6fd' : '#a7f3d0';
                html += '<div style="background:' + bg + ';border:1.5px solid ' + border + ';border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;">';
                html += '<div style="font-size:28px;flex-shrink:0;">' + icon + '</div>';
                html += '<div style="flex:1;min-width:0;">';
                html += '<div style="font-size:14px;font-weight:700;color:' + color + ';white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + b.nom.replace(/</g,'&lt;') + '</div>';
                html += '<div style="font-size:11px;color:#94a3b8;margin-top:2px;">' + (isPDF ? 'PDF' : 'Image') + ' · ' + b.date + '</div>';
                html += '</div>';

                html += '<button onclick="openBillet(\'' + safeId + '\')" style="background:' + color + ';color:white;border:none;padding:7px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;font-family:system-ui;">Ouvrir</button>';
                html += '<button onclick="renameBillet(\'' + safeId + '\')" style="background:white;border:1px solid ' + border + ';color:' + color + ';padding:7px 8px;border-radius:8px;cursor:pointer;font-size:12px;" title="Renommer">✏️</button>';
                html += '<button onclick="deleteBillet(\'' + safeId + '\')" style="background:white;border:1px solid #fecaca;color:#dc2626;padding:7px 8px;border-radius:8px;cursor:pointer;font-size:12px;" title="Supprimer">🗑️</button>';
                html += '</div></div>';
            });
            html += '</div>';

        }
        function renderTournee() {
            const container = document.getElementById('tournee-list');
            if (!container) return;

            const events = raw ? JSON.parse(raw) : {};
            const notes = JSON.parse(localStorage.getItem('tourneeNotes') || '{}');

                if (!Array.isArray(dayEvents)) return;
                dayEvents.forEach(evt => {
                    const lower = (evt.text || '').toLowerCase();
                    if (TOURNEE_KW.some(k => lower.startsWith(k))) {
                        tourneeEvents.push({ date: dateStr, text: evt.text, id: evt.id });
                    }
                });
            });

            tourneeEvents.sort((a, b) => a.date.localeCompare(b.date));

            if (tourneeEvents.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:#94a3b8;font-size:14px;padding:30px;">Aucun concert ou tournage dans ton agenda.<br><span style="font-size:12px;">Ajoute des événements commençant par "Concert -" dans le calendrier !</span></p>';
                return;
            }

            const projects = {};

                const proj = extractProjectName(evt.text) || '(sans projet)';
                if (!projects[proj]) projects[proj] = [];
                projects[proj].push(evt);
            });

            const today = new Date().toISOString().split('T')[0];

            let html = `<div style="margin-bottom:16px; display:flex; flex-wrap:wrap; gap:8px;">`;
            Object.keys(projects).forEach(proj => {

                html += `<span style="background:${lighten(color)}; border:2px solid ${color}; color:${color};
                    padding:4px 12px; border-radius:20px; font-size:12px; font-weight:700;">${proj} (${projects[proj].length})</span>`;

                    border-left:4px solid ${isPast ? '#cbd5e1' : color};
                    border-radius:8px; opacity:${isPast ? '0.7' : '1'}; overflow:hidden;">

                        <div style="flex:1; min-width:0;">

                            ${lieu ? `<div style="font-size:12px; color:#64748b; margin-top:2px;">📍 ${lieu}</div>` : ''}
                            ${hasNote ? `<div style="font-size:11px; color:#64748b; margin-top:3px; font-style:italic; white-space:pre-wrap; line-height:1.4;">📝 ${safeNote}</div>` : ''}
                        </div>

                            title="${hasNote ? 'Modifier la note' : 'Ajouter une note'}">✏️</button>
                    </div>
                    <div id="${noteWrapId}" style="display:none; padding:0 14px 12px; border-top:1px solid ${color}22;">
                        <textarea id="${noteId}"
                            placeholder="Infos pratiques, contacts, logistique, set list spéciale..."
                            style="width:100%;margin-top:10px;padding:8px 10px;border:1.5px solid ${color}55;border-radius:8px;font-size:13px;font-family:system-ui;resize:vertical;min-height:60px;background:white;color:#374151;box-sizing:border-box;line-height:1.6;outline:none;">${safeNote}</textarea>
                        <div style="display:flex;gap:8px;margin-top:8px;">
                            <button onclick="saveTourneeNoteAndClose('${evt.id}','${noteWrapId}','${noteId}')"
                                style="padding:6px 16px;border-radius:7px;border:none;background:${color};color:white;font-size:12px;font-weight:700;cursor:pointer;font-family:system-ui;">✓ Enregistrer</button>
                            <button onclick="document.getElementById('${noteWrapId}').style.display='none'"
                                style="padding:6px 12px;border-radius:7px;border:1px solid #e2e8f0;background:transparent;color:#94a3b8;font-size:12px;cursor:pointer;font-family:system-ui;">Annuler</button>
                            ${hasNote ? `<button onclick="saveTourneeNoteAndClose('${evt.id}','${noteWrapId}','${noteId}', true)"
                                style="padding:6px 12px;border-radius:7px;border:1px solid #fecaca;background:transparent;color:#f87171;font-size:12px;cursor:pointer;font-family:system-ui;margin-left:auto;">🗑 Supprimer</button>` : ''}
                        </div>
                    </div>
                </div>`;
            });
            html += `</div>`;
            container.innerHTML = html;
        }

        function newFraisFromConcert(btn) {
            var projet = btn.getAttribute('data-projet') || '';
            var lieu   = btn.getAttribute('data-lieu')   || '';
            var date   = btn.getAttribute('data-date')   || '';
            switchTourneeTab('frais');
            setTimeout(function() { newNoteFrais({projet:projet, lieu:lieu, date:date}); }, 80);
        }

        function toggleTourneeNote(wrapId, evtId) {
            const el = document.getElementById(wrapId);
            if (!el) return;
            const isOpen = el.style.display !== 'none';
            el.style.display = isOpen ? 'none' : 'block';
            if (!isOpen) {
                const ta = el.querySelector('textarea');
                if (ta) { setTimeout(function(){ ta.focus(); ta.selectionStart = ta.value.length; }, 50); }
            }
        }

        function saveTourneeNoteAndClose(evtId, wrapId, inputId, del) {
            const ta = document.getElementById(inputId);
            const value = ta ? ta.value : '';
            const notes = JSON.parse(localStorage.getItem('tourneeNotes') || '{}');
            if (del || !value.trim()) delete notes[evtId];
            else notes[evtId] = value;
            localStorage.setItem('tourneeNotes', JSON.stringify(notes));
            window._syncNow && window._syncNow();
            // Refermer et re-render pour mettre à jour l'aperçu
            renderTournee();
        }

        function saveTourneeNote(evtId, value) {
            const notes = JSON.parse(localStorage.getItem('tourneeNotes') || '{}');
            if (value.trim()) notes[evtId] = value;
            else delete notes[evtId];
            localStorage.setItem('tourneeNotes', JSON.stringify(notes));
            window._syncNow && window._syncNow();
        }
</script>

function _loadPdfLib(cb) {
  if (window.PDFLib) { cb(window.PDFLib); return; }
  var s = document.createElement('script');
  s.src = 'https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js';
  s.onload = function() { cb(window.PDFLib); };
  document.head.appendChild(s);
}
function _loadJsPDF(cb) {
  if (window.jspdf) { cb(window.jspdf.jsPDF); return; }
  var s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
  s.onload = function() { cb(window.jspdf.jsPDF); };
  document.head.appendChild(s);
}
function partagerFraisPDF() {
  var fraisId = window._currentFraisId;
  if (!fraisId) { alert('Note introuvable'); return; }
  var f = loadFrais().find(function(x){ return x.id === fraisId; });
  if (!f) { alert('Note introuvable'); return; }
  var btn = event && event.target;
  if (btn) { btn.textContent = '\u23f3 G\u00e9n\u00e9ration...'; btn.disabled = true; }
  function resetBtn() { if (btn) { btn.textContent = '\ud83d\udce4 Partager'; btn.disabled = false; } }
  var recusMeta = f.recus || [];
  var uid = window._currentUser && window._currentUser.uid;
  var fb = window._fb;
  function go(recusAvecData) {
    _loadPdfLib(function(PDFLib) {
      _fillGommettePDF(PDFLib, f, recusAvecData).then(function(pdfBytes) {
        resetBtn();
        var titre = (f.spectacle || f.projet || 'note-de-frais').replace(/[^a-zA-Z0-9_-]/g,'_');
        var blob = new Blob([pdfBytes], { type: 'application/pdf' });
        var file = new File([blob], titre + '.pdf', { type: 'application/pdf' });
        if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
          navigator.share({ title: 'Note de frais', files: [file] })
            .catch(function(e){ if (e.name !== 'AbortError') _fallbackDownloadPDF(blob, titre); });
        } else { _fallbackDownloadPDF(blob, titre); }
      }).catch(function(err){ resetBtn(); alert('Erreur PDF : ' + err.message); });
    });
  }
  if (!recusMeta.length) { go([]); return; }
  if (!uid || !fb) { go(recusMeta); return; }
  var toLoad = recusMeta.filter(function(r){ return r.id && !r.data; });
  if (!toLoad.length) { go(recusMeta); return; }
  var rd = recusMeta.map(function(r){ return Object.assign({},r); });
  var pending = toLoad.length;
  toLoad.forEach(function(r) {
    var t = rd.find(function(x){ return x.id === r.id; });
    fb.getDoc(recuDocRef(uid, r.id)).then(function(snap) {
      if (snap.exists() && t) t.data = snap.data().data;
      pending--; if (pending === 0) go(rd);
    }).catch(function(){ pending--; if (pending === 0) go(rd); });
  });
}
async function _fillGommettePDF(PDFLib, f, recusList) {
  var profile = loadFraisProfile();
  function n(v){ return parseFloat(v||0)||0; }
  var bin = atob(GOMMETTE_TEMPLATE_B64);
  var bytes = new Uint8Array(bin.length);
  for (var i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  var pdfDoc = await PDFLib.PDFDocument.load(bytes);
  var page = pdfDoc.getPages()[0];
  var font = await pdfDoc.embedFont(PDFLib.StandardFonts.Helvetica);
  var H=841.89, FS=7.5, BLACK=PDFLib.rgb(0,0,0);
  function t2y(top,fs){ return H-top-(fs||FS); }
  function dt(text,x,top,opts){
    if(!text&&text!==0)return;
    page.drawText(String(text),{x:x,y:t2y(top,opts&&opts.size),size:(opts&&opts.size)||FS,font:font,color:BLACK});
  }
  dt(f.spectacle||'',179.4,100.0); dt(f.dateRep||'',390.0,100.0);
  dt(f.nom||'',194.5,117.2); dt(f.lieu||'',400.0,117.2);
  dt(f.prenom||'',199.7,134.4);
  if(f.immat) dt(f.immat,200.0,151.0);
  if(f.puissance) dt(f.puissance,200.0,162.0);
  var kmY=[215.0,227.4,239.9,252.4,264.4];
  (f.km||[]).filter(function(r){return r.trajet||r.km;}).forEach(function(r,i){
    if(i>=kmY.length)return; var y=kmY[i]; var m=n(r.km)*0.30;
    dt(r.trajet||'',65.0,y); dt(r.date||'',220.0,y);
    dt(r.km||'',295.0,y); dt(m.toFixed(2)+' \u20ac',450.0,y);
  });
  var secs={essence:{startY:340.3,rowH:12.5,maxRows:3},peages:{startY:390.2,rowH:12.5,maxRows:6},
    fournitures:{startY:477.6,rowH:12.5,maxRows:4},repas:{startY:540.0,rowH:12.5,maxRows:4},
    autres:{startY:602.4,rowH:12.5,maxRows:4}};
  ['essence','peages','fournitures','repas','autres'].forEach(function(key){
    var cfg=secs[key]; var lg=(f[key]||[]).filter(function(r){return r.fourn||r.ttc;});
    lg.forEach(function(r,i){
      if(i>=cfg.maxRows)return; var y=cfg.startY+i*cfg.rowH;
      dt(r.fourn||'',65.0,y); dt(r.date||'',220.0,y); dt(r.type||'',285.0,y);
      if(n(r.ht)) dt(n(r.ht).toFixed(2),380.0,y);
      if(n(r.tva)) dt(n(r.tva).toFixed(2),445.0,y);
      if(n(r.ttc)) dt(n(r.ttc).toFixed(2)+' \u20ac',490.0,y);
    });
  });
  dt(f.signatureVille||'',325.0,693.4); dt(f.signatureDate||'',322.4,710.5);
  if(profile.signature&&profile.signature.startsWith('data:image')){
    try{
      var sd=profile.signature.split(',')[1];
      var sb=Uint8Array.from(atob(sd),function(c){return c.charCodeAt(0);});
      var si=profile.signature.includes('png')?await pdfDoc.embedPng(sb):await pdfDoc.embedJpg(sb);
      page.drawImage(si,{x:310,y:t2y(750,0)-30,width:80,height:30});
    }catch(e){}
  }
  var rv=(recusList||[]).filter(function(r){return !!r.data;});
  for(var ri=0;ri<rv.length;ri++){
    var r=rv[ri];
    if(r.type&&r.type.includes('pdf')){
      try{
        var rd2=r.data.includes(',')?r.data.split(',')[1]:r.data;
        var rb=atob(rd2); var rby=new Uint8Array(rb.length);
        for(var k=0;k<rb.length;k++) rby[k]=rb.charCodeAt(k);
        var rDoc=await PDFLib.PDFDocument.load(rby);
        var cp=await pdfDoc.copyPages(rDoc,rDoc.getPageIndices());
        cp.forEach(function(p){pdfDoc.addPage(p);});
      }catch(e){console.warn('recu pdf',e);}
    } else {
      try{
        var id2=r.data.includes(',')?r.data.split(',')[1]:r.data;
        var ib=Uint8Array.from(atob(id2),function(c){return c.charCodeAt(0);});
        var ie=(r.type&&r.type.includes('png'))?await pdfDoc.embedPng(ib):await pdfDoc.embedJpg(ib);
        var np=pdfDoc.addPage([595.28,841.89]); var mg=40;
        var mw=595.28-mg*2,mh=841.89-mg*2;
        var sc=Math.min(mw/ie.width,mh/ie.height);
        var iw=ie.width*sc,ih=ie.height*sc;
        np.drawImage(ie,{x:(595.28-iw)/2,y:(841.89-ih)/2,width:iw,height:ih});
      }catch(e){console.warn('recu img',e);}
    }
  }
  return await pdfDoc.save();
}
function _fallbackDownloadPDF(blob, titre) {
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a'); a.href=url; a.download=(titre||'note-de-frais')+'.pdf';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);},3000);
}
function imprimerFraisPDF() {
  document.getElementById('frais-pdf-overlay').setAttribute('data-printing','1');
  window.print();
  document.getElementById('frais-pdf-overlay').removeAttribute('data-printing');
}
function closeFraisPDFOverlay() {
  var o=document.getElementById('frais-pdf-overlay'); if(o) o.style.display='none';
}
