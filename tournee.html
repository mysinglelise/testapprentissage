<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎭 Tournée</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#059669">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Tournée">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, deleteDoc as _fbDeleteDoc }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCnv0S78A8kK9vHHrzQKfYbX6NWM1UXRhs",
    authDomain: "mon-planificateur-1e03c.firebaseapp.com",
    projectId: "mon-planificateur-1e03c",
    storageBucket: "mon-planificateur-1e03c.firebasestorage.app",
    messagingSenderId: "978579425049",
    appId: "1:978579425049:web:e53559ba2b80517c7c6788"
  };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  window._fb = { auth, db, doc, setDoc, getDoc, onSnapshot, collection, deleteDoc: _fbDeleteDoc, signOut };
  window._signOut = () => signOut(auth).then(() => { window.location.href = 'index.html'; });

  onAuthStateChanged(auth, user => {
    window._currentUser = user;
    if (user) {
      document.getElementById('auth-loading').style.display = 'none';
      document.getElementById('app-main').style.display = 'block';
      window._initFirestoreSync(user.uid);
      setTimeout(() => { window._loadBilletsFromFirestore && window._loadBilletsFromFirestore(user.uid); }, 500);
      switchTourneeTab('agenda');
    } else {
      window.location.href = 'index.html';
    }
  });
</script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;700&display=swap');

  :root {
    --ink:    #1a1a2e;
    --soft:   #4a4a6a;
    --muted:  #8888aa;
    --line:   #e8e8f0;
    --bg:     #fafaf8;
    --card:   #ffffff;
    --accent: #7c6fcd;
    --warm:   #e8845a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    font-weight: 300;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }
  h1,h2,h3,h4 { font-weight: 700; letter-spacing: -0.02em; }
  button { font-family: inherit; font-weight: 500; }

  /* ── HEADER ── */
  #tournee-header {
    background: var(--card);
    border-bottom: 1px solid var(--line);
    position: sticky; top: 0; z-index: 100;
  }
  #tournee-header::before {
    content: '';
    display: block;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--warm), var(--accent));
  }
  #header-top {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 20px 0;
  }
  #header-top h1 {
    margin: 0; flex: 1;
    font-family: 'Playfair Display', serif;
    font-size: 20px; font-weight: 400;
    color: var(--ink); letter-spacing: -0.02em;
  }
  .btn-back {
    background: none; border: 1px solid var(--line);
    color: var(--soft);
    width: 32px; height: 32px; border-radius: 50%;
    cursor: pointer; font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; text-decoration: none;
    transition: border-color .2s, color .2s;
  }
  .btn-back:hover { border-color: var(--accent); color: var(--accent); }
  .btn-signout {
    background: none; border: 1px solid var(--line);
    color: var(--muted); padding: 5px 12px; border-radius: 20px;
    cursor: pointer; font-size: 11px; font-weight: 500;
    transition: border-color .2s, color .2s;
  }
  .btn-signout:hover { border-color: var(--accent); color: var(--accent); }

  /* ── ONGLETS ── */
  #tournee-tabs-bar {
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: none; padding: 6px 12px 0;
    display: flex; gap: 0;
  }
  #tournee-tabs-bar::-webkit-scrollbar { display: none; }
  .t-tab {
    padding: 8px 14px;
    border: none; border-bottom: 2px solid transparent;
    background: none; color: var(--muted);
    font-weight: 500; font-size: 12px;
    cursor: pointer; white-space: nowrap; flex-shrink: 0;
    letter-spacing: 0.03em; text-transform: uppercase;
    transition: color .15s, border-color .15s;
  }
  .t-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .t-tab:hover { color: var(--soft); }

  /* ── CONTENU ── */
  #app-main { max-width: 740px; margin: 0 auto; padding: 28px 20px 100px; }
  .t-pane { display: none; animation: fadeUp .35s ease both; }
  .t-pane.active { display: block; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── VIEWER BILLET ── */
  #billet-viewer { display:none; position:fixed; inset:0; z-index:20000; background:#1a1a2e; flex-direction:column; }

  /* ── PDF OVERLAY ── */
  #frais-pdf-overlay { display:none; position:fixed; inset:0; z-index:30000; background:white; flex-direction:column; }

  /* ── AUTH LOADING ── */
  #auth-loading {
    display: flex; align-items: center; justify-content: center;
    height: 100vh; color: var(--accent); font-size: 15px; gap: 10px;
    font-family: 'DM Sans', sans-serif; font-weight: 300;
  }

  /* ── PRINT ── */
  @media print {
    #tournee-header { display: none !important; }
    body > *:not(#frais-pdf-overlay) { display: none !important; }
    #frais-pdf-overlay { position:static !important; display:block !important; background:white !important; }
    #frais-pdf-overlay > div:first-child { display:none !important; }
    #frais-pdf-content { overflow:visible !important; padding:0 !important; background:white !important; }
    [data-recu-idx] { page-break-before:always !important; break-before:page !important; }
    [data-recu-idx] img { max-width:100% !important; max-height:240mm !important; object-fit:contain !important; display:block !important; margin:auto !important; }
    * { -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
  }
</style>
</head>
<body>

<div id="auth-loading">⏳ Chargement...</div>

<div id="app-main" style="display:none;">

<div id="tournee-header">
  <div id="header-top">
    <a href="index.html" class="btn-back">←</a>
    <h1>🎭 Ma Tournée</h1>
    <button class="btn-signout" onclick="window._signOut()">Déco</button>
  </div>
  <div id="tournee-tabs-bar">
    <button class="t-tab active" id="t-tab-agenda"   onclick="switchTourneeTab('agenda')">📅 Agenda</button>
    <button class="t-tab"        id="t-tab-frais"    onclick="switchTourneeTab('frais')">🧾 Frais</button>
    <button class="t-tab"        id="t-tab-billets"  onclick="switchTourneeTab('billets')">🚆 Billets</button>
    <button class="t-tab"        id="t-tab-docs"     onclick="switchTourneeTab('docs')">📁 Docs</button>
    <button class="t-tab"        id="t-tab-contacts" onclick="switchTourneeTab('contacts')">👤 Contacts</button>
    <button class="t-tab"        id="t-tab-matos"    onclick="switchTourneeTab('matos')">🎒 Matos</button>
    <button class="t-tab"        id="t-tab-setlist"  onclick="switchTourneeTab('setlist')">🎵 Setlist</button>
  </div>
</div>

<div id="billet-viewer">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#1e293b;flex-shrink:0;gap:8px;">
    <span id="billet-viewer-nom" style="color:white;font-size:13px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
    <div id="billet-viewer-nav" style="display:none;align-items:center;gap:6px;flex-shrink:0;">
      <button onclick="billetPrevPage()" style="background:#334155;border:none;color:white;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;">‹</button>
      <span id="billet-page-info" style="color:#94a3b8;font-size:12px;white-space:nowrap;"></span>
      <button onclick="billetNextPage()" style="background:#334155;border:none;color:white;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;">›</button>
    </div>
    <button onclick="closeBilletViewer()" style="background:#ef4444;border:none;color:white;font-size:20px;width:36px;height:36px;border-radius:50%;cursor:pointer;flex-shrink:0;font-weight:700;line-height:1;">×</button>
  </div>
  <div id="billet-viewer-content" style="flex:1;overflow:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;align-items:center;padding:12px;gap:8px;"></div>
</div>

<input type="file" id="recus-file-input" accept=".pdf,image/*" multiple style="display:none;">
<input type="file" id="billet-file-input" accept=".pdf,image/*" multiple style="display:none;position:absolute;left:-9999px;" onchange="addBilletFiles(this)">

<div id="t-pane-agenda" class="t-pane active"><div id="tournee-list"></div></div>

<div id="t-pane-frais" class="t-pane">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
    <span style="color:#059669;font-size:14px;font-weight:700;">🧾 Notes de frais</span>
    <button onclick="newNoteFrais()" style="background:#10b981;color:white;border:none;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;">+ Nouvelle note</button>
  </div>
  <div id="frais-list-panel"></div>
  <div id="frais-edit-panel" style="display:none;"></div>
</div>

<div id="t-pane-billets" class="t-pane">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
    <span style="color:#059669;font-size:14px;font-weight:700;">🚆 Billets & Feuilles de route</span>
    <button onclick="document.getElementById('billet-file-input').click()" style="background:#10b981;color:white;border:none;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;font-family:system-ui;">+ Ajouter</button>
  </div>
  <div id="billets-list"></div>
</div>

<div id="t-pane-docs" class="t-pane">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
    <span style="color:#059669;font-size:14px;font-weight:700;">📁 Documents & Liens</span>
    <button onclick="toggleAddDoc()" style="background:#10b981;color:white;border:none;padding:5px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;">+ Ajouter</button>
  </div>
  <div id="add-doc-form" style="display:none;background:#f0fdf4;border-radius:10px;padding:12px;margin-bottom:12px;border:1px solid #a7f3d0;">
    <select id="doc-projet" style="width:100%;margin-bottom:6px;padding:6px 10px;border:1px solid #a7f3d0;border-radius:6px;font-size:13px;background:white;"><option value="">— Projet —</option></select>
    <input id="doc-nom" placeholder="Nom du document..." style="width:100%;margin-bottom:6px;padding:6px 10px;border:1px solid #a7f3d0;border-radius:6px;font-size:13px;box-sizing:border-box;"/>
    <input id="doc-url" placeholder="URL (optionnel)..." style="width:100%;margin-bottom:6px;padding:6px 10px;border:1px solid #a7f3d0;border-radius:6px;font-size:13px;box-sizing:border-box;"/>
    <label style="display:block;margin-bottom:6px;font-size:12px;color:#059669;cursor:pointer;">
      📎 Joindre un PDF
      <input type="file" accept=".pdf" style="display:none;" id="doc-pdf-input" onchange="handleDocPDF(this)"/>
    </label>
    <span id="doc-pdf-name" style="font-size:11px;color:#059669;"></span>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px;">
      <button onclick="toggleAddDoc()" style="background:#e2e8f0;border:none;padding:5px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-family:system-ui;">Annuler</button>
      <button onclick="saveDoc()" style="background:#10b981;color:white;border:none;padding:5px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:700;font-family:system-ui;">Enregistrer</button>
    </div>
  </div>
  <div id="docs-list"></div>
</div>

<div id="t-pane-contacts" class="t-pane">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
    <span style="color:#059669;font-size:14px;font-weight:700;">👤 Contacts</span>
    <button onclick="toggleAddContact()" style="background:#10b981;color:white;border:none;padding:5px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;">+ Ajouter</button>
  </div>
  <div id="add-contact-form" style="display:none;background:#f0fdf4;border-radius:10px;padding:12px;margin-bottom:12px;border:1px solid #a7f3d0;">
    <input id="ct-nom" placeholder="Nom..." style="width:100%;margin-bottom:6px;padding:6px 10px;border:1px solid #a7f3d0;border-radius:6px;font-size:13px;box-sizing:border-box;"/>
    <input id="ct-poste" placeholder="Poste / Rôle..." style="width:100%;margin-bottom:6px;padding:6px 10px;border:1px solid #a7f3d0;border-radius:6px;font-size:13px;box-sizing:border-box;"/>
    <input id="ct-lieu" placeholder="Lieu / Structure..." style="width:100%;margin-bottom:6px;padding:6px 10px;border:1px solid #a7f3d0;border-radius:6px;font-size:13px;box-sizing:border-box;"/>
    <input id="ct-tel" placeholder="Téléphone..." style="width:100%;margin-bottom:6px;padding:6px 10px;border:1px solid #a7f3d0;border-radius:6px;font-size:13px;box-sizing:border-box;"/>
    <input id="ct-email" placeholder="Email..." style="width:100%;margin-bottom:6px;padding:6px 10px;border:1px solid #a7f3d0;border-radius:6px;font-size:13px;box-sizing:border-box;"/>
    <select id="ct-projet" style="width:100%;margin-bottom:6px;padding:6px 10px;border:1px solid #a7f3d0;border-radius:6px;font-size:13px;background:white;"><option value="">— Projet (optionnel) —</option></select>
    <textarea id="ct-notes" placeholder="Notes..." style="width:100%;margin-bottom:6px;padding:6px 10px;border:1px solid #a7f3d0;border-radius:6px;font-size:13px;box-sizing:border-box;min-height:50px;resize:vertical;font-family:inherit;"></textarea>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button onclick="toggleAddContact()" style="background:#e2e8f0;border:none;padding:5px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-family:system-ui;">Annuler</button>
      <button onclick="saveContact()" style="background:#10b981;color:white;border:none;padding:5px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:700;font-family:system-ui;">Enregistrer</button>
    </div>
  </div>
  <div id="contacts-search-wrap" style="margin-bottom:10px;display:none;">
    <input id="contacts-search" placeholder="Rechercher..." style="width:100%;padding:7px 10px;border:1px solid #a7f3d0;border-radius:8px;font-size:13px;box-sizing:border-box;"/>
  </div>
  <div id="contacts-list"></div>
</div>

<div id="t-pane-matos" class="t-pane">
  <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap;">
    <select id="matos-projet-sel" onchange="onMatosProjetChange()" style="flex:1;min-width:130px;padding:7px 10px;border:1px solid #d1fae5;border-radius:8px;font-size:13px;background:white;"><option value="">— Projet —</option></select>
    <select id="matos-config-sel" onchange="renderMatos()" style="flex:1;min-width:130px;padding:7px 10px;border:1px solid #d1fae5;border-radius:8px;font-size:13px;background:white;display:none;"><option value="">— Config —</option></select>
    <button onclick="addMatosConfig()" id="matos-add-config-btn" style="display:none;background:#64748b;color:white;border:none;padding:7px 10px;border-radius:8px;cursor:pointer;font-size:11px;font-weight:700;font-family:system-ui;">+ Config</button>
    <button onclick="renameMatosConfig()" id="matos-rename-btn" style="display:none;background:none;border:1px solid #d1d5db;color:#64748b;padding:7px 8px;border-radius:8px;cursor:pointer;font-size:13px;">✏️</button>
    <button onclick="deleteMatosConfig()" id="matos-delete-btn" style="display:none;background:none;border:1px solid #fecaca;color:#dc2626;padding:7px 8px;border-radius:8px;cursor:pointer;font-size:13px;">🗑️</button>
  </div>
  <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap;">
    <button onclick="setMatosMode('pack')" id="matos-btn-pack" style="padding:6px 12px;border-radius:8px;border:none;background:#10b981;color:white;cursor:pointer;font-size:12px;font-weight:700;font-family:system-ui;">📦 Pack</button>
    <button onclick="setMatosMode('check')" id="matos-btn-check" style="padding:6px 12px;border-radius:8px;border:1px solid #d1fae5;background:white;color:#059669;cursor:pointer;font-size:12px;font-weight:700;font-family:system-ui;">✅ Check</button>
    <button onclick="setMatosMode('maison')" id="mode-maison-btn" style="padding:6px 12px;border-radius:8px;border:1px solid #d1fae5;background:white;color:#059669;cursor:pointer;font-size:12px;font-weight:700;font-family:system-ui;">🏠 Maison</button>
    <button onclick="setMatosMode('salle')" id="mode-salle-btn" style="padding:6px 12px;border-radius:8px;border:1px solid #d1fae5;background:white;color:#059669;cursor:pointer;font-size:12px;font-weight:700;font-family:system-ui;">🏛 Salle</button>
    <button onclick="exportMatos()" style="padding:6px 12px;border-radius:8px;border:none;background:#6366f1;color:white;cursor:pointer;font-size:12px;font-weight:700;font-family:system-ui;">📋 Export</button>
  </div>
  <div id="add-matos-form" style="display:none;background:#fefce8;border-radius:10px;padding:12px;margin-bottom:12px;border:1px solid #fcd34d;">
    <div style="font-size:13px;font-weight:700;color:#92400e;margin-bottom:8px;">Ajouter du matériel</div>
    <input id="matos-new-item" placeholder="Nom du matériel..." style="width:100%;margin-bottom:6px;padding:6px 10px;border:1px solid #fcd34d;border-radius:6px;font-size:13px;box-sizing:border-box;" onkeypress="if(event.key==='Enter')addMatosItem()"/>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button onclick="document.getElementById('add-matos-form').style.display='none'" style="background:#e2e8f0;border:none;padding:5px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-family:system-ui;">Annuler</button>
      <button onclick="addMatosItem()" style="background:#f59e0b;color:white;border:none;padding:5px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:700;font-family:system-ui;">Ajouter</button>
    </div>
  </div>
  <div id="add-piles-form" style="display:none;background:#fefce8;border-radius:10px;padding:12px;margin-bottom:12px;border:1px solid #fcd34d;">
    <div style="font-size:13px;font-weight:700;color:#92400e;margin-bottom:8px;">🔋 Piles</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;">
      <button onclick="setPilesCount(4)" style="padding:6px 14px;border:1px solid #fcd34d;border-radius:20px;background:white;cursor:pointer;font-size:13px;font-family:system-ui;">4</button>
      <button onclick="setPilesCount(6)" style="padding:6px 14px;border:1px solid #fcd34d;border-radius:20px;background:white;cursor:pointer;font-size:13px;font-family:system-ui;">6</button>
      <button onclick="setPilesCount(8)" style="padding:6px 14px;border:1px solid #fcd34d;border-radius:20px;background:white;cursor:pointer;font-size:13px;font-family:system-ui;">8</button>
      <button onclick="setPilesCount(10)" style="padding:6px 14px;border:1px solid #fcd34d;border-radius:20px;background:white;cursor:pointer;font-size:13px;font-family:system-ui;">10</button>
      <button onclick="setPilesCount(12)" style="padding:6px 14px;border:1px solid #fcd34d;border-radius:20px;background:white;cursor:pointer;font-size:13px;font-family:system-ui;">12</button>
      <input id="piles-custom" type="number" min="1" max="30" placeholder="Autre..." style="width:80px;padding:6px 10px;border:1px solid #fcd34d;border-radius:20px;font-size:13px;text-align:center;" oninput="setPilesCount(parseInt(this.value)||0)"/>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button onclick="closeAddPiles()" style="background:#e2e8f0;border:none;padding:5px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-family:system-ui;">Annuler</button>
      <button onclick="savePiles()" style="background:#f59e0b;color:white;border:none;padding:5px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:700;font-family:system-ui;">Enregistrer</button>
    </div>
  </div>
  <div id="matos-progress" style="display:none;margin-bottom:10px;background:#f0fdf4;border-radius:8px;padding:8px 12px;border:1px solid #a7f3d0;">
    <div id="matos-progress-label" style="font-size:12px;color:#059669;margin-bottom:4px;font-weight:600;"></div>
    <div style="background:#d1fae5;border-radius:4px;height:6px;overflow:hidden;">
      <div id="matos-progress-bar" style="height:100%;background:#10b981;border-radius:4px;transition:width .3s;width:0%;"></div>
    </div>

<script>
window._syncNow = function() {};
window._initFirestoreSync = function(uid) {
  var fb = window._fb;
  var SYNC_KEYS = ['tourneeFrais','fraisProfile','fraisEmployeurs','tourneeDocs',
                   'tourneeContacts','tourneeMatos','tourneeSetlist','tourneeNotes',
                   'tourneeMatosCochage','plannerEvents'];
  SYNC_KEYS.forEach(function(k) {
    fb.getDoc(fb.doc(fb.db,'users',uid,'data',k)).then(function(snap) {
      if (snap.exists()) {
        var remote = snap.data().value;
        var local  = localStorage.getItem(k);
        if (remote && remote !== local) {
          var orig = localStorage.__origSetItem || localStorage.setItem.bind(localStorage);
          orig(k, remote);
        }
      }
    }).catch(function(){});
  });
  var _pending = {};
  window._syncNow = function() {
    SYNC_KEYS.forEach(function(k) {
      var v = localStorage.getItem(k);
      if (v === null) return;
      clearTimeout(_pending[k]);
      _pending[k] = setTimeout(function(){
        fb.setDoc(fb.doc(fb.db,'users',uid,'data',k), { value: v, updatedAt: Date.now() })
          .catch(function(e){ console.warn('sync err', k, e); });
      }, 1500);
    });
  };
  var _orig = localStorage.setItem.bind(localStorage);
  localStorage.__origSetItem = _orig;
  localStorage.setItem = function(key, value) {
    _orig(key, value);
    if (SYNC_KEYS.indexOf(key) >= 0) window._syncNow();
  };
};

</script>

<script>
const TOURNEE_KW = ['concert','tournage','action culturelle','enregistrement','atelier','option'];

        // Standalone page — pas de panel à fermer
        function toggleTourneePanel() { /* no-op */ }

        var _curTourneeTab = 'agenda';
        function switchTourneeTab(tab) {
            _curTourneeTab = tab;
            ['agenda','frais','billets','docs','contacts','matos','setlist'].forEach(function(t) {
                var pane = document.getElementById('t-pane-'+t);
                var btn = document.getElementById('t-tab-'+t);
                if (pane) pane.style.display = t===tab ? 'block' : 'none';
                if (btn) {
                    btn.style.borderBottomColor = t===tab ? 'var(--accent)' : 'transparent';
                    btn.style.color = t===tab ? 'var(--accent)' : 'var(--muted)';
                    btn.style.fontWeight = t===tab ? '700' : '500';
                }
            });
            if (tab==='agenda') renderTournee();
            else if (tab==='frais') renderFraisList();
            else if (tab==='billets') renderBillets();
            else if (tab==='docs') renderDocs();
            else if (tab==='contacts') { populateProjetSelects(); renderContacts(); }
            else if (tab==='matos') { populateProjetSelects(); renderMatos(); }
            else if (tab==='setlist') { populateSetlistProjet(); renderSetlist(); }
        }

        // Générer une couleur stable à partir d'un nom de projet
        function projectColor(name) {
            const PALETTE = [
                '#ef4444','#f97316','#eab308','#22c55e','#14b8a6',
                '#3b82f6','#8b5cf6','#ec4899','#06b6d4','#84cc16',
                '#f43f5e','#a855f7','#0ea5e9','#10b981','#fb923c'
            ];
            let hash = 0;
            for (let c of name.toLowerCase()) hash = (hash * 31 + c.charCodeAt(0)) % PALETTE.length;
            return PALETTE[Math.abs(hash)];
        }

        function lighten(hex) {
            // Retourne une version très claire de la couleur pour le fond
            const r = parseInt(hex.slice(1,3),16);
            const g = parseInt(hex.slice(3,5),16);
            const b = parseInt(hex.slice(5,7),16);
            return `rgba(${r},${g},${b},0.12)`;
        }

        function extractProjectName(text) {
            // Format attendu : "Concert - Nom projet - Lieu - heure"
            // ou "Concert, Nom projet, Lieu"
            const parts = text.split(/[-,]/).map(p => p.trim()).filter(Boolean);
            if (parts.length >= 2) return parts[1].trim();
            return '';
        }

        // ── Gestion documents par projet ──────────────────
        let tourneeDocPDF = null; // PDF en attente d'upload

        function loadTourneeDocs() {
            return JSON.parse(localStorage.getItem('tourneeDocs') || '[]');
        }
        function saveTourneeDocs(docs) {
            localStorage.setItem('tourneeDocs', JSON.stringify(docs)); window._syncNow();
        }

        function toggleAddDoc() {
            const f = document.getElementById('add-doc-form');
            f.style.display = f.style.display === 'none' ? 'block' : 'none';
            if (f.style.display === 'block') {
                document.getElementById('doc-projet').value = '';
                document.getElementById('doc-nom').value = '';
                document.getElementById('doc-url').value = '';
                document.getElementById('doc-pdf-name').textContent = '';
                tourneeDocPDF = null;
            }
        }

        function uploadDocPDF(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                tourneeDocPDF = { name: file.name, data: e.target.result };
                document.getElementById('doc-pdf-name').textContent = '📄 ' + file.name;
            };
            reader.readAsDataURL(file);
        }

        function saveDoc() {
            const projet = document.getElementById('doc-projet').value.trim();
            const nom = document.getElementById('doc-nom').value.trim();
            const url = document.getElementById('doc-url').value.trim();
            if (!projet || !nom) return alert('Projet et nom requis !');
            const docs = loadTourneeDocs();
            docs.push({ id: Date.now(), projet, nom, url, pdf: tourneeDocPDF });
            saveTourneeDocs(docs);
            toggleAddDoc();
            renderDocs();
        }

        function deleteTourneeDoc(id) {
            const docs = loadTourneeDocs().filter(d => d.id !== id);
            saveTourneeDocs(docs);
            renderDocs();
        }

        function renderDocs() {
            const container = document.getElementById('docs-list');
            if (!container) return;
            const docs = loadTourneeDocs();
            if (docs.length === 0) {
                container.innerHTML = '<p style="color:#94a3b8;font-size:13px;font-style:italic;text-align:center;padding:10px;">Aucun document. Ajoute des liens ou PDFs par projet !</p>';
                return;
            }
            // Grouper par projet
            const byProjet = {};
            docs.forEach(d => { if (!byProjet[d.projet]) byProjet[d.projet] = []; byProjet[d.projet].push(d); });
            container.innerHTML = Object.entries(byProjet).map(([proj, items]) => {
                const color = projectColor(proj);
                return `<div style="margin-bottom:12px;">
                    <div style="font-size:13px;font-weight:700;color:${color};margin-bottom:6px;padding-left:4px;">📂 ${proj}</div>
                    ${items.map(d => `<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:${lighten(color)};border-radius:8px;margin-bottom:4px;">
                        <span style="flex:1;font-size:13px;color:#1e293b;font-weight:500;">${d.nom}</span>
                        ${d.url ? `<a href="${d.url}" target="_blank" rel="noopener" style="font-size:12px;color:#6366f1;text-decoration:none;" title="${d.url}">🔗</a>` : ''}
                        ${d.pdf ? `<a href="${d.pdf.data}" download="${d.pdf.name}" style="font-size:12px;color:#dc2626;text-decoration:none;" title="Télécharger ${d.pdf.name}">📥</a>` : ''}
                        <button onclick="deleteTourneeDoc(${d.id})" style="background:none;border:none;cursor:pointer;font-size:14px;color:#dc2626;opacity:0.5;">×</button>
                    </div>`).join('')}
                </div>`;
            }).join('');
        }

        // ── Helpers projets tournée ────────────────────────────
        function getTourneeProjects() {
            var raw = localStorage.getItem('plannerEvents');
            var events = raw ? JSON.parse(raw) : {};
            var projs = {};
            Object.values(events).forEach(function(dayEvts) {
                if (!Array.isArray(dayEvts)) return;
                dayEvts.forEach(function(evt) {
                    var lower = (evt.text||'').toLowerCase();
                    if (TOURNEE_KW.some(function(k){return lower.startsWith(k);})) {
                        var proj = extractProjectName(evt.text);
                        if (proj) projs[proj] = true;
                    }
                });
            });
            var matos = loadMatosData();
            Object.keys(matos).forEach(function(p){ projs[p]=true; });
            return Object.keys(projs).sort();
        }

        function populateProjetSelects() {
            var projs = getTourneeProjects();
            ['ct-projet','matos-projet-sel'].forEach(function(id) {
                var sel = document.getElementById(id); if(!sel) return;
                var cur = sel.value;
                sel.innerHTML = id==='ct-projet'
                    ? '<option value="">— Aucun projet —</option>'
                    : '<option value="">— Choisir un projet —</option>';
                projs.forEach(function(p) {
                    var opt = document.createElement('option');
                    opt.value=p; opt.textContent=p;
                    if(p===cur) opt.selected=true;
                    sel.appendChild(opt);
                });
                if (id==='matos-projet-sel') {
                    var opt = document.createElement('option');
                    opt.value='__new__'; opt.textContent='+ Créer un nouveau projet matos';
                    sel.appendChild(opt);
                }
            });
        }

        // ── Contacts Pro ──────────────────────────────────────
        var _editContactId = null;
        function loadContacts() { return JSON.parse(localStorage.getItem('tourneeContacts')||'[]'); }
        function saveContacts(data) { localStorage.setItem('tourneeContacts',JSON.stringify(data)); window._syncNow&&window._syncNow(); }

        function toggleAddContact() {
            var f = document.getElementById('add-contact-form');
            var open = f.style.display !== 'none';
            if (open) { f.style.display='none'; _editContactId=null; }
            else {
                _editContactId=null;
                ['ct-nom','ct-poste','ct-lieu','ct-tel','ct-email','ct-notes'].forEach(function(id){var el=document.getElementById(id);if(el)el.value='';});
                document.getElementById('ct-projet').value='';
                f.style.display='block';
                document.getElementById('ct-nom').focus();
            }
        }

        function saveContact() {
            var nom = document.getElementById('ct-nom').value.trim();
            if (!nom) { alert('Le nom est obligatoire !'); return; }
            var contact = {
                id: _editContactId||Date.now(), nom,
                poste: document.getElementById('ct-poste').value.trim(),
                lieu: document.getElementById('ct-lieu').value.trim(),
                tel: document.getElementById('ct-tel').value.trim(),
                email: document.getElementById('ct-email').value.trim(),
                projet: document.getElementById('ct-projet').value||'',
                notes: document.getElementById('ct-notes').value.trim(),
            };
            var data = loadContacts();
            if (_editContactId) { var idx=data.findIndex(function(c){return c.id===_editContactId;}); if(idx>=0)data[idx]=contact; }
            else data.push(contact);
            saveContacts(data); _editContactId=null;
            document.getElementById('add-contact-form').style.display='none';
            renderContacts();
        }

        function editContact(id) {
            var c = loadContacts().find(function(x){return x.id===id;}); if(!c) return;
            _editContactId=id;
            document.getElementById('ct-nom').value=c.nom||'';
            document.getElementById('ct-poste').value=c.poste||'';
            document.getElementById('ct-lieu').value=c.lieu||'';
            document.getElementById('ct-tel').value=c.tel||'';
            document.getElementById('ct-email').value=c.email||'';
            document.getElementById('ct-projet').value=c.projet||'';
            document.getElementById('ct-notes').value=c.notes||'';
            document.getElementById('add-contact-form').style.display='block';
            document.getElementById('ct-nom').focus();
        }

        function deleteContact(id) {
            if (!confirm('Supprimer ce contact ?')) return;
            saveContacts(loadContacts().filter(function(c){return c.id!==id;})); renderContacts();
        }

        function renderContacts() {
            var container = document.getElementById('contacts-list');
            var searchWrap = document.getElementById('contacts-search-wrap');
            if (!container) return;
            var data = loadContacts();
            if (searchWrap) searchWrap.style.display = data.length>3 ? '' : 'none';
            var q = (document.getElementById('contacts-search')?.value||'').toLowerCase().trim();
            if (q) data = data.filter(function(c){return (c.nom||'').toLowerCase().includes(q)||(c.poste||'').toLowerCase().includes(q)||(c.lieu||'').toLowerCase().includes(q)||(c.projet||'').toLowerCase().includes(q);});
            if (!data.length) {
                container.innerHTML='<p style="color:#94a3b8;font-size:13px;font-style:italic;text-align:center;padding:10px;">'+(q?'Aucun résultat':'Aucun contact encore.')+'</p>';
                return;
            }
            // Grouper par projet
            var byProj = {};
            data.forEach(function(c){ var k=c.projet||''; if(!byProj[k])byProj[k]=[]; byProj[k].push(c); });
            var keys = Object.keys(byProj).sort(function(a,b){ if(!a)return 1; if(!b)return -1; return a.localeCompare(b); });
            container.innerHTML = keys.map(function(proj) {
                var color = proj ? projectColor(proj) : '#94a3b8';
                var headerHtml = proj
                    ? '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:'+color+';margin:10px 0 6px;padding:3px 8px;background:'+lighten(proj)+';border-radius:5px;border-left:3px solid '+color+';">📂 '+proj+'</div>'
                    : '<div style="font-size:11px;color:#94a3b8;margin:10px 0 6px;">Sans projet</div>';
                var cardsHtml = byProj[proj].slice().sort(function(a,b){return (a.nom||'').localeCompare(b.nom||'');}).map(function(c) {
                    var initiale=(c.nom||'?')[0].toUpperCase();
                    var bg=c.projet?projectColor(c.projet):'#94a3b8';
                    return '<div style="display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:'+lighten(c.projet||'')+';border-radius:10px;margin-bottom:6px;border:1px solid '+bg+'22;">'+
                        '<div style="width:32px;height:32px;border-radius:50%;background:'+bg+';color:white;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;">'+initiale+'</div>'+
                        '<div style="flex:1;min-width:0;">'+
                            '<div style="font-size:14px;font-weight:700;color:#1e293b;">'+c.nom+'</div>'+
                            '<div style="font-size:12px;color:#64748b;margin-top:1px;">'+(c.poste?'<span style="font-weight:600;color:'+bg+';">'+c.poste+'</span>':'')+(c.poste&&c.lieu?' · ':'')+(c.lieu||'')+'</div>'+
                            (c.tel?'<div style="font-size:12px;color:#374151;margin-top:2px;">📞 <a href="tel:'+c.tel+'" style="color:#374151;text-decoration:none;">'+c.tel+'</a></div>':'')+
                            (c.email?'<div style="font-size:12px;margin-top:1px;">✉️ <a href="mailto:'+c.email+'" style="color:#6366f1;text-decoration:none;">'+c.email+'</a></div>':'')+
                            (c.notes?'<div style="font-size:11px;color:#64748b;margin-top:3px;font-style:italic;">'+c.notes+'</div>':'')+
                        '</div>'+
                        '<div style="display:flex;gap:4px;flex-shrink:0;">'+
                            '<button onclick="editContact('+c.id+')" style="background:none;border:1px solid #d1fae5;border-radius:6px;cursor:pointer;font-size:12px;color:#059669;padding:3px 8px;">✏️</button>'+
                            '<button onclick="deleteContact('+c.id+')" style="background:none;border:1px solid #fecaca;border-radius:6px;cursor:pointer;font-size:12px;color:#dc2626;padding:3px 8px;">×</button>'+
                        '</div></div>';
                }).join('');
                return headerHtml + cardsHtml;
            }).join('');
        }

        // ── Matos ─────────────────────────────────────────────
        var _matosMode = 'maison';
        var _editContenantCtx = null;

        // ── MATOS avec configs ────────────────────────────────
        function loadMatosData() { return JSON.parse(localStorage.getItem('tourneeMatos')||'{}'); }
        function saveMatosData(data) { localStorage.setItem('tourneeMatos',JSON.stringify(data)); window._syncNow&&window._syncNow(); }
        function loadMatosCochage() { return JSON.parse(localStorage.getItem('tourneeMatosCochage')||'{}'); }
        function saveMatosCochage(data) { localStorage.setItem('tourneeMatosCochage',JSON.stringify(data)); window._syncNow&&window._syncNow(); }

        // Retourne la config active du matos : { contenants, piles }
        function getMatosConfig() {
            var proj=document.getElementById('matos-projet-sel')?.value;
            var cfg=document.getElementById('matos-config-sel')?.value||proj;
            if(!proj||proj==='__new__') return null;
            var data=loadMatosData();
            if(!data[proj]) data[proj]={configs:{}};
            // Migration données anciennes (sans configs)
            if(data[proj].contenants&&!data[proj].configs){
                data[proj].configs={};
                data[proj].configs[proj]={contenants:data[proj].contenants,piles:data[proj].piles||0};
                delete data[proj].contenants; delete data[proj].piles;
                saveMatosData(data);
            }
            if(!data[proj].configs) data[proj].configs={};
            if(!cfg||!data[proj].configs[cfg]){
                // Config par défaut = nom du projet
                if(!data[proj].configs[proj]) data[proj].configs[proj]={contenants:[],piles:0};
                cfg=proj;
                var sel=document.getElementById('matos-config-sel');
                if(sel) sel.value=cfg;
            }
            return {proj,cfg,data,configData:data[proj].configs[cfg]};
        }

        function populateMatosConfigSel() {
            var proj=document.getElementById('matos-projet-sel')?.value;
            var cfgSel=document.getElementById('matos-config-sel');
            var addBtn=document.getElementById('matos-add-config-btn');
            var renBtn=document.getElementById('matos-rename-btn');
            var delBtn=document.getElementById('matos-delete-btn');
            if(!cfgSel||!proj||proj==='__new__'){if(cfgSel)cfgSel.style.display='none';if(addBtn)addBtn.style.display='none';if(renBtn)renBtn.style.display='none';if(delBtn)delBtn.style.display='none';return;}
            var data=loadMatosData();
            if(!data[proj]||!data[proj].configs){if(cfgSel)cfgSel.style.display='none';if(addBtn)addBtn.style.display='none';if(renBtn)renBtn.style.display='none';if(delBtn)delBtn.style.display='none';return;}
            var configs=Object.keys(data[proj].configs);
            var cur=cfgSel.value;
            cfgSel.innerHTML='';
            configs.forEach(function(c){var opt=document.createElement('option');opt.value=c;opt.textContent=c;if(c===cur)opt.selected=true;cfgSel.appendChild(opt);});
            var hasMultiple=configs.length>1;
            cfgSel.style.display=hasMultiple?'':'none';
            if(addBtn)addBtn.style.display='';
            if(renBtn)renBtn.style.display='';
            if(delBtn)delBtn.style.display=configs.length>1?'':'none';
        }

        function addMatosConfig() {
            var proj=document.getElementById('matos-projet-sel')?.value; if(!proj||proj==='__new__') return;
            var n=prompt('Nom de la nouvelle configuration (ex: Formule Nord) :'); if(!n||!n.trim()) return;
            var data=loadMatosData();
            if(!data[proj]) data[proj]={configs:{}};
            if(!data[proj].configs) data[proj].configs={};
            data[proj].configs[n.trim()]={contenants:[],piles:0};
            saveMatosData(data);
            populateMatosConfigSel();
            document.getElementById('matos-config-sel').value=n.trim();
            document.getElementById('matos-config-sel').style.display='';
            renderMatos();
        }

        function setMatosMode(mode) {
            _matosMode=mode;
            document.getElementById('mode-maison-btn').style.background=mode==='maison'?'#10b981':'white';
            document.getElementById('mode-maison-btn').style.color=mode==='maison'?'white':'#10b981';
            document.getElementById('mode-salle-btn').style.background=mode==='salle'?'#10b981':'white';
            document.getElementById('mode-salle-btn').style.color=mode==='salle'?'white':'#10b981';
            renderMatos();
        }

        function onMatosProjetChange() {
            var v=document.getElementById('matos-projet-sel').value;
            if(v==='__new__'){
                var n=prompt('Nom du nouveau projet :');
                if(n&&n.trim()){
                    var d=loadMatosData();
                    d[n.trim()]={configs:{}};
                    d[n.trim()].configs[n.trim()]={contenants:[],piles:0};
                    saveMatosData(d);
                    populateProjetSelects();
                    document.getElementById('matos-projet-sel').value=n.trim();
                } else { document.getElementById('matos-projet-sel').value=''; }
            }
            populateMatosConfigSel();
            renderMatos();
        }

        function openAddContenant(projetNom, parentId) {
            var ctx=getMatosConfig();
            _editContenantCtx={ proj:projetNom||(ctx?ctx.proj:''), cfg:ctx?ctx.cfg:'', parentId:parentId||null, editId:null };
            document.getElementById('cont-nom').value='';
            document.getElementById('cont-notes').value='';
            document.getElementById('add-contenant-titre').textContent=parentId?'Nouveau sous-contenant':'Nouveau contenant';
            document.getElementById('add-contenant-form').style.display='block';
            document.getElementById('cont-nom').focus();
        }

        function closeAddContenant() { document.getElementById('add-contenant-form').style.display='none'; _editContenantCtx=null; }

        function saveContenant() {
            var nom=document.getElementById('cont-nom').value.trim(); if(!nom){alert('Nom obligatoire');return;}
            var notes=document.getElementById('cont-notes').value.trim();
            var ctx=getMatosConfig(); if(!ctx){alert('Choisir un projet');return;}
            var data=ctx.data; var configData=ctx.configData;
            if(!configData.contenants)configData.contenants=[];
            if(_editContenantCtx?.editId) {
                var cont=configData.contenants.find(function(c){return c.id===_editContenantCtx.editId;});
                if(cont){cont.nom=nom;cont.notes=notes;}
                else configData.contenants.forEach(function(c){var sc=(c.sousContenants||[]).find(function(s){return s.id===_editContenantCtx.editId;});if(sc){sc.nom=nom;sc.notes=notes;}});
            } else if(_editContenantCtx?.parentId) {
                var parent=configData.contenants.find(function(c){return c.id===_editContenantCtx.parentId;});
                if(parent){if(!parent.sousContenants)parent.sousContenants=[];parent.sousContenants.push({id:Date.now(),nom,notes,items:[]});}
            } else {
                configData.contenants.push({id:Date.now(),nom,notes,sousContenants:[],items:[]});
            }
            saveMatosData(data); closeAddContenant(); renderMatos();
        }

        function editContenant(proj,id,parentId) {
            var ctx=getMatosConfig(); if(!ctx)return;
            var configData=ctx.configData; var obj=null;
            if(parentId){var p=configData.contenants?.find(function(c){return c.id===parentId;});obj=p?.sousContenants?.find(function(s){return s.id===id;});}
            else obj=configData.contenants?.find(function(c){return c.id===id;});
            if(!obj)return;
            _editContenantCtx={proj:ctx.proj,cfg:ctx.cfg,editId:id,parentId:parentId||null};
            document.getElementById('cont-nom').value=obj.nom||'';
            document.getElementById('cont-notes').value=obj.notes||'';
            document.getElementById('add-contenant-titre').textContent='Modifier';
            document.getElementById('add-contenant-form').style.display='block';
            document.getElementById('cont-nom').focus();
        }

        function deleteContenant(proj,id,parentId) {
            if(!confirm('Supprimer ce contenant et tout son contenu ?'))return;
            var ctx=getMatosConfig(); if(!ctx)return;
            var configData=ctx.configData;
            if(parentId){var p=configData.contenants?.find(function(c){return c.id===parentId;});if(p)p.sousContenants=(p.sousContenants||[]).filter(function(s){return s.id!==id;});}
            else if(configData.contenants)configData.contenants=configData.contenants.filter(function(c){return c.id!==id;});
            saveMatosData(ctx.data); renderMatos();
        }

        function openAddItem(proj,contenantId,sousContenantId) {
            var ctx=getMatosConfig(); if(!ctx)return;
            var label=prompt('Nom de l\'item :'); if(!label||!label.trim())return;
            var qte=prompt('Quantité (laisser vide = 1) :','1')||'1';
            var critique=confirm('Item critique ⚡ ? (OK = oui)');
            var item={id:Date.now(),nom:label.trim(),qte,critique};
            var configData=ctx.configData;
            if(sousContenantId&&sousContenantId!=='null'){
                var cont=configData.contenants?.find(function(c){return c.id===contenantId;});
                var sc=cont?.sousContenants?.find(function(s){return s.id===sousContenantId;});
                if(sc){if(!sc.items)sc.items=[];sc.items.push(item);}
            } else {
                var cont=configData.contenants?.find(function(c){return c.id===contenantId;});
                if(cont){if(!cont.items)cont.items=[];cont.items.push(item);}
            }
            saveMatosData(ctx.data); renderMatos();
        }

        function deleteItem(proj,contenantId,sousContenantId,itemId) {
            var ctx=getMatosConfig(); if(!ctx)return;
            var configData=ctx.configData;
            if(sousContenantId&&sousContenantId!=='null'){
                var cont=configData.contenants?.find(function(c){return c.id===contenantId;});
                var sc=cont?.sousContenants?.find(function(s){return s.id===sousContenantId;});
                if(sc)sc.items=(sc.items||[]).filter(function(i){return i.id!==itemId;});
            } else {
                var cont=configData.contenants?.find(function(c){return c.id===contenantId;});
                if(cont)cont.items=(cont.items||[]).filter(function(i){return i.id!==itemId;});
            }
            saveMatosData(ctx.data); renderMatos();
        }

        function toggleCoche(proj,contenantId,sousContenantId,itemId) {
            var ctx=getMatosConfig(); if(!ctx)return;
            var cochage=loadMatosCochage();
            var key=_matosMode+'__'+ctx.proj+'__'+ctx.cfg+'__'+contenantId+'__'+(sousContenantId||'')+'__'+itemId;
            cochage[key]=!cochage[key];
            saveMatosCochage(cochage); renderMatos();
        }

        function resetCochage() {
            var ctx=getMatosConfig(); if(!ctx)return;
            var cochage=loadMatosCochage();
            var prefix=_matosMode+'__'+ctx.proj+'__'+ctx.cfg+'__';
            Object.keys(cochage).forEach(function(k){if(k.startsWith(prefix))delete cochage[k];});
            // Reset piles aussi
            var pilesPrefix='piles__'+_matosMode+'__'+ctx.proj+'__'+ctx.cfg+'__';
            Object.keys(cochage).forEach(function(k){if(k.startsWith(pilesPrefix))delete cochage[k];});
            saveMatosCochage(cochage); renderMatos();
        }

        function _renderItems(proj,cfg,items,contenantId,sousContenantId,color) {
            if(!items||!items.length) return '';
            var cochage=loadMatosCochage();
            var sorted=items.slice().sort(function(a,b){if(a.critique&&!b.critique)return -1;if(!a.critique&&b.critique)return 1;return 0;});
            return sorted.map(function(item) {
                var key=_matosMode+'__'+proj+'__'+cfg+'__'+contenantId+'__'+(sousContenantId||'')+'__'+item.id;
                var coche=!!cochage[key];
                var critiqueHtml=item.critique?'<span style="color:#ef4444;font-size:11px;margin-left:3px;">⚡</span>':'';
                var scId=sousContenantId||'null';
                return '<div style="display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:6px;background:'+(coche?'#f0fdf4':'white')+';border:1px solid '+(coche?'#86efac':'#e2e8f0')+';margin-bottom:4px;opacity:'+(coche?'0.7':'1')+';">'+
                    '<input type="checkbox" '+(coche?'checked':'')+' onchange="toggleCoche(\''+proj+'\','+contenantId+','+scId+','+item.id+')" style="width:16px;height:16px;accent-color:'+color+';cursor:pointer;flex-shrink:0;" />'+
                    '<span style="flex:1;font-size:13px;color:#1e293b;'+(coche?'text-decoration:line-through;color:#94a3b8;':'')+'">'+item.nom+(item.qte&&item.qte!=='1'?' <span style="color:#64748b;font-size:11px;">×'+item.qte+'</span>':'')+critiqueHtml+'</span>'+
                    '<button onclick="deleteItem(\''+proj+'\','+contenantId+','+scId+','+item.id+')" style="background:none;border:none;cursor:pointer;color:#dc262644;font-size:14px;padding:0 2px;">×</button>'+
                '</div>';
            }).join('');
        }

        // ── PILES ─────────────────────────────────────────────
        var _pilesCount=0;
        function setPilesCount(n) {
            _pilesCount=n;
            // Mettre en valeur le bouton sélectionné
            document.querySelectorAll('#piles-count-btns button').forEach(function(btn){
                btn.style.background=parseInt(btn.textContent)===n?'#f59e0b':'white';
                btn.style.color=parseInt(btn.textContent)===n?'white':'inherit';
            });
        }
        function openAddPiles() {
            _pilesCount=0;
            document.querySelectorAll('#piles-count-btns button').forEach(function(btn){btn.style.background='white';btn.style.color='inherit';});
            var input=document.getElementById('piles-custom');if(input)input.value='';
            document.getElementById('add-piles-form').style.display='block';
        }
        function closeAddPiles() { document.getElementById('add-piles-form').style.display='none'; }

        function savePiles() {
            var ctx=getMatosConfig(); if(!ctx){alert('Choisir un projet');return;}
            if(!_pilesCount||_pilesCount<1){alert('Choisir un nombre de piles');return;}
            ctx.configData.piles=_pilesCount;
            saveMatosData(ctx.data); closeAddPiles(); renderMatos();
        }

        function togglePile(idx) {
            var ctx=getMatosConfig(); if(!ctx)return;
            var cochage=loadMatosCochage();
            var key='piles__'+_matosMode+'__'+ctx.proj+'__'+ctx.cfg+'__'+idx;
            cochage[key]=!cochage[key];
            saveMatosCochage(cochage); renderPilesSection(ctx);
            renderMatosProgressBar(ctx);
        }

        function renderPilesSection(ctx) {
            var el=document.getElementById('piles-section'); if(!el)return;
            var n=ctx.configData.piles||0;
            if(!n){el.innerHTML='';return;}
            var cochage=loadMatosCochage();
            var color=projectColor(ctx.proj);
            var pilesHtml='';
            var coches=0;
            for(var i=0;i<n;i++){
                var key='piles__'+_matosMode+'__'+ctx.proj+'__'+ctx.cfg+'__'+i;
                var coche=!!cochage[key];
                if(coche)coches++;
                pilesHtml+='<button onclick="togglePile('+i+')" style="font-size:22px;cursor:pointer;border:none;background:none;padding:2px;opacity:'+(coche?'1':'0.3')+';transition:opacity .15s;" title="Pile '+(i+1)+'">🔋</button>';
            }
            var modeLabel = _matosMode==='maison' ? '🏠 Piles à charger (départ maison)' : '🎭 Piles à vérifier (départ salle)';
            el.innerHTML='<div style="background:#fffbeb;border:1.5px solid #fcd34d;border-radius:12px;padding:14px;margin-bottom:12px;">'+
                '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">'+
                    '<span style="font-size:13px;font-weight:800;color:#b45309;">🔋 '+modeLabel+'</span>'+
                    '<span style="font-size:12px;color:#92400e;">'+coches+'/'+n+'</span>'+
                    '<button onclick="deletePiles()" style="background:none;border:none;cursor:pointer;font-size:14px;color:#dc262644;margin-left:auto;">×</button>'+
                '</div>'+
                '<div style="display:flex;gap:4px;flex-wrap:wrap;">'+pilesHtml+'</div>'+
                '</div>';
        }

        function deletePiles() {
            var ctx=getMatosConfig(); if(!ctx)return;
            if(!confirm('Supprimer les piles ?'))return;
            ctx.configData.piles=0;
            saveMatosData(ctx.data); renderMatos();
        }

        function renderMatosProgressBar(ctx) {
            var cochage=loadMatosCochage();
            var configData=ctx.configData;
            var total=0,coches=0;
            function countItems(items,cId,scId){(items||[]).forEach(function(item){total++;var key=_matosMode+'__'+ctx.proj+'__'+ctx.cfg+'__'+cId+'__'+(scId||'')+'__'+item.id;if(cochage[key])coches++;});}
            (configData.contenants||[]).forEach(function(cont){countItems(cont.items,cont.id,null);(cont.sousContenants||[]).forEach(function(sc){countItems(sc.items,cont.id,sc.id);});});
            var nPiles=configData.piles||0;
            for(var pi=0;pi<nPiles;pi++){total++;if(cochage['piles__'+_matosMode+'__'+ctx.proj+'__'+ctx.cfg+'__'+pi])coches++;}
            var progress=document.getElementById('matos-progress');
            if(progress){
                progress.style.display=total>0?'':'none';
                var pct=total>0?Math.round(coches/total*100):0;
                var modeLabel=_matosMode==='maison'?'🏠 Départ maison':'🎭 Départ salle';
                var configLabel=ctx.cfg!==ctx.proj?' — '+ctx.cfg:'';
                document.getElementById('matos-progress-label').textContent=modeLabel+configLabel+' — '+coches+'/'+total+' ('+pct+'%)';
                document.getElementById('matos-progress-bar').style.width=pct+'%';
                document.getElementById('matos-progress-bar').style.background=pct===100?'#059669':projectColor(ctx.proj);
            }
        }

        function renderMatos() {
            var ctx=getMatosConfig();
            var list=document.getElementById('matos-list');
            var pilesEl=document.getElementById('piles-section');
            if(!list)return;
            if(!ctx){
                list.innerHTML='<p style="color:#94a3b8;font-size:13px;text-align:center;padding:20px;">Choisir un projet pour voir ou créer sa liste matos.</p>';
                if(pilesEl)pilesEl.innerHTML='';
                var progress=document.getElementById('matos-progress');if(progress)progress.style.display='none'; return;
            }
            var configData=ctx.configData;
            var color=projectColor(ctx.proj);
            renderPilesSection(ctx);
            renderMatosProgressBar(ctx);
            if(!configData.contenants||!configData.contenants.length){
                list.innerHTML='<p style="color:#94a3b8;font-size:13px;text-align:center;padding:20px;">Aucun contenant. Clique "+ Contenant" pour commencer.</p>'; return;
            }
            list.innerHTML=(configData.contenants||[]).map(function(cont){
                var itemsHtml=_renderItems(ctx.proj,ctx.cfg,cont.items,cont.id,null,color);
                var sousHtml=(cont.sousContenants||[]).map(function(sc){
                    var scItems=_renderItems(ctx.proj,ctx.cfg,sc.items,cont.id,sc.id,color);
                    return '<div style="margin-left:16px;margin-top:8px;border-left:3px solid '+color+'44;padding-left:10px;">'+
                        '<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">'+
                            '<span style="font-size:12px;font-weight:700;color:'+color+';">📦 '+sc.nom+'</span>'+
                            (sc.notes?'<span style="font-size:11px;color:#94a3b8;">'+sc.notes+'</span>':'')+
                            '<button onclick="openAddItem(\''+ctx.proj+'\','+cont.id+','+sc.id+')" style="background:'+color+';color:white;border:none;border-radius:5px;padding:2px 8px;font-size:10px;cursor:pointer;font-family:system-ui;margin-left:auto;">+ item</button>'+
                            '<button onclick="editContenant(\''+ctx.proj+'\','+sc.id+','+cont.id+')" style="background:none;border:1px solid #e2e8f0;border-radius:5px;padding:2px 6px;font-size:10px;cursor:pointer;color:#64748b;">✏️</button>'+
                            '<button onclick="deleteContenant(\''+ctx.proj+'\','+sc.id+','+cont.id+')" style="background:none;border:1px solid #none;cursor:pointer;font-size:14px;color:#dc262644;">×</button>'+
                        '</div>'+(scItems||'<p style="font-size:12px;color:#94a3b8;padding:4px 0;">Vide</p>')+'</div>';
                }).join('');
                return '<div style="background:'+lighten(ctx.proj)+';border:1.5px solid '+color+'44;border-radius:12px;padding:14px;margin-bottom:12px;">'+
                    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">'+
                        '<span style="font-size:14px;font-weight:800;color:'+color+';">🎒 '+cont.nom+'</span>'+
                        (cont.notes?'<span style="font-size:11px;color:#64748b;font-style:italic;">'+cont.notes+'</span>':'')+
                        '<div style="margin-left:auto;display:flex;gap:4px;">'+
                            '<button onclick="openAddItem(\''+ctx.proj+'\','+cont.id+',null)" style="background:'+color+';color:white;border:none;border-radius:6px;padding:3px 10px;font-size:11px;cursor:pointer;font-weight:700;font-family:system-ui;">+ item</button>'+
                            '<button onclick="openAddContenant(\''+ctx.proj+'\','+cont.id+')" style="background:white;color:'+color+';border:1px solid '+color+';border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer;font-family:system-ui;">+ sous-cont.</button>'+
                            '<button onclick="editContenant(\''+ctx.proj+'\','+cont.id+',null)" style="background:none;border:1px solid #e2e8f0;border-radius:6px;padding:3px 7px;font-size:11px;cursor:pointer;color:#64748b;">✏️</button>'+
                            '<button onclick="deleteContenant(\''+ctx.proj+'\','+cont.id+',null)" style="background:none;border:none;cursor:pointer;font-size:18px;color:#dc262644;">×</button>'+
                        '</div>'+
                    '</div>'+itemsHtml+sousHtml+'</div>';
            }).join('');
        }

        function exportMatos() {
            var ctx=getMatosConfig(); if(!ctx){alert('Choisir un projet');return;}
            var configData=ctx.configData; var color=projectColor(ctx.proj);
            var titre='🎒 '+ctx.proj+(ctx.cfg!==ctx.proj?' — '+ctx.cfg:'');
            var body='';
            if(configData.piles>0){
                body+='<h2 style="color:#b45309;border-bottom:2px solid #fcd34d;padding-bottom:6px;">🔋 Piles à charger ('+configData.piles+')</h2>';
                body+='<ul style="list-style:none;padding:0;margin-bottom:16px;">';
                for(var pi=0;pi<configData.piles;pi++) body+='<li style="padding:4px 0;display:flex;gap:10px;align-items:center;">🔋 Pile '+(pi+1)+' <span style="display:inline-block;width:16px;height:16px;border:1.5px solid #fcd34d;border-radius:3px;margin-left:auto;"></span></li>';
                body+='</ul>';
            }
            (configData.contenants||[]).forEach(function(cont){
                body+='<h2 style="color:'+color+';border-bottom:2px solid '+color+';padding-bottom:6px;">🎒 '+cont.nom+'</h2>';
                if(cont.notes)body+='<p style="font-size:12px;color:#64748b;font-style:italic;margin:-8px 0 10px;">'+cont.notes+'</p>';
                var renderExportItems=function(items){return (items||[]).slice().sort(function(a,b){if(a.critique&&!b.critique)return -1;if(!a.critique&&b.critique)return 1;return 0;}).map(function(item){return '<li style="padding:5px 0;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:10px;">'+(item.critique?'<span style="color:#ef4444;">⚡</span> ':'')+item.nom+(item.qte&&item.qte!=='1'?' <span style="color:#888;">×'+item.qte+'</span>':'')+' <span style="display:inline-block;width:16px;height:16px;border:1.5px solid #ccc;border-radius:3px;vertical-align:middle;margin-left:auto;flex-shrink:0;"></span></li>';}).join('');};
                body+='<ul style="list-style:none;padding:0;margin-bottom:10px;">'+renderExportItems(cont.items)+'</ul>';
                (cont.sousContenants||[]).forEach(function(sc){

        // ── SETLIST avec configs ───────────────────────────────
        var _editChansonId=null;
        function loadSetlistData() { return JSON.parse(localStorage.getItem('tourneeSetlist')||'{}'); }
        function saveSetlistData(data) { localStorage.setItem('tourneeSetlist',JSON.stringify(data)); window._syncNow&&window._syncNow(); }

        function getSetlistConfig() {
            var proj=document.getElementById('setlist-projet-sel')?.value;
            var cfg=document.getElementById('setlist-config-sel')?.value||proj;
            if(!proj||proj==='__new__') return null;
            var data=loadSetlistData();
            if(!data[proj]) data[proj]={configs:{}};
            // Migration
            if(data[proj].chansons&&!data[proj].configs){
                data[proj].configs={};
                data[proj].configs[proj]={champs:data[proj].champs||['Ambiance','Son','Lumière'],chansons:data[proj].chansons||[]};
                delete data[proj].chansons; delete data[proj].champs;
                saveSetlistData(data);
            }
            if(!data[proj].configs) data[proj].configs={};
            if(!cfg||!data[proj].configs[cfg]){
                if(!data[proj].configs[proj]) data[proj].configs[proj]={champs:['Ambiance','Son','Lumière'],chansons:[]};
                cfg=proj;
                var sel=document.getElementById('setlist-config-sel');if(sel)sel.value=cfg;
            }
            return {proj,cfg,data,configData:data[proj].configs[cfg]};
        }

        function populateSetlistConfigSel() {
            var proj=document.getElementById('setlist-projet-sel')?.value;
            var cfgSel=document.getElementById('setlist-config-sel');
            var addBtn=document.getElementById('setlist-add-config-btn');
            if(!cfgSel||!proj||proj==='__new__'){if(cfgSel)cfgSel.style.display='none';if(addBtn)addBtn.style.display='none';return;}
            var data=loadSetlistData();
            if(!data[proj]||!data[proj].configs){if(cfgSel)cfgSel.style.display='none';if(addBtn)addBtn.style.display='none';return;}
            var configs=Object.keys(data[proj].configs);
            var cur=cfgSel.value;
            cfgSel.innerHTML='';
            configs.forEach(function(c){var opt=document.createElement('option');opt.value=c;opt.textContent=c;if(c===cur)opt.selected=true;cfgSel.appendChild(opt);});
            cfgSel.style.display=configs.length>1?'':'none';
            if(addBtn)addBtn.style.display='';
            // Boutons renommer et supprimer setlist
            var renBtn=document.getElementById('setlist-rename-btn');
            var delBtn=document.getElementById('setlist-delete-btn');
            if(renBtn)renBtn.style.display='';
            if(delBtn)delBtn.style.display=configs.length>1?'':'none';
        }

        function addSetlistConfig() {
            var proj=document.getElementById('setlist-projet-sel')?.value; if(!proj||proj==='__new__')return;
            var n=prompt('Nom de la nouvelle configuration (ex: Piano acoustique) :'); if(!n||!n.trim())return;
            var data=loadSetlistData();
            if(!data[proj])data[proj]={configs:{}};
            if(!data[proj].configs)data[proj].configs={};
            data[proj].configs[n.trim()]={champs:['Ambiance','Son','Lumière'],chansons:[]};
            saveSetlistData(data);
            populateSetlistConfigSel();
            document.getElementById('setlist-config-sel').value=n.trim();
            document.getElementById('setlist-config-sel').style.display='';
            renderSetlist();
        }

        function populateSetlistProjet() {
            var sel=document.getElementById('setlist-projet-sel'); if(!sel)return;
            var projs=getTourneeProjects();
            var setData=loadSetlistData();
            Object.keys(setData).forEach(function(p){if(projs.indexOf(p)<0)projs.push(p);});
            projs.sort();
            var cur=sel.value;
            sel.innerHTML='<option value="">— Projet —</option>';
            projs.forEach(function(p){var opt=document.createElement('option');opt.value=p;opt.textContent=p;if(p===cur)opt.selected=true;sel.appendChild(opt);});
            var opt=document.createElement('option');opt.value='__new__';opt.textContent='+ Créer un projet setlist';sel.appendChild(opt);
        }

        function onSetlistProjetChange() {
            var v=document.getElementById('setlist-projet-sel').value;
            if(v==='__new__'){
                var n=prompt('Nom du projet :');
                if(n&&n.trim()){
                    var d=loadSetlistData();
                    if(!d[n.trim()])d[n.trim()]={configs:{}};
                    if(!d[n.trim()].configs[n.trim()])d[n.trim()].configs[n.trim()]={champs:['Ambiance','Son','Lumière'],chansons:[]};
                    saveSetlistData(d);populateSetlistProjet();
                    document.getElementById('setlist-projet-sel').value=n.trim();

        function openAddChanson(editId) {
            var ctx=getSetlistConfig(); if(!ctx){alert('Choisir un projet');return;}
            if(!ctx.configData.champs)ctx.configData.champs=['Ambiance','Son','Lumière'];
            var champs=ctx.configData.champs;
            _editChansonId=editId||null;
            var chanson=editId?ctx.configData.chansons.find(function(c){return c.id===editId;}):null;
            document.getElementById('chanson-titre').value=chanson?chanson.titre:'';

        function saveChanson() {
            var ctx=getSetlistConfig(); if(!ctx)return;
            var titre=document.getElementById('chanson-titre').value.trim(); if(!titre){alert('Titre obligatoire');return;}
            var champs=ctx.configData.champs||[];
            var champsData={};
            champs.forEach(function(ch){var el=document.getElementById('champ-'+ch.replace(/\W/g,'_'));if(el)champsData[ch]=el.value.trim();});
            var transition=document.getElementById('chanson-transition').value.trim();
            var chanson={id:_editChansonId||Date.now(),titre,champs:champsData,transition};
            if(!ctx.configData.chansons)ctx.configData.chansons=[];
            if(_editChansonId){var idx=ctx.configData.chansons.findIndex(function(c){return c.id===_editChansonId;});if(idx>=0)ctx.configData.chansons[idx]=chanson;}
            else ctx.configData.chansons.push(chanson);
            saveSetlistData(ctx.data); closeAddChanson(); renderSetlist();
        }

        function deleteChanson(id) {
            var ctx=getSetlistConfig(); if(!ctx)return;
            if(!confirm('Supprimer cette chanson ?'))return;
            ctx.configData.chansons=ctx.configData.chansons.filter(function(c){return c.id!==id;});
            saveSetlistData(ctx.data); renderSetlist();
        }

        function moveChanson(id,dir) {
            var ctx=getSetlistConfig(); if(!ctx)return;
            var arr=ctx.configData.chansons;
            var idx=arr.findIndex(function(c){return c.id===id;});
            var newIdx=idx+dir;
            if(newIdx<0||newIdx>=arr.length)return;
            var tmp=arr[idx];arr[idx]=arr[newIdx];arr[newIdx]=tmp;
            saveSetlistData(ctx.data); renderSetlist();
        }

        function getGommetteEmployeur() {
            return { id:'gommette', nom:'Gommette Production', logo: GOMMETTE_LOGO, builtin: true };
        }
        function getAllEmployeurs() {
            return [getGommetteEmployeur()].concat(loadEmployeurs());
        }

        var _editFraisId = null;
        var _currentRecus = [];

        // ── LISTE ─────────────────────────────────────────────────
        function renderFraisList() {
            document.getElementById('frais-list-panel').style.display = '';
            document.getElementById('frais-edit-panel').style.display = 'none';
            var el = document.getElementById('frais-list-panel');
            var frais = loadFrais();
            var profile = loadFraisProfile();

            // Profile banner
            var profileHtml = '';
            if (!profile.nom) {
                profileHtml = '<div onclick="openFraisProfile()" style="cursor:pointer;background:#fef9c3;border:1.5px dashed #fbbf24;border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;">'
                    +'<span style="font-size:20px;">👤</span>'
                    +'<div><div style="font-size:13px;font-weight:700;color:#92400e;">Configure ton profil</div>'
                    +'<div style="font-size:11px;color:#b45309;">Nom, prénom et signature — remplis une fois, pré-remplis partout</div></div>'
                    +'<span style="margin-left:auto;font-size:18px;">→</span></div>';
            } else {
                profileHtml = '<div style="background:#f0fdf4;border:1px solid #a7f3d0;border-radius:10px;padding:8px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;">'
                    +'<span style="font-size:16px;">👤</span>'
                    +'<span style="font-size:13px;color:#059669;font-weight:600;">'+(profile.prenom||'')+' '+(profile.nom||'')+'</span>'
                    +'<button onclick="openFraisProfile()" style="margin-left:auto;background:none;border:1px solid #a7f3d0;color:#059669;padding:3px 10px;border-radius:6px;cursor:pointer;font-size:11px;">Modifier</button>'
                    +'</div>';
            }

            if (!frais.length) {
                el.innerHTML = profileHtml
                    +'<div style="text-align:center;padding:40px 20px;color:#94a3b8;">'
                    +'<div style="font-size:40px;margin-bottom:10px;">🧾</div>'
                    +'<div style="font-size:14px;">Aucune note de frais</div>'
                    +'<div style="font-size:12px;margin-top:6px;">Clique sur "+ Nouvelle note" ou sur un concert dans l&#39;agenda</div>'
                    +'</div>';
                return;
            }
            var html = profileHtml + '<div style="display:flex;flex-direction:column;gap:8px;">';
            frais.slice().reverse().forEach(function(f) {
                var emp = getAllEmployeurs().find(function(e){return e.id===f.employeurId;}) || getGommetteEmployeur();
                html += '<div style="background:#f0fdf4;border:1.5px solid #a7f3d0;border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;">'
                    +'<div style="font-size:26px;">🧾</div>'
                    +'<div style="flex:1;min-width:0;">'
                    +'<div style="font-size:13px;font-weight:700;color:#059669;">'+(f.spectacle||f.projet||'Note de frais').replace(/</g,'&lt;')+'</div>'
                    +'<div style="font-size:11px;color:#94a3b8;margin-top:2px;">'+(f.dateRep||'')+(f.lieu?' · '+f.lieu:'')
                    +' · '+emp.nom+(f.recus&&f.recus.length?' · '+f.recus.length+' reçu(s)':'')+'</div>'
                    +'</div>'
                    +'<div style="display:flex;gap:5px;flex-shrink:0;">'
                    +'<button onclick="exportFraisPDF(\''+f.id+'\')" style="background:#059669;color:white;border:none;padding:6px 10px;border-radius:7px;cursor:pointer;font-size:11px;font-weight:700;">📄 PDF</button>'
                    +'<button onclick="editFrais(\''+f.id+'\')" style="background:white;border:1px solid #a7f3d0;color:#059669;padding:6px 7px;border-radius:7px;cursor:pointer;font-size:12px;">✏️</button>'
                    +'<button onclick="deleteFrais(\''+f.id+'\')" style="background:white;border:1px solid #fecaca;color:#dc2626;padding:6px 7px;border-radius:7px;cursor:pointer;font-size:12px;">🗑️</button>'
                    +'</div></div>';
            });
            html += '</div>';
            el.innerHTML = html;
        }

        // ── SIGNATURE CANVAS ──────────────────────────────────────
        var _sigCtx = null, _sigDrawing = false;
        function initSignatureCanvas(existingData) {
            var canvas = document.getElementById('sig-canvas');
            if (!canvas) return;
            _sigCtx = canvas.getContext('2d');
            _sigCtx.strokeStyle = '#1e293b';
            _sigCtx.lineWidth = 2;
            _sigCtx.lineCap = 'round';
            _sigCtx.lineJoin = 'round';
            if (existingData) {
                var img = new Image();
                img.onload = function(){ _sigCtx.drawImage(img, 0, 0, canvas.width, canvas.height); };
                img.src = existingData;
            }
            function getPos(e) {
                var r = canvas.getBoundingClientRect();
                var scaleX = canvas.width / r.width;
                var scaleY = canvas.height / r.height;
                var src = e.touches ? e.touches[0] : e;
                return { x: (src.clientX - r.left)*scaleX, y: (src.clientY - r.top)*scaleY };
            }
            canvas.onmousedown = canvas.ontouchstart = function(e){ e.preventDefault(); _sigDrawing=true; var p=getPos(e); _sigCtx.beginPath(); _sigCtx.moveTo(p.x,p.y); };
            canvas.onmousemove = canvas.ontouchmove = function(e){ e.preventDefault(); if(!_sigDrawing)return; var p=getPos(e); _sigCtx.lineTo(p.x,p.y); _sigCtx.stroke(); };
            canvas.onmouseup = canvas.ontouchend = function(){ _sigDrawing=false; };
        }
        function clearSignature() {
            var canvas = document.getElementById('sig-canvas');
            if (canvas&&_sigCtx) _sigCtx.clearRect(0,0,canvas.width,canvas.height);
        }
        function getSignatureData() {
            var canvas = document.getElementById('sig-canvas');
            if (!canvas) return null;
            // Check if canvas is blank
            var blank = document.createElement('canvas');
            blank.width=canvas.width; blank.height=canvas.height;
            if (canvas.toDataURL()===blank.toDataURL()) return null;
            return canvas.toDataURL('image/png');
        }

        // Compresse une image en base64 en gardant le ratio, jusqu'a passer sous 700KB
        function _compressImage(base64, type, callback) {
            var img = new Image();
            img.onload = function() {
                var TARGET = 650000;
                var origW = img.width, origH = img.height;
                var ratio = origH / origW;
                var maxSize = 800;
                // Calculer w/h en respectant le ratio original
                var w, h;
                if (origW > origH) { w = maxSize; h = Math.round(maxSize * ratio); }
                else { h = maxSize; w = Math.round(maxSize / ratio); }

                var canvas = document.createElement('canvas');
                var ctx = canvas.getContext('2d');
                var result, quality = 0.65, attempts = 0;

                do {
                    canvas.width = w;
                    canvas.height = h;
                    ctx.clearRect(0, 0, w, h);
                    ctx.drawImage(img, 0, 0, w, h);
                    result = canvas.toDataURL('image/jpeg', quality);
                    if (result.length > TARGET) {
                        // Reduire en gardant le ratio
                        w = Math.round(w * 0.8);
                        h = Math.round(w * ratio);
                        quality = Math.max(quality - 0.05, 0.2);
                    }
                    attempts++;
                } while (result.length > TARGET && attempts < 8);

                console.log('Compression: ' + Math.round(base64.length/1024) + 'KB -> ' + Math.round(result.length/1024) + 'KB (' + attempts + ' passes)');
                callback(result);
            };
            img.onerror = function() { callback(base64); };
            img.src = base64;
        }
